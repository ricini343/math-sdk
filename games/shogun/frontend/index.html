function _syncPortraitBar() {
  var pb = document.getElementById('p-bal');
  if (!pb) return;
  pb.textContent = formatMoney(balance);
  document.getElementById('p-bet').textContent = formatMoney(bet);
  var pw = document.getElementById('p-win');
  pw.textContent = formatMoney(roundWin > 0 ? roundWin : 0);
  pw.style.color = roundWin > 0 ? '#ffd700' : '#a08030';
  // Hide buy bonus during free spins
  document.getElementById('p-buy').style.display = inFS ? 'none' : '';
  // Sync turbo state
  document.getElementById('p-turbo').style.color = turboMode ? '#ffd700' : 'rgba(212,160,23,0.45)';
}

// Enhanced resize — portrait: grid fills phone width, HTML bar for controls
const _origResizeFn = resize;
const _enhancedResize = () => {
  const w = window.innerWidth, h = window.innerHeight;
  const isPortrait = h > w * 1.2;
  // Reset styles
  app.view.style.position = '';
  app.view.style.left = '';
  app.view.style.top = '';
  if (isPortrait) {
    // Scale canvas so grid (720px of 1600) fills ~85% of viewport width
    const targetGridW = w * 0.85;
    const s = targetGridW / GRID_W;          // CSS-px per canvas-px
    const cw = Math.round(BASE_W * s);       // full canvas CSS width (~742px on iPhone)
    const ch = Math.round(BASE_H * s);       // full canvas CSS height (~418px)
    app.view.style.width  = cw + 'px';
    app.view.style.height = ch + 'px';
    app.view.style.position = 'absolute';
    // Center grid horizontally — left/right canvas edges clipped by overflow:hidden
    const gridCenterCSS = (GRID_X + GRID_W / 2) * s;
    app.view.style.left = Math.round(w / 2 - gridCenterCSS) + 'px';
    // Show logo above canvas
    const logoH = Math.round(w * 0.12);     // logo height ~12% of viewport width
    _portraitLogo.style.display = 'block';
    _portraitLogo.style.width = Math.round(w * 0.40) + 'px';
    _portraitLogo.style.top = '6px';
    // Position canvas below logo, above portrait bar
    const barH = _portraitBar.offsetHeight || 120;
    const topOffset = logoH + 8;             // logo height + small gap
    const availH = h - barH - topOffset;
    app.view.style.top = Math.round(topOffset + Math.max(0, (availH - ch) / 3)) + 'px';
    // Show portrait HTML bar & sync values; hide PIXI bar elements (portrait bar replaces them)
    _portraitBar.style.display = 'block';
    _syncPortraitBar();
    if (txtBalance) txtBalance.visible = false;
    if (txtWin) txtWin.visible = false;
    if (txtBet) txtBet.visible = false;
  } else {
    const s = Math.min(w / BASE_W, h / BASE_H);
    app.view.style.width  = (BASE_W * s) + 'px';
    app.view.style.height = (BASE_H * s) + 'px';
    _portraitBar.style.display = 'none';
    _portraitLogo.style.display = 'none';
    if (txtBalance) txtBalance.visible = true;
    if (txtWin) txtWin.visible = true;
    if (txtBet) txtBet.visible = true;
  }
  portraitWarning.visible = false;
};
window.removeEventListener('resize', resize);
window.addEventListener('resize', _enhancedResize);
_enhancedResize();

// ─────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────
// RGS Auth
if (_rgsBlocked) {
  // rgs_url was invalid — don't even try to authenticate
} else {
  try {
    const auth = await RGS.authenticate();
    balance = auth.balance;
    CURRENCY = auth.currency;
    CURRENCY_SYMBOL = CURRENCY_MAP[CURRENCY] || CURRENCY + ' ';
    // Issue #3: Bet levels from RGS, then currency defaults, then generic fallback
    if (auth.betLevels && auth.betLevels.length) {
      betLevels = auth.betLevels;
      bet = auth.defaultBetLevel && betLevels.includes(auth.defaultBetLevel) ? auth.defaultBetLevel : betLevels[0];
    } else if (auth.minBet != null && auth.maxBet != null && auth.stepBet != null) {
      buildBetLevels(auth.minBet, auth.maxBet, auth.stepBet);
      bet = auth.defaultBetLevel && betLevels.includes(auth.defaultBetLevel) ? auth.defaultBetLevel : betLevels[0];
    } else {
      // Apply currency-specific bet defaults
      const cbd = CURRENCY_BET_DEFAULTS[CURRENCY] || CURRENCY_BET_DEFAULTS['USD'];
      buildBetLevels(cbd.min, cbd.max, cbd.step);
      bet = auth.defaultBetLevel && betLevels.includes(auth.defaultBetLevel) ? auth.defaultBetLevel : cbd.default;
      if (!betLevels.includes(bet)) bet = betLevels.reduce((p,c) => Math.abs(c-bet) < Math.abs(p-bet) ? c : p);
    }
    // Handle active round on refresh: use the round's bet, not default
    if (auth.round && auth.round.active) {
      RGS._roundActive = true;
      if (auth.round.bet != null) bet = fromRGS(auth.round.bet);
      console.log('[RGS] Active round detected on refresh, bet:', bet);
    }
    if (auth.disabledFullscreen) { disabledFullscreen = true; if (_fsBtn) _fsBtn.c.visible = false; }
    if (auth.disabledTurbo) { disabledTurbo = true; turboMode = false; if (_turboBtn) _turboBtn.c.visible = false; }
    if (auth.socialCasino) {
      socialCasino = true;
      if (_betLabel) _betLabel.text = socLabel('BET');
      if (_buyBtnTxt) _buyBtnTxt.text = socLabel('BUY BONUS');
    }
  } catch(e) {
    console.error('RGS auth failed:', e);
    // Show error page — do NOT fall back to demo mode in production
    if (!IS_DEMO) {
      showRGSError('Unable to connect to the game server. Please check your connection and try again.');
    } else {
      // Demo mode fallback only when explicitly in demo
      const _cbd = CURRENCY_BET_DEFAULTS[CURRENCY] || CURRENCY_BET_DEFAULTS['USD'];
      buildBetLevels(_cbd.min, _cbd.max, _cbd.step);
      bet = _cbd.default;
      if (!betLevels.includes(bet)) bet = betLevels.reduce((p,c) => Math.abs(c-bet) < Math.abs(p-bet) ? c : p);
    }
  }
}

// Load book files for all modes
try {
  await loadBook('base');
  _bookReady = true;
  console.log('[BOOK] Base book ready');
} catch(e) {
  console.error('[BOOK] Failed to load base book:', e);
}
// Load bonus books in background (non-blocking)
loadBook('buy_bonus');
loadBook('super_buy_bonus');

// ── Session Recovery — handle interrupted round on reload ──
// Only restore FS state if the RGS ACTUALLY has an active round.
// Stale localStorage from old sessions must NOT corrupt a fresh game.
const _savedState = loadGameState();
if (_savedState && _savedState.inFS && _savedState.simSpins && _savedState.simSpins.length > 0 && RGS._roundActive) {
  console.log('[RECOVERY] Resuming FS — fsLeft:', _savedState.fsLeft, 'spinIdx:', _savedState.simSpinIdx);
  // Restore full FS state
  bet = _savedState.bet || bet;
  inFS = true;
  fsLeft = _savedState.fsLeft;
  roundWin = _savedState.roundWin || 0;
  wildReels = _savedState.wildReels || [];
  _simSpins = _savedState.simSpins;
  _simSpinIdx = _savedState.simSpinIdx || 0;
  _simMaxPayout = _savedState.simMaxPayout || 0;
  _simMode = _savedState.simMode || 'base';
  RGS._roundHasWin = true;
  // Restore wild overlays from saved state
  for (const wr of wildReels) {
    if (wildOverlays[wr.reel]) {
      wildOverlays[wr.reel].visible = true;
      const bdg = wildOverlays[wr.reel].getChildByName && wildOverlays[wr.reel].getChildByName('badge');
      if (bdg) {
        const btx = bdg.getChildByName('btxt');
        if (btx) {
          if (wr.mult >= 2) { btx.text = `${wr.mult}×`; btx.visible = true; }
          else { btx.visible = false; }
        }
        bdg.visible = true;
      }
    }
  }
  // Restore the board from the last completed spin
  if (_simSpinIdx > 0 && _simSpins[_simSpinIdx - 1] && _simSpins[_simSpinIdx - 1].board) {
    lastBoard = _simSpins[_simSpinIdx - 1].board.map(reel => [...reel]);
    // Apply sticky wilds to the displayed board
    for (const wr of wildReels) {
      for (let row = 0; row < ROWS; row++) lastBoard[wr.reel][row] = WILD;
    }
    for (let r = 0; r < REELS; r++) {
      reelState[r].targetSyms = lastBoard[r];
      snapReel(r);
    }
  }
  // startSpin() FS branch does fsLeft-- and _simSpinIdx++, so pre-decrement
  // to replay the spin we were on (not skip it)
  _simSpinIdx = Math.max(0, _simSpinIdx - 1);
  fsLeft++;
  updateUI();
  stopAllMusic();
  playSound('free_spins_music');
  // Auto-start next FS spin after a brief pause
  setTimeout(() => { if (inFS && !spinning) startSpin(); }, 1500);
} else if (_savedState && _savedState.inFS && !RGS._roundActive) {
  // Stale FS state from old session — RGS has no active round. Just clear it.
  console.log('[RECOVERY] Stale FS state (no active RGS round), clearing');
  clearGameState();
} else if (_savedState && _savedState.inFS) {
  // Had FS state but no spin data — can't resume, end round cleanly
  console.log('[RECOVERY] FS state without spin data, ending round');
  if (_savedState.bet) bet = _savedState.bet;
  clearGameState();
  if (RGS._roundActive) {
    RGS.endRound().then(() => {
      console.log('[RECOVERY] Active round closed after reload');
      updateUI();
    }).catch(e => console.warn('[RECOVERY] endRound failed:', e));
  }
} else {
  clearGameState();
  // If RGS has an active round but no saved FS state, close it too (Issue #3)
  if (RGS._roundActive && !inFS) {
    RGS.endRound().then(() => {
      console.log('[RECOVERY] Stale round closed');
      updateUI();
    }).catch(e => console.warn('[RECOVERY] endRound failed:', e));
  }
}

// ── Replay Mode Init ──
if (IS_REPLAY) {
  // Hide betting controls — replay is read-only playback
  // Disable all interactive children in the UI layer (spin, +/-, auto, turbo, etc.)
  layerUI.children.forEach(child => { child.interactive = false; child.cursor = 'default'; });
  if (_autoBtn) _autoBtn.c.interactive = false;

  // Process replay data from authenticate response
  _replayData = await fetchReplayData();
  if (_replayData) {
    bet = _replayData.bet;
    balance = 0; // replay doesn't show balance
    updateUI();
    showReplayIntro(_replayData, () => {
      // Re-enable spin for replay playback
      startReplayPlayback();
    });
  } else {
    showRGSError('Unable to load replay data. The event ID may be invalid or expired.');
  }
}

updateUI();
window.addEventListener('keydown', e => {
  if (e.code === 'Escape') {
    if (autoSpins !== 0) { autoSpins = 0; _updateAutoBtn(); return; }
    if (buyBonusOverlay) { closeBuyBonus(); return; }
    return;
  }
  if (e.code !== 'Space') return;
  if (buyBonusOverlay) { closeBuyBonus(); return; }
  if (activeOverlay) {
    activeOverlay.emit('pointerdown');
    return;
  }
  // Block spinning while any menu/overlay is open (game info, buy bonus confirm, etc.)
  if (_gameInfoOverlay) return;
  if (autoSpins !== 0) { autoSpins = 0; _updateAutoBtn(); return; }
  if (!spinning) startSpin();
});
console.log('SHOGUN ✓');

})();
