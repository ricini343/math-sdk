<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { background:#000; }
body {
  background: transparent;
  overflow: hidden;
  width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
/* Background image covers the full browser window — sits behind canvas via DOM order */
#bgImg {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  object-fit: cover;
  filter: brightness(0.6);  /* dim uniformly across full window — no visible canvas box */
}
/* Canvas comes after video in DOM so it stacks on top */
canvas { display: block; position: relative; background: transparent; z-index: 2; touch-action: manipulation; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
/* Portrait — floating spin controls (between grid and bottom bar) */
#portrait-spin-area {
  display:none; position:fixed; left:0; right:0; z-index:101;
  padding:0 12px;
  touch-action:manipulation; -webkit-user-select:none; user-select:none;
  pointer-events:none;
}
#portrait-spin-area > * { pointer-events:auto; }
#portrait-spin-area .ps-row { display:flex; justify-content:center; align-items:center; gap:10px; }
/* Buy bonus — clean, no extra background */
#portrait-spin-area .p-buy-wrap {
  height:50px; border:none; padding:0; background:#3d1a0a; border-radius:6px;
  cursor:pointer; -webkit-tap-highlight-color:transparent; position:relative; flex-shrink:0;
}
#portrait-spin-area .p-buy-wrap img { height:100%; width:auto; object-fit:contain; }
#portrait-spin-area .p-buy-wrap span {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);

  text-shadow:0 1px 3px rgba(0,0,0,0.9), 0 0 8px rgba(255,200,0,0.4);
  white-space:nowrap; pointer-events:none;
}
#portrait-spin-area .p-buy-wrap:active img { filter:brightness(1.4); }
/* +/- bet buttons */
#portrait-spin-area .p-bet-btn {
  width:40px; height:40px; border-radius:50%; border:none;
  background:radial-gradient(circle at 40% 35%, #3d1a0a, #1a0800);
  box-shadow:0 0 0 1.5px rgba(255,150,100,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
  color:#ff9a50; font-size:22px; font-weight:bold; font-family:'Cherry Bomb One','Fredoka',sans-serif;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; -webkit-tap-highlight-color:transparent; flex-shrink:0;
}
#portrait-spin-area .p-bet-btn:active { background:radial-gradient(circle at 40% 35%, #5a2a0a, #2a0800); box-shadow:0 0 0 1.5px #ff9a50; color:#ffd700; }
/* Spin button — large and prominent */
#portrait-spin-area .p-spin {
  width:80px; height:80px; border:none; padding:0; background:none;
  cursor:pointer; -webkit-tap-highlight-color:transparent; flex-shrink:0;
}
#portrait-spin-area .p-spin img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 0 12px rgba(255,150,100,0.6)); transition:transform 0.1s; }
#portrait-spin-area .p-spin:active img { transform:scale(0.92); }

/* Portrait bottom bar — utils + values only */
#portrait-bar {
  display:none; position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:transparent;
  padding:6px 8px 0; padding-bottom:max(4px, env(safe-area-inset-bottom));
  touch-action:manipulation; -webkit-user-select:none; user-select:none;
}
/* Utility row — info, sound, turbo */
#portrait-bar .p-utils-row { display:flex; justify-content:center; align-items:center; gap:16px; margin-bottom:6px; }
/* Values strip — BALANCE | WIN | BET */
#portrait-bar .p-vals { display:flex; justify-content:space-around; align-items:center; padding:4px 12px 6px; border-top:1px solid rgba(255,150,100,0.15); }
#portrait-bar .p-stat { text-align:center; flex:1; }
#portrait-bar .p-lbl { font:bold 9px/1 Arial,sans-serif; color:#b06040; letter-spacing:2px; margin-bottom:3px; text-transform:uppercase; }
#portrait-bar .p-val { font:bold 15px/1 'Cherry Bomb One','Fredoka',sans-serif; color:#d4c8a0; }
#portrait-bar .p-val.win { color:#ffd700; font-size:16px; }
/* Utility icons */
#portrait-bar .p-util {
  width:36px; height:36px; border-radius:50%; border:none;
  background:radial-gradient(circle at 40% 35%, #3d1a0a, #1a0800);
  box-shadow:0 0 0 1px rgba(255,150,100,0.3);
  color:rgba(255,150,100,0.55); font-size:15px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; -webkit-tap-highlight-color:transparent; flex-shrink:0;
}
#portrait-bar .p-util:active { color:#ffd700; background:rgba(255,255,255,0.08); }

/* ── Confirm Purchase Modal (HTML/CSS overlay on top of PixiJS canvas) ── */
.confirm-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);

}
.confirm-buttons {

}
.confirm-btn {

<img id="bgImg" src="assets/bg_base.png" style="position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;z-index:0;">
<div id="screenDim" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(42,10,30,0.65);z-index:1;pointer-events:none;"></div>
<script src="assets/pixi.min.js"></script>
<script>
(async () => {

// ─────────────────────────────────────────────────────────────
//  RGS INTEGRATION
// ─────────────────────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const SESSION_ID = urlParams.get('sessionID') || urlParams.get('session_id') || urlParams.get('token') || 'demo';
const LANG = urlParams.get('lang') || 'en';
const DEVICE = urlParams.get('device') || 'desktop';
let RGS_URL = urlParams.get('rgs_url') || '';
if (RGS_URL && !RGS_URL.startsWith('http')) RGS_URL = 'https://' + RGS_URL;
const MONEY_UNIT = 1000000;
let CURRENCY = urlParams.get('currency') || 'EUR';
let CURRENCY_SYMBOL = '€';
let IS_DEMO = !RGS_URL;

// ── Replay Mode ──
const REPLAY_PARAM = urlParams.get('replay') || '';
// Event ID: try dedicated param first, fall back to replay param if numeric
const REPLAY_EVENT_ID = urlParams.get('eventId') || urlParams.get('eventID') || urlParams.get('event_id') || urlParams.get('event') || (/^\d+$/.test(REPLAY_PARAM) ? REPLAY_PARAM : '');
// Detect replay from either ?replay=xxx or ?event=xxx
const IS_REPLAY = !!(REPLAY_PARAM || REPLAY_EVENT_ID);
const REPLAY_MODE = (urlParams.get('mode') || urlParams.get('replayMode') || 'base').toLowerCase();
const REPLAY_AMOUNT = urlParams.get('amount') || '';
let _replayData = null;   // processed replay round data
let _replayBet = 0;       // bet amount from replay
let _replayMode = 'base'; // mode from replay
let _replayTotalWin = 0;  // total win from replay
const REPLAY_GAME = urlParams.get('game') || '';
const REPLAY_VERSION = urlParams.get('version') || '';
if (IS_REPLAY) { IS_DEMO = true; } // replay: no wallet ops

const CURRENCY_MAP = {
  USD:'$', CAD:'CA$', EUR:'€', GBP:'£', JPY:'¥', CNY:'¥',
  KRW:'₩', BRL:'R$', MXN:'MX$', INR:'₹', RUB:'₽', TRY:'₺',
  PHP:'₱', IDR:'Rp', PLN:'zł', DKK:'kr', VND:'₫',
  CLP:'CLP$', ARS:'AR$', PEN:'S/', XGC:'GC', XSC:'SC'
};
const NO_DECIMAL_CURRENCIES = ['JPY','KRW','VND','CLP'];
CURRENCY_SYMBOL = CURRENCY_MAP[CURRENCY] || CURRENCY + ' ';

function formatMoney(v) {
  if (NO_DECIMAL_CURRENCIES.includes(CURRENCY)) return CURRENCY_SYMBOL + Math.round(v);
  return CURRENCY_SYMBOL + v.toFixed(2);
}
function toRGS(v) { return Math.round(v * MONEY_UNIT); }
function fromRGS(v) { return v / MONEY_UNIT; }

let disabledFullscreen = false;
let disabledTurbo = false;
let socialCasino = urlParams.get('social') === 'true';

// Social Mode — restricted terms replacement (single-pass to avoid cascading)
function socLabel(text) {
  if (!socialCasino) return text;
  const map = {
    'PAYTABLE': 'SYMBOL VALUES',
    'PAYLINES': 'WINLINES', 'PAYLINE': 'WINLINE',
    'PAID OUT': 'WIN', 'PAYS OUT': 'WON', 'PAY OUT': 'WIN',
    'PAYOUT MULTIPLIER': 'FINAL MULTIPLIER',
    'PAYOUT': 'PRIZE', 'PAY': 'PRIZE',
    'BUY BONUS': 'PLAY BONUS', 'BUY SUPER': 'PLAY SUPER', 'BUY FREE': 'PLAY FREE',
    'PURCHASE': 'PLAY', 'BUY': 'PLAY',
    'WIN FEATURE': 'PLAY FEATURE',
    'BASE BET': 'BASE PLAY',
    'COST MULTIPLIER': 'FEATURE MULTIPLIER',
    'STAKE': 'PLAY AMOUNT',
    'TOTAL BET COST': 'TOTAL PLAY WORTH',
    'BET COST': 'PLAY WORTH',
    'COST': 'WORTH', 'PRICE': 'WORTH',
    'BET': 'PLAY AMOUNT',
    'GAMBLING': 'GAMING',
    'REFUNDED': 'RESTORED',
  };
  // Build regex: longest phrases first to prevent partial matches
  const keys = Object.keys(map).sort((a, b) => b.length - a.length);
  const re = new RegExp('\\b(' + keys.join('|') + ')\\b', 'gi');
  return text.replace(re, m => map[m.toUpperCase()] || m);
}

async function _rgsPost(path, body) {
  if (!RGS_URL || !SESSION_ID) return null;
  try {
    const resp = await fetch(RGS_URL + path, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(Object.assign({ sessionID: SESSION_ID }, body))
    });
    if (!resp.ok) {
      let errBody = '';
      try { errBody = await resp.text(); } catch(e2){}
      console.error('[RGS]', path, 'HTTP', resp.status, errBody);
      // Return structured error so callers can distinguish error types
      return { _error: true, status: resp.status, body: errBody };
    }
    return await resp.json();
  } catch(e) { console.warn('[RGS]', path, 'failed:', e); return null; }
}

const RGS = {
  _roundActive: false,
  _playPromise: null,
  _endingRound: false,
  _rgsBoardApplied: false,
  async authenticate() {
    // Demo & replay: skip /wallet/authenticate (replay needs no auth per Stake Engine docs)
    if (IS_DEMO) { const _cbd = CURRENCY_BET_DEFAULTS[CURRENCY] || CURRENCY_BET_DEFAULTS['USD']; return { balance:1000, minBet:_cbd.min, maxBet:_cbd.max, stepBet:_cbd.step, currency:CURRENCY, lang:'en' }; }
    // Real money: call RGS
    const d = await _rgsPost('/wallet/authenticate', {});
    if (!d || d._error) {
      // If RGS fails for replay, fall back to demo defaults
      if (IS_REPLAY) { console.warn('[REPLAY] RGS auth failed, falling back to local'); const _cbd = CURRENCY_BET_DEFAULTS[CURRENCY] || CURRENCY_BET_DEFAULTS['USD']; return { balance:1000, minBet:_cbd.min, maxBet:_cbd.max, stepBet:_cbd.step, currency:CURRENCY, lang:'en' }; }
      throw new Error('Auth failed');
    }
    const bal = (d.balance && d.balance.amount != null) ? fromRGS(d.balance.amount) : 1000;
    const cur = (d.balance && d.balance.currency) ? d.balance.currency : 'USD';
    const cfg = d.config || {};
    const jur = cfg.jurisdiction || {};
    const result = { balance: bal, currency: cur, lang: cfg.lang || LANG,
      disabledFullscreen: !!jur.disabledFullscreen, disabledTurbo: !!jur.disabledTurbo,
      socialCasino: !!jur.socialCasino };
    if (cfg.betLevels && cfg.betLevels.length) {
      result.betLevels = cfg.betLevels.map(fromRGS);
    } else if (cfg.minBet != null && cfg.maxBet != null && cfg.stepBet != null) {
      result.minBet = fromRGS(cfg.minBet);
      result.maxBet = fromRGS(cfg.maxBet);
      result.stepBet = fromRGS(cfg.stepBet);
    }
    if (cfg.defaultBetLevel != null) result.defaultBetLevel = fromRGS(cfg.defaultBetLevel);
    if (d.round) result.round = d.round;
    // Store round data for replay
    return result;
  },
  _lastPlayRes: null, // store play response to check payoutMultiplier
  async play(betAmt, modeName) {
    if (IS_DEMO || IS_REPLAY) { this._roundActive = true; return; }
    // Wait for any previous endRound to complete before starting a new round
    if (this._endRoundPromise) {
      try { await this._endRoundPromise; } catch(e) {}
    }
    this._payoutMultiplier = 0;
    this._roundHasWin = false;
    const body = { amount: toRGS(betAmt), mode: modeName.toUpperCase(), currency: CURRENCY };
    // _playPromise wraps the ENTIRE flow (including retry) as a single promise.
    // This prevents race conditions: onAllStopped awaiting _playPromise always
    // gets the FINAL result, never an intermediate failed attempt.
    this._playPromise = (async () => {
      let res = await _rgsPost('/wallet/play', body);
      if (res && res._error) {
        // Only retry on "active bet" — stale round from crash/reload
        if (res.status === 400 && res.body && res.body.includes('active')) {
          console.warn('[RGS] stale round detected, closing and retrying');
          const cleanup = await _rgsPost('/wallet/end-round', {});
          if (cleanup && !cleanup._error && cleanup.balance && cleanup.balance.amount != null) {
            balance = fromRGS(cleanup.balance.amount);
          }
          res = await _rgsPost('/wallet/play', body);
        } else {
          // Non-recoverable error — don't retry
          return null;
        }
      }
      if (!res) return null; // network failure
      if (res._error) return null; // retry also failed
      return res;
    })();
    this._roundActive = true;
    let res = await this._playPromise;
    this._lastPlayRes = res;
    if (!res) { this._roundActive = false; this._playPromise = null; _rgsDataReady = true; return; }
    if (res.balance && res.balance.amount != null) { balance = fromRGS(res.balance.amount); }
    const payout = res.round && res.round.payoutMultiplier;
    const roundActive = res.round && res.round.active;
    this._roundHasWin = (roundActive === true);
    this._payoutMultiplier = payout || 0;
    // Send betEvent AFTER play response confirms round is active
    this.betEvent('base');
    // Process ALL RGS state events into spin data (boards, wins, scatters, wilds, FS)
    // This replaces local book data so scatter triggers, FS, etc. match the RGS outcome
    this._rgsBoard = null;
    this._rgsSpins = null;
    this._rgsMaxPayout = 0;
    if (res.round && res.round.state && res.round.state.length > 0) {
      try {
        const processed = processBookEntry({
          events: res.round.state,
          payoutMultiplier: (payout || 0) * 100 // match book format (cents)
        });
        this._rgsSpins = processed.spins;
        this._rgsMaxPayout = processed.totalPayout;
        // Extract base game board and apply to reel targets during spin
        if (this._rgsSpins.length > 0 && this._rgsSpins[0].board) {
          this._rgsBoard = this._rgsSpins[0].board;
          // Create display board: strip expanding wilds down to the SINGLE landed wild
          // Base game reveal = PRE-expansion (1 wild at actual landed row)
          const displayBoard = this._rgsBoard.map(reel => [...reel]);
          const spin0 = this._rgsSpins[0];
          if (spin0.wilds && spin0.wilds.length > 0) {
            for (const w of spin0.wilds) {
              // Find the actual wild position on this reel
              let wildRow = -1;
              for (let row = 0; row < ROWS; row++) {
                if (displayBoard[w.reel][row] === WILD) { wildRow = row; break; }
              }
              w._landedRow = wildRow >= 0 ? wildRow : 2;
              // Strip all OTHER wilds (keep only the landed position)
              for (let row = 0; row < ROWS; row++) {
                if (row === w._landedRow) continue;
                if (displayBoard[w.reel][row] === WILD) {
                  displayBoard[w.reel][row] = weightedRandom(WEIGHTS);
                }
              }
            }
          }
          // Update reel targets — reels LAND on stripped board (wilds expand later)
          for (let r = 0; r < REELS; r++) {
            reelState[r].targetSyms = displayBoard[r];
          }
          lastBoard = displayBoard;
          // Scatter anticipation from RGS data — real scatters only (no fake teases)
          if (!inFS && !turboMode && spinning && reelState[4] && !reelState[4].stopped) {
            const sc0 = displayBoard[0] && displayBoard[0].includes(SCATTER);
            const sc2 = displayBoard[2] && displayBoard[2].includes(SCATTER);
            const realAnticipation = sc0 && sc2;
            if (realAnticipation) {
              // Timing relative to NOW (when RGS data arrives), not old reel stopTimes
              // Reels 0-3 stop quickly (~300ms stagger), then reel 4 gets 3s of anticipation
              const now = Date.now();
              for (let ri = 0; ri < 4; ri++) {
                reelState[ri].stopTime = Math.min(reelState[ri].stopTime, now + ri * 300);
              }
              reelState[4].stopTime = now + 1200 + 3000; // 1.2s for reels 0-3, then 3s anticipation
              setTimeout(() => { if (spinning) startAnticipation(4); }, 1000);
            }
          }
        }
      } catch(e) { console.warn('[RGS] processBookEntry on state failed:', e); }
    }
    _rgsDataReady = true; // ungate reels — they can now stop on correct RGS data
  },
  _roundHasWin: false,
  _payoutMultiplier: 0,
  _endRoundPromise: null,
  async endRound() {
    // endRound — only call /wallet/end-round when the RGS round is active.
    // The Carrot RGS auto-closes rounds with no win. Only rounds with wins
    // or FS triggers remain active and need explicit end-round.
    if (IS_DEMO || IS_REPLAY) { this._roundActive = false; return; }
    if (this._endingRound) return this._endRoundPromise;
    this._endingRound = true;
    this._endRoundPromise = (async () => {
      try {
        if (this._playPromise) await this._playPromise;
        // Only call end-round if the RGS indicated the round is active (has win/FS)
        if (this._roundHasWin) {
          const res = await _rgsPost('/wallet/end-round', {});
          if (res && !res._error && res.balance && res.balance.amount != null) {
            balance = fromRGS(res.balance.amount);
          }
        }
      } catch(e) { console.warn('end-round error:', e); }
      this._roundActive = false;
      this._playPromise = null;
      this._endingRound = false;
      this._roundHasWin = false;
      this._payoutMultiplier = 0;
      this._endRoundPromise = null;
    })();
    return this._endRoundPromise;
  },
  async betEvent(eventStr) {
    if (IS_DEMO || IS_REPLAY) return;
    if (!this._roundActive) return; // skip if no active round
    try { await _rgsPost('/bet/event', { event: eventStr }); } catch(e) {}
  }
};

// ─────────────────────────────────────────────────────────────
//  RGS URL VALIDATION (Issue #4)
// ─────────────────────────────────────────────────────────────
let _rgsBlocked = false;
function showRGSError(msg) {
  _rgsBlocked = true;
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;';
  const title = document.createElement('div');
  title.style.cssText = "color:#ff4444;font-family:'Cherry Bomb One','Fredoka',sans-serif;font-size:28px;font-weight:bold;margin-bottom:16px;";
  title.textContent = 'CONNECTION ERROR';
  const body = document.createElement('div');
  body.style.cssText = "color:#cccccc;font-family:'Cherry Bomb One','Fredoka',sans-serif;font-size:16px;text-align:center;max-width:500px;line-height:1.6;";
  body.textContent = msg;
  overlay.appendChild(title);
  overlay.appendChild(body);
  document.body.appendChild(overlay);
}
// Validate rgs_url: if invalid, fall back to demo mode
if (!IS_DEMO) {
  try {
    const testUrl = new URL(RGS_URL);
    if (!testUrl.protocol.startsWith('http')) throw new Error('bad protocol');
  } catch(e) {
    console.warn('Invalid RGS URL, falling back to demo mode');
    IS_DEMO = true;
  }
}

// ─────────────────────────────────────────────────────────────
//  BOOK SYSTEM — Pre-computed outcome loading (Issue #1)
// ─────────────────────────────────────────────────────────────
const _books = {};        // { base: [...], buy_bonus: [...], super_buy_bonus: [...] }
let _bookReady = false;   // true once at least the base book is loaded

async function loadBook(mode) {
  if (_books[mode]) return;
  try {
    const resp = await fetch('book_' + mode + '.json?v=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    _books[mode] = await resp.json();
  } catch(e) {
    console.error('[BOOK] Failed to load', mode, e);
    _books[mode] = [];
  }
}

function pickBookEntry(mode) {
  const book = _books[mode];
  if (!book || !book.length) return null;
  return book[Math.floor(Math.random() * book.length)];
}

// Parse a book entry's events into an array of spin data objects.
// Each spin = { board (5x5 visible), wilds [{reel, mult}], wins [{symbol, kind, win, positions, meta}],
//              winAmount, scatterTrigger {totalFs, positions}, stickyWilds [{reel, mult}],
//              fsUpdate {amount, total}, anticipation [] }
function processBookEntry(entry) {
  const spins = [];
  let currentSpin = null;
  let pendingWilds = []; // Buffer: expandingWild events come BEFORE the reveal they apply to in FS
  const totalPayout = (entry.payoutMultiplier || 0) / 100; // cents → bet multiplier

  function newSpin() {
    return { board: null, wilds: [], wins: [], winAmount: 0,
             scatterTrigger: null, stickyWilds: null, fsUpdate: null, anticipation: [] };
  }

  let _revealIdx = 0; // track reveal index: 0 = base game, 1+ = free spins
  for (const ev of entry.events) {
    switch (ev.type) {
      case 'reveal': {
        // Each reveal = a new spin (base or freespin)
        if (currentSpin && currentSpin.board) spins.push(currentSpin);
        currentSpin = newSpin();
        // Attach any buffered expandingWild events to this new spin
        currentSpin.wilds = pendingWilds;
        pendingWilds = [];
        // Extract visible 5x5 from 7-row padded board
        // Map book symbol names to frontend texture names
        const _symMap = { 'W': 'wild', 'SC': 'scatter' };
        const _isFS = _revealIdx > 0; // first reveal is base game, rest are free spins
        const _fsSyms = ['watermelon','grape','orange','cherry','plum','lemon','A','K','Q','J','10'];
        const board = ev.board || [];
        currentSpin.board = board.map(reel =>
          reel.slice(1, 6).map(cell => {
            const name = (typeof cell === 'object' && cell.name) ? cell.name : String(cell);
            const mapped = _symMap[name] || name;
            if (_isFS && mapped === 'scatter') return _fsSyms[Math.floor(Math.random() * _fsSyms.length)];
            return mapped;
          })
        );
        currentSpin.anticipation = ev.anticipation || [];
        _revealIdx++;
        break;
      }
      case 'expandingWild': {
        // Buffer: in FS, expandingWild comes BEFORE the reveal it applies to.
        // In base game, it comes AFTER reveal and gets flushed at end of events.
        pendingWilds.push({ reel: ev.reel, mult: ev.multiplier || 1 });
        break;
      }
      case 'winInfo': {
        if (!currentSpin) currentSpin = newSpin();
        currentSpin.winAmount = (ev.totalWin || 0) / 100; // cents → bet multiplier
        currentSpin.wins = (ev.wins || []).map(w => ({
          symbol: w.symbol, kind: w.kind, win: (w.win || 0) / 100,
          positions: w.positions || [],
          meta: w.meta || {}
        }));
        break;
      }
      case 'scatterTrigger': {
        if (!currentSpin) currentSpin = newSpin();
        currentSpin.scatterTrigger = {
          totalFs: ev.totalFs,
          positions: (ev.scatterPositions || []).map(p => ({ reel: p.reel, row: p.row - 1 })) // convert 1-indexed to 0-indexed
        };
        break;
      }
      case 'updateStickyWilds': {
        if (!currentSpin) currentSpin = newSpin();
        currentSpin.stickyWilds = (ev.stickyWildReels || []).map(w => ({ reel: w.reel, mult: w.mult }));
        break;
      }
      case 'updateFreeSpin': {
        if (!currentSpin) currentSpin = newSpin();
        currentSpin.fsUpdate = { amount: ev.amount, total: ev.total };
        break;
      }
      // setWin, setTotalWin, finalWin, freeSpinEnd — consumed implicitly
    }
  }
  // Flush remaining buffered wilds to the last spin (base game: expandingWild after reveal)
  if (currentSpin) {
    currentSpin.wilds.push(...pendingWilds);
    if (currentSpin.board) spins.push(currentSpin);
  }

  // De-duplicate wilds per reel: keep only the LAST multiplier for each reel per spin
  for (const spin of spins) {
    if (spin.wilds.length > 1) {
      const reelMap = new Map();
      for (const w of spin.wilds) reelMap.set(w.reel, w);
      spin.wilds = Array.from(reelMap.values());
    }
  }

  // If payoutMultiplier was missing/zero, compute from actual spin wins
  let finalPayout = totalPayout;
  if (!finalPayout && spins.length > 0) {
    finalPayout = spins.reduce((sum, s) => sum + (s.winAmount || 0), 0);
  }

  return { spins, totalPayout: finalPayout };
}

  const total = _wildMults.reduce((sum, m) => sum + m.weight, 0);

  for (const m of _wildMults) {

    if (r <= 0) return m.value;

  return _wildMults[0].value;
}

function weightedRandom(w) {
  const keys = Object.keys(w);
  let total = 0; keys.forEach(k => total += w[k]);
  let r = Math.random() * total;
  for (const k of keys) { r -= w[k]; if (r <= 0) return k; }
  return keys[keys.length - 1];
}

function buildBetLevels(min, max, step) {
  minBet=min; maxBet=max; stepBet=step;
  let lvls=[]; for(let v=min; v<=max+0.001; v+=step) lvls.push(Math.round(v*100)/100);
  // Cap at 25 levels — evenly sample if step produces too many
  if (lvls.length > 25) {
    const sampled = [lvls[0]];
    const stride = (lvls.length - 1) / 23;
    for (let i = 1; i < 23; i++) sampled.push(lvls[Math.round(i * stride)]);
    sampled.push(lvls[lvls.length - 1]);
    lvls = [...new Set(sampled)].sort((a,b)=>a-b);
  }
  if(!lvls.length) lvls.push(min); betLevels=lvls;
  if(!betLevels.includes(bet)) bet=betLevels.reduce((p,c)=>Math.abs(c-bet)<Math.abs(p-bet)?c:p);
}

  c.addChild(sh);

  // Gold border drawn ON TOP of sprite, outside clip mask so it always shows
  // (add to layerWild directly so it renders above the masked container)
  const brd = new PIXI.Graphics();
  brd.lineStyle(3, 0xd4a017, 1);
  brd.drawRoundedRect(GRID_X + r * CELL + 1, GRID_Y + 1, SYM_SIZE - 2, GRID_H - 2, 5);
  brd.name = 'brd_' + r;
  brd.visible = false;
  layerWild.addChild(brd);

  // ── Badge — premium candy gem multiplier, on layerFX (unclipped) ──
  const badge = new PIXI.Container();
  badge.x = GRID_X + r * CELL + SYM_SIZE / 2;
  badge.y = GRID_Y - 32;
  badge.name = 'badge';
  badge._reel = r;
  badge.visible = false;
  const BADGE_R = 36; // slightly larger radius for prominence

  // Tier color palette — updated dynamically when mult is set
  badge._tierColors = function(m) {
    if (m >= 61) return { base: 0xffd700, mid: 0xffaa00, top: 0xffee88, stroke: 0x8b6914, ring: 0xfff4b0, glow: 0xffd700 };
    if (m >= 31) return { base: 0xff6600, mid: 0xff4400, top: 0xffaa44, stroke: 0x802200, ring: 0xffcc66, glow: 0xff6600 };
    if (m >= 16) return { base: 0x2288ff, mid: 0x0066dd, top: 0x88ccff, stroke: 0x003388, ring: 0x66bbff, glow: 0x2288ff };
    if (m >= 6)  return { base: 0x9944ff, mid: 0x7722cc, top: 0xcc88ff, stroke: 0x440088, ring: 0xbb88ff, glow: 0x9944ff };
    return { base: 0xe8569a, mid: 0xcc2277, top: 0xffaacc, stroke: 0x8b0050, ring: 0xffd700, glow: 0xe8569a };
  };

  // Glow halo (behind everything, pulses during idle)
  const halo = new PIXI.Graphics();
  halo.beginFill(0xe8569a, 0.2);
  halo.drawCircle(0, 0, BADGE_R + 16);
  halo.endFill();
  halo.name = 'halo';
  badge.addChild(halo);

  // Drop shadow
  const shadow = new PIXI.Graphics();
  shadow.beginFill(0x000000, 0.35);
  shadow.drawEllipse(0, BADGE_R * 0.6, BADGE_R * 0.75, 6);
  shadow.endFill();
  badge.addChild(shadow);

  // Gold outer ring (thick, layered)
  const ring = new PIXI.Graphics();
  ring.lineStyle(5, 0xb8860b, 1);
  ring.drawCircle(0, 0, BADGE_R + 2);
  ring.lineStyle(2, 0xffd700, 0.8);
  ring.drawCircle(0, 0, BADGE_R + 4);
  ring.lineStyle(1, 0xffee88, 0.5);
  ring.drawCircle(0, 0, BADGE_R + 6);
  ring.name = 'ring';
  badge.addChild(ring);

  // Main candy body — rich gradient layers (deep → mid → glossy highlight)
  const body = new PIXI.Graphics();
  body.beginFill(0xcc2277, 1);
  body.drawCircle(0, 0, BADGE_R);
  body.endFill();
  body.beginFill(0xe8569a, 0.8);
  body.drawCircle(0, -2, BADGE_R - 4);
  body.endFill();
  body.beginFill(0xf078b0, 0.5);
  body.drawCircle(0, -4, BADGE_R - 10);
  body.endFill();
  body.name = 'body';
  badge.addChild(body);

  // 3D inner highlight — glossy gumball shine
  const shine = new PIXI.Graphics();
  shine.beginFill(0xffffff, 0.35);
  shine.drawEllipse(-5, -BADGE_R * 0.35, BADGE_R * 0.45, BADGE_R * 0.3);
  shine.endFill();
  shine.beginFill(0xffffff, 0.15);
  shine.drawEllipse(0, -BADGE_R * 0.15, BADGE_R * 0.65, BADGE_R * 0.2);
  shine.endFill();
  badge.addChild(shine);

  // Sugar crystal sparkles on the ring (small bright dots)
  for (let si = 0; si < 6; si++) {
    const angle = (Math.PI * 2 / 6) * si;
    const sx = Math.cos(angle) * (BADGE_R + 3);
    const sy = Math.sin(angle) * (BADGE_R + 3);
    const sparkle = new PIXI.Graphics();
    sparkle.beginFill(0xffffff, 0.7);
    sparkle.drawCircle(sx, sy, 1.5);
    sparkle.endFill();
    sparkle.name = 'sparkle_' + si;
    badge.addChild(sparkle);
  }

  // Multiplier text — bold, dimensional
  const btxt = new PIXI.Text('1×', {
    fontFamily: 'Cherry Bomb One, Fredoka, Arial Black, sans-serif',
    fontSize: 34,
    fill: 0xffffff,
    align: 'center',
    stroke: 0x8b0050,
    strokeThickness: 4,
    dropShadow: true,
    dropShadowColor: 0x000000,
    dropShadowBlur: 6,
    dropShadowDistance: 2,
    dropShadowAngle: Math.PI / 4,
  });
  btxt.anchor.set(0.5, 0.5);
  btxt.y = 0;
  btxt.name = 'btxt';
  badge.addChild(btxt);

  // ── Function to repaint badge for a given multiplier tier ──
  badge._applyTier = function(m) {
    const t = badge._tierColors(m);
    // Repaint body layers
    body.clear();
    body.beginFill(t.mid, 1); body.drawCircle(0, 0, BADGE_R); body.endFill();
    body.beginFill(t.base, 0.8); body.drawCircle(0, -2, BADGE_R - 4); body.endFill();
    body.beginFill(t.top, 0.4); body.drawCircle(0, -4, BADGE_R - 10); body.endFill();
    // Repaint ring
    ring.clear();
    ring.lineStyle(5, 0xb8860b, 1); ring.drawCircle(0, 0, BADGE_R + 2);
    ring.lineStyle(2, t.ring, 0.8); ring.drawCircle(0, 0, BADGE_R + 4);
    ring.lineStyle(1, 0xffee88, 0.5); ring.drawCircle(0, 0, BADGE_R + 6);
    // Repaint halo
    halo.clear();
    halo.beginFill(t.glow, 0.25); halo.drawCircle(0, 0, BADGE_R + 16); halo.endFill();
    // Update text stroke
    btxt.style.stroke = t.stroke;
    // Extra glow for gold tier
    if (m >= 61) {
      halo.beginFill(0xffd700, 0.15); halo.drawCircle(0, 0, BADGE_R + 28); halo.endFill();
    }
  };

  // ── Idle animation ticker (bob + halo pulse + sparkle twinkle) ──
  let _badgeIdleT = Math.random() * 100; // offset so badges don't sync
  badge._idleFn = (dt) => {
    if (!badge.visible) return;
    _badgeIdleT += dt * 0.05;
    // Gentle float bob (~2px)
    badge.y = (GRID_Y - 32) + Math.sin(_badgeIdleT * 2) * 2;
    // Halo pulse
    const hp = 0.85 + 0.15 * Math.sin(_badgeIdleT * 3);
    halo.scale.set(hp);
    halo.alpha = 0.15 + 0.1 * Math.sin(_badgeIdleT * 2.5);
    // Sugar sparkle twinkle
    for (let si = 0; si < 6; si++) {
      const sk = badge.getChildByName('sparkle_' + si);
      if (sk) sk.alpha = 0.3 + 0.7 * Math.abs(Math.sin(_badgeIdleT * 4 + si * 1.1));
    }
  };
  app.ticker.add(badge._idleFn);

  layerFX.addChild(badge);
  c._badge = badge;

  layerWild.addChild(c);
  wildOverlays.push(c);
}

{

// ─────────────────────────────────────────────────────────────
//  BOTTOM BAR — Zeus-style compact layout
// ─────────────────────────────────────────────────────────────
const BAR_Y   = GRID_Y + GRID_H;    // flush with grid bottom
const BAR_H   = BASE_H - BAR_Y;     // ~132px
const BAR_MID = BAR_Y + BAR_H / 2;  // vertical center of bar

const SPIN_Y  = BAR_Y + 60;

let txtBalance, txtBet, txtWin, txtFS, lblWin, barBg;
let _betLabel = null;
let _buyBtnTxt = null;
let _buyBtnCont = null;  // Buy Bonus button container (hidden during FS)
let _dcCardCont = null;  // Double Chance card container (hidden during FS)
let _turboLabel = null;

{
  // ── Bar background — fully transparent (no brown backing) ──
  barBg = new PIXI.Graphics();
  // No fill — completely transparent bottom bar
  layerUI.addChild(barBg);

  // ── Text helpers ──
  const lbl = (txt, x, y) => {
    const t = new PIXI.Text(txt, {
      fontFamily: 'Cherry Bomb One, Fredoka, Arial', fontSize: 13, fill: 0xffb6d9,
      letterSpacing: 2,
    });
    t.anchor.set(0.5, 0); t.x = x; t.y = y;
    layerUI.addChild(t); return t;
  };
  const bigVal = (txt, x, y, color = 0xffffff, size = 22) => {
    const t = new PIXI.Text(txt, {
      fontFamily: 'Cherry Bomb One, Fredoka, Georgia', fontSize: size, fill: color,
      dropShadow: true, dropShadowColor: 0x000000, dropShadowBlur: 4, dropShadowDistance: 0,
    });
    t.anchor.set(0.5, 0.5); t.x = x; t.y = y;
    layerUI.addChild(t); return t;
  };

  // ── Info + Sound icon buttons — far left, same line as Balance ──
  [{ tex: 'info_btn', x: 350, action: () => showGameInfo(), fallback: 'ⓘ' },
   { tex: 'sound_btn', x: 410, action: () => toggleSound(), fallback: '♫' }].forEach(({ tex, x, action, fallback }) => {
    const c = new PIXI.Container();
    c.x = x; c.y = BAR_Y + 32;
    c.interactive = true; c.cursor = 'pointer';

      const sp = new PIXI.Sprite(PIXI.Texture.from(assetMap[tex]));
      sp.anchor.set(0.5);
      sp.width = 52; sp.height = 52;
      c.addChild(sp);
    } else {
      const bg = new PIXI.Graphics();
      bg.beginFill(0xe8569a); bg.drawCircle(0, 0, 20); bg.endFill();
      const it = new PIXI.Text(fallback, { fontFamily: 'Arial', fontSize: 14, fill: 0xffffff });
      it.anchor.set(0.5);
      c.addChild(bg, it);
    }
    // Red mute strikethrough for sound button
    if (tex === 'sound_btn') {
      const ml = new PIXI.Graphics();
      ml.lineStyle(4, 0xff0000, 1);
      ml.moveTo(-14, -14);
      ml.lineTo(14, 14);
      ml.visible = !soundEnabled;
      c.addChild(ml);
      _soundMuteLine = ml;
    }
    c.on('pointerover', () => { c.scale.set(1.1); });
    c.on('pointerout',  () => { c.scale.set(1.0); });
    if (action) c.on('pointerdown', action);
    layerUI.addChild(c);
  });

  // ── Dark backdrop behind Balance/Win/Bet for readability ──
  const valBarW = GRID_W * 0.88;
  const valBarX = GRID_X + (GRID_W - valBarW) / 2;
  const valBar = new PIXI.Graphics();
  valBar.beginFill(0x000000, 0.45);
  valBar.drawRoundedRect(valBarX, BAR_Y + 8, valBarW, 56, 12);
  valBar.endFill();
  layerUI.addChild(valBar);

  // ── LEFT: BALANCE ──
  const BAL_X = GRID_X + GRID_W * 0.15;
  lbl('BALANCE', BAL_X, BAR_Y + 16);
  txtBalance = bigVal(formatMoney(1000), BAL_X, BAR_Y + 38, 0xffffff, 24);

  // ── CENTER: WIN ──
  const WIN_X = GRID_X + GRID_W * 0.5;
  lblWin = lbl('WIN', WIN_X, BAR_Y + 16);
  txtWin = bigVal(formatMoney(0), WIN_X, BAR_Y + 38, 0xffd700, 26);

  // ── Free Spins counter — large premium candy panel, left side (Buy Bonus area) ──
  const fsBadgeCont = new PIXI.Container();
  fsBadgeCont.visible = false;
  layerUI.addChild(fsBadgeCont);

  // Large ornate candy frame
  const FSW = 240, FSH = 280;
  const fsBadgeSprite = new PIXI.Sprite(PIXI.Texture.from(assetMap['fs_counter_large']));
  fsBadgeSprite.anchor.set(0.5);
  fsBadgeSprite.width = FSW; fsBadgeSprite.height = FSH;
  fsBadgeCont.addChild(fsBadgeSprite);

  // Soft glow halo behind the frame
  const fsGlow = new PIXI.Graphics();
  fsGlow.beginFill(0xffd700, 0.12);
  fsGlow.drawCircle(0, 0, FSW * 0.55);
  fsGlow.endFill();
  if (!_isMobile) { fsGlow.filters = [new PIXI.filters.BlurFilter(18)]; }
  fsBadgeCont.addChildAt(fsGlow, 0);

  // "FREE SPINS LEFT" label above number
  const fsLabel = new PIXI.Text('FREE SPINS LEFT', {
    fontFamily: 'Cherry Bomb One, Fredoka, Georgia', fontSize: 16,
    fill: 0xfff8e0, letterSpacing: 2,
    stroke: 0x3a1800, strokeThickness: 3,
  });
  fsLabel.anchor.set(0.5); fsLabel.y = -30;
  fsBadgeCont.addChild(fsLabel);

  // Huge number — center of the frame
  const fsNumTxt = new PIXI.Text('', {
    fontFamily: 'Cherry Bomb One, Fredoka, Georgia', fontSize: 82, fontWeight: 'bold',
    fill: [0xffffff, 0xffd700], fillGradientStops: [0, 1],
    stroke: 0x5a2000, strokeThickness: 6,
    dropShadow: true, dropShadowColor: 0x000000, dropShadowBlur: 6, dropShadowDistance: 3,
  });
  fsNumTxt.anchor.set(0.5); fsNumTxt.y = 18;
  fsBadgeCont.addChild(fsNumTxt);

  // Position in left area (where Buy Bonus normally sits)
  fsBadgeCont.x = Math.max(FSW / 2 + 15, GRID_X / 2);
  fsBadgeCont.y = 260;

  // Floating bob animation
  let _fsBobTime = 0;
  let _fsBobActive = false;
  function _fsBobTick(dt) {
    _fsBobTime += dt * 0.03;
    fsBadgeCont.y = 260 + Math.sin(_fsBobTime) * 2;
  }

  // Glow pulse animation
  let _fsGlowTime = 0;
  let _fsGlowTension = false;
  function _fsGlowTick(dt) {
    _fsGlowTime += dt * (_fsGlowTension ? 0.08 : 0.04);
    const pulse = 0.08 + Math.sin(_fsGlowTime) * 0.06;
    fsGlow.alpha = pulse;
    if (_fsGlowTension) {
      fsGlow.tint = 0xff8844; // red-shifted for final spin tension
    } else {
      fsGlow.tint = 0xffffff;
    }
  }

  // Draw/redraw badge
  let _fsPrevCount = -1;
  function _drawFSBadge(count) {
    fsNumTxt.text = String(count);

    // Tension mode on final spin
    _fsGlowTension = (count === 1);

    // Pulse animation when count decreases
    if (_fsPrevCount > 0 && count < _fsPrevCount) {
      fsBadgeCont.scale.set(1.12);
      let pt = 0;
      const pFn = (pdt) => {
        pt += pdt;
        const p = Math.min(pt / 12, 1);
        const sc = 1.12 - 0.12 * p + 0.03 * Math.sin(p * Math.PI * 2);
        fsBadgeCont.scale.set(sc);
        if (p >= 1) { fsBadgeCont.scale.set(1); app.ticker.remove(pFn); }
      };
      app.ticker.add(pFn);
    }

    // Flash when hitting 0 (FS complete)
    if (count === 0 && _fsPrevCount > 0) {
      fsGlow.alpha = 0.6;
      fsBadgeCont.scale.set(1.2);
      let ft = 0;
      const flashFn = (fdt) => {
        ft += fdt;
        const fp = Math.min(ft / 15, 1);
        fsGlow.alpha = 0.6 * (1 - fp);
        fsBadgeCont.scale.set(1.2 - 0.2 * fp);
        if (fp >= 1) { app.ticker.remove(flashFn); }
      };
      app.ticker.add(flashFn);
    }

    _fsPrevCount = count;
  }

  function _startFSBadgeAnimations() {
    if (!_fsBobActive) {
      _fsBobActive = true;
      _fsBobTime = 0; _fsGlowTime = 0;
      app.ticker.add(_fsBobTick);
      app.ticker.add(_fsGlowTick);
    }
  }
  function _stopFSBadgeAnimations() {
    if (_fsBobActive) {
      _fsBobActive = false;
      app.ticker.remove(_fsBobTick);
      app.ticker.remove(_fsGlowTick);
      fsBadgeCont.y = 260;
      fsGlow.alpha = 0.12;
      fsGlow.tint = 0xffffff;
      _fsGlowTension = false;
    }
  }

  // Wrapper — replaces old txtFS interface
  txtFS = {
    _cont: fsBadgeCont,
    set text(v) {
      if (!v || v === '') {
        fsBadgeCont.visible = false;
        _fsPrevCount = -1;
        _stopFSBadgeAnimations();
      } else {
        fsBadgeCont.visible = true;
        const n = parseInt(v.replace(/\D/g, ''), 10) || 0;
        _drawFSBadge(n);
        _startFSBadgeAnimations();
      }
    },
    get text() { return fsNumTxt.text; }
  };

  // ── RIGHT: BET + [−] [SPIN] [+] ──
  // BET label/value sits left of the minus button
  const BET_X = GRID_X + GRID_W * 0.85;
  _betLabel = lbl(socLabel('BET'), BET_X, BAR_Y + 16);
  txtBet = bigVal(formatMoney(1), BET_X, BAR_Y + 38, 0xffffff, 24);

  // − left of spin
  makeBtn('−', SPIN_X - 75, BAR_MID + 10, () => {
    if (spinning || inFS) return;  // block during spin/FS
    const b = betLevels;
    const i = b.indexOf(bet); if (i > 0) { bet = b[i - 1]; updateUI(); }
  });

  // + right of spin
  makeBtn('+', SPIN_X + 75, BAR_MID + 10, () => {
    if (spinning || inFS) return;  // block during spin/FS
    const b = betLevels;
    const i = b.indexOf(bet); if (i < b.length - 1) { bet = b[i + 1]; updateUI(); }
  });

  // ── SPIN button — anchored at right, sits inside bar ──
  makeSpinBtn(SPIN_X, SPIN_Y);

  // ── TURBO + AUTO — small buttons above spin ──
  _turboBtn = _makeMiniBtn('⚡', SPIN_X - 68, BAR_Y + 18, () => {
    turboMode = (turboMode + 1) % 3; _updateTurboBtn();
  });
  _updateTurboBtn(); // set initial dimmed state
  _autoBtn = _makeMiniBtn('AUTO', SPIN_X + 68, BAR_Y + 18, () => {
    if (inFS) return; // no autoplay during bonus
    if (autoSpins !== 0) { autoSpins = 0; _updateAutoBtn(); _hideAutoPicker(); _hideAutoConfirm(); }
    else if (_autoPicker && _autoPicker.visible) { _hideAutoPicker(); _hideAutoConfirm(); }
    else _showAutoPicker();
  });
  _updateAutoBtn(); // set initial dimmed state

  // ── FULLSCREEN button ──
  var _fsBtn = _makeMiniBtn('⛶', SPIN_X + 140, BAR_Y + 18, () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen().catch(()=>{});
  });
}

// ── Double Chance to Win — candy-themed toggle card below Buy Bonus ──
{

  dcBg.width = dcW; dcBg.height = dcH;
  dcCard.addChild(dcBg);

  // "BET" label
  const dcBetLabel = new PIXI.Text('BET', {
    fontFamily: 'Cherry Bomb One, Fredoka, Georgia', fontSize: 13,
    fill: 0xdaa520, letterSpacing: 2,
  });
  dcBetLabel.anchor.set(0.5); dcBetLabel.y = -dcH / 2 + 30;
  dcCard.addChild(dcBetLabel);

  // Bet value — big gold number
  const dcBetVal = new PIXI.Text('', {
    fontFamily: 'Cherry Bomb One, Fredoka, Georgia', fontSize: 28, fontWeight: 'bold',
    fill: [0xffffff, 0xffd700], fillGradientStops: [0, 1],
    stroke: 0x5a2000, strokeThickness: 4,
  });
  dcBetVal.anchor.set(0.5); dcBetVal.y = -dcH / 2 + 56;

    fontFamily: 'Cherry Bomb One, Fredoka, Georgia', fontSize: 18, fontWeight: 'bold',
    fill: 0xffffff, align: 'center', lineHeight: 22,
    stroke: 0x3a1500, strokeThickness: 3,
  });
  dcTitle.anchor.set(0.5); dcTitle.y = 10;
  dcCard.addChild(dcTitle);

  // Toggle switch container
  const toggleW = 90, toggleH = 36, toggleR = toggleH / 2;
  const dcToggle = new PIXI.Container();
  dcToggle.y = dcH / 2 - 42;
  dcCard.addChild(dcToggle);

  // Toggle track
  const toggleTrack = new PIXI.Graphics();
  dcToggle.addChild(toggleTrack);

  // Toggle nub (white circle)
  const toggleNub = new PIXI.Graphics();
  toggleNub.beginFill(0xffffff, 1);
  toggleNub.drawCircle(0, 0, toggleR - 4);
  toggleNub.endFill();
  dcToggle.addChild(toggleNub);

  // Toggle label
  const toggleLabel = new PIXI.Text('', {
    fontFamily: 'Cherry Bomb One, Fredoka, sans-serif', fontSize: 14, fontWeight: 'bold', fill: 0xffffff,
  });
  toggleLabel.anchor.set(0.5);
  dcToggle.addChild(toggleLabel);

  // Status indicator text below toggle
  const dcStatus = new PIXI.Text('', {
    fontFamily: 'Cherry Bomb One, Fredoka, sans-serif', fontSize: 11, fill: 0xbbaa88,
  });
  dcStatus.anchor.set(0.5); dcStatus.y = dcH / 2 - 12;
  dcCard.addChild(dcStatus);

  function _updateDCCardInner() {
    const on = doubleChanceEnabled;
    const eBet = bet * 1.5;

    // Bet value shows what it WOULD be (or IS) with double chance
    dcBetVal.text = on ? formatMoney(eBet) : formatMoney(eBet);
    dcBetVal.style.fill = on ? [0x44dd88, 0x22aa66] : [0xffffff, 0xffd700];

    // Toggle track color
    toggleTrack.clear();
    toggleTrack.beginFill(on ? 0x22aa44 : 0x882222, 0.9);
    toggleTrack.drawRoundedRect(-toggleW / 2, -toggleH / 2, toggleW, toggleH, toggleR);
    toggleTrack.endFill();
    toggleTrack.lineStyle(2, on ? 0x44dd66 : 0x553333, 0.6);
    toggleTrack.drawRoundedRect(-toggleW / 2, -toggleH / 2, toggleW, toggleH, toggleR);

    // Nub position
    toggleNub.x = on ? toggleW / 2 - toggleR : -toggleW / 2 + toggleR;

    // Label
    toggleLabel.text = on ? 'ON' : 'OFF';
    toggleLabel.x = on ? -toggleW / 4 : toggleW / 4;

    // Status
    dcStatus.text = on ? '2x SCATTER CHANCE' : 'TAP TO ENABLE';
    dcStatus.style.fill = on ? 0x44dd88 : 0x888888;

    // Card tint when disabled during spin/FS
    const canToggle = !spinning && !inFS;
    dcCard.alpha = canToggle ? 1.0 : 0.5;
    dcCard.cursor = canToggle ? 'pointer' : 'default';
  }

  // Make _updateDCCard globally accessible for updateUI
  window._updateDCCard = _updateDCCardInner;

  // Toggle on click
  dcCard.on('pointerdown', () => {
    if (spinning || inFS) return;
    playSound('button_click');
    doubleChanceEnabled = !doubleChanceEnabled;
    localStorage.setItem('doubleChance', doubleChanceEnabled);

    // Animate nub slide
    const startX = toggleNub.x;
    const endX = doubleChanceEnabled ? toggleW / 2 - toggleR : -toggleW / 2 + toggleR;
    let at = 0;
    const slideFn = (sdt) => {
      at += sdt;
      const sp = Math.min(at / 8, 1);
      toggleNub.x = startX + (endX - startX) * sp;
      if (sp >= 1) { app.ticker.remove(slideFn); }
    };
    app.ticker.add(slideFn);

    updateUI();
  });

  // Hover effect
  dcCard.on('pointerover', () => {
    if (!spinning && !inFS) dcCard.scale.set(1.03);
  });
  dcCard.on('pointerout', () => {
    dcCard.scale.set(1.0);
  });

  // Initial draw
  _updateDCCardInner();
  layerUI.addChild(dcCard);
}

function showBuyBonusModal() {
  if (buyBonusOverlay) return;
  _hideSideUI();
  _lockGameUI();
  // Auto-disable Double Chance when buying bonus (mutually exclusive)
  if (doubleChanceEnabled) {
    doubleChanceEnabled = false;
    localStorage.setItem('doubleChance', 'false');
    updateUI();
  }
  playSound('bonus_buy_open');

  // ── Full-viewport HTML dark overlay ──
  // z-index:3 sits above canvas (z-index:2), canvas bumped to z-index:4 so PIXI modal shows on top
  const htmlDim = document.createElement('div');
  htmlDim.style.cssText = 'position:fixed;inset:0;width:100vw;height:100vh;background:rgba(0,0,0,0.55);z-index:3;';
  document.body.appendChild(htmlDim);
  app.view.style.zIndex = '4';

  const modal = new PIXI.Container();
  buyBonusOverlay = modal;
  modal._dim = null;
  modal._htmlDim = htmlDim;
  modal._tickerFns = [];
  app.stage.addChild(modal);

  // ── Background plate — AI candy frame (no baked text), scaled up ──
  const plateTex = PIXI.Texture.from(assetMap['bonus_select_plate']);
  const plate = new PIXI.Sprite(plateTex);
  const CW = 320, CH = 460;
  const GAP = 50;
  // Frame sized to fit cards with ~100px padding on each side
  const PLATE_W = CW * 2 + GAP + 200, PLATE_H = CH + 250;
  plate.width = PLATE_W; plate.height = PLATE_H;
  plate.x = (BASE_W - PLATE_W) / 2;
  plate.y = (BASE_H - PLATE_H) / 2;
  modal.addChild(plate);

  // ── Title text — code-rendered to avoid AI typos ──
  const titleTxt = new PIXI.Text('CHOOSE YOUR BONUS', {
    fontFamily: 'Cherry Bomb One, Fredoka, Georgia', fontSize: 38, fontWeight: 'bold',
    fill: [0xffd700, 0xff8866, 0xffd700], fillGradientStops: [0, 0.5, 1],
    stroke: 0x3a1500, strokeThickness: 5, letterSpacing: 4,
  });
  titleTxt.anchor.set(0.5);
  titleTxt.x = BASE_W / 2;
  titleTxt.y = (BASE_H - PLATE_H) / 2 + 65;
  modal.addChild(titleTxt);

  // ── Card builder — each card IS the button ──
  // Center cards inside the plate, below the title (~120px title area)
  const plateY = (BASE_H - PLATE_H) / 2;
  const titleArea = 100;  // space reserved for title at top of plate
  const cardY = plateY + titleArea + (PLATE_H - titleArea - CH) / 2 - 40;

  function makeCard(x, cardAsset, costMult, onBuy) {
    const cont = new PIXI.Container();
    cont.x = x; cont.y = cardY;
    cont.interactive = true; cont.cursor = 'pointer';

    // AI card sprite
    const cardSprite = new PIXI.Sprite(PIXI.Texture.from(assetMap[cardAsset]));
    cardSprite.width = CW; cardSprite.height = CH;
    cont.addChild(cardSprite);

    // Price text — overlaid on lollipop stick area (lower-center of card)
    const cost = costMult * bet;
    const priceGlow = new PIXI.Graphics();
    priceGlow.beginFill(0x000000, 0.35);
    priceGlow.drawRoundedRect(CW / 2 - 70, CH * 0.62 - 16, 140, 34, 10);
    priceGlow.endFill();
    cont.addChild(priceGlow);

    const priceTxt = new PIXI.Text(formatMoney(cost), {
      fontFamily: 'Cherry Bomb One, Fredoka, Georgia', fontSize: 24, fontWeight: 'bold',
      fill: [0xffd700, 0xffffff, 0xffd700], fillGradientStops: [0, 0.5, 1],
      stroke: 0x2a0800, strokeThickness: 4,
    });
    priceTxt.anchor.set(0.5);
    priceTxt.x = CW / 2; priceTxt.y = CH * 0.63;
    cont.addChild(priceTxt);

    // Hover — scale + glow pulse
    let _pulseT = 0, _pulseFn = null;
    cont.on('pointerover', () => {
      if (!_pulseFn) {
        _pulseT = 0;
        _pulseFn = (dt) => {
          _pulseT += dt;
          cont.scale.set(1.04 + Math.sin(_pulseT * 0.15) * 0.015);
        };
        app.ticker.add(_pulseFn);
        modal._tickerFns.push(_pulseFn);
      }
    });
    cont.on('pointerout', () => {
      cont.scale.set(1.0);
      if (_pulseFn) { app.ticker.remove(_pulseFn); _pulseFn = null; }
    });

    // Click — open confirmation
    cont.on('pointerdown', () => {
      if (balance >= cost) {
        playSound('button_click');
        _showConfirmation(cost, () => onBuy(cost));
      } else {
        showToast('INSUFFICIENT BALANCE');
      }
    });

    modal.addChild(cont);
    return { card: cont, priceTxt };
  }

  // ── Left card: Free Spins ──
  const leftCard = makeCard(
    BASE_W / 2 - CW - GAP / 2 + 30, 'bonus_card_freespins',
    BONUS_COST_NORMAL,
    (cost) => {
      closeBuyBonus();
      _simMode = 'buy_bonus';
      balance = Math.round((balance - cost + bet) * 100) / 100;
      RGS.play(bet, 'buy_bonus');
      _forceBonusSpin = true;
      updateUI();
      startSpin();
    }
  );

  // ── Right card: Super Free Spins ──
  const rightCard = makeCard(
    BASE_W / 2 + GAP / 2 - 60, 'bonus_card_super',
    BONUS_COST_SUPER,
    (cost) => {
      closeBuyBonus();
      _simMode = 'super_buy_bonus';
      balance = Math.round((balance - cost + bet) * 100) / 100;
      RGS.play(bet, 'super_buy_bonus');
      _buyBonusSuper = true;
      _forceBonusSpin = true;
      updateUI();
      startSpin();
    }
  );

  // ── Close button (X) — top right of plate ──
  const closeBtn = new PIXI.Container();
  closeBtn.x = (BASE_W + PLATE_W) / 2 - 28;
  closeBtn.y = (BASE_H - PLATE_H) / 2 + 22;
  closeBtn.interactive = true; closeBtn.cursor = 'pointer';

  const xBg = new PIXI.Graphics();
  xBg.beginFill(0x3a1500, 0.85);
  xBg.lineStyle(2, 0xffd700, 0.6);
  xBg.drawCircle(0, 0, 18);
  xBg.endFill();
  closeBtn.addChild(xBg);

  const xTxt = new PIXI.Text('✕', {
    fontFamily: 'Cherry Bomb One, Arial', fontSize: 18, fontWeight: 'bold', fill: 0xffd700,
  });
  xTxt.anchor.set(0.5); xTxt.y = -1;
  closeBtn.addChild(xTxt);

  closeBtn.on('pointerover', () => { xBg.tint = 0xff8888; xTxt.style.fill = 0xffffff; closeBtn.scale.set(1.1); });
  closeBtn.on('pointerout',  () => { xBg.tint = 0xffffff; xTxt.style.fill = 0xffd700; closeBtn.scale.set(1.0); });
  closeBtn.on('pointerdown', () => { playSound('button_click'); closeBuyBonus(); });
  modal.addChild(closeBtn);

  // ── Confirmation dialog (lives inside the same overlay system) ──
  function _showConfirmation(cost, onConfirm) {
    // Hide the choose-your-bonus PIXI modal (CANCEL will reopen)
    modal.visible = false;

    // ── Build confirm modal as HTML/CSS DOM overlay (not PixiJS) ──
    const overlayEl = document.createElement('div');
    overlayEl.className = 'confirm-modal-overlay';
    overlayEl.innerHTML = `
      <div class="confirm-modal-container">
        <img src="assets/confirm_panel.png" class="confirm-panel-bg" alt="" />
        <div class="confirm-content">
          <h1 class="confirm-title">CONFIRM PURCHASE</h1>
          <p class="confirm-label">TOTAL COST</p>
          <p class="confirm-price">${formatMoney(cost)}</p>
          <div class="confirm-buttons">
            <button class="confirm-btn cancel-btn" data-action="cancel">CANCEL</button>
            <button class="confirm-btn confirm-btn-green" data-action="confirm">CONFIRM</button>
          </div>
        </div>
      </div>
    `;
    document.body.appendChild(overlayEl);

    // Close helper — remove DOM element, reopen choose-your-bonus
    function closeConfirm(reopen) {
      if (overlayEl.parentNode) overlayEl.parentNode.removeChild(overlayEl);
      if (reopen) modal.visible = true;
    }

    // Click overlay background → cancel
    overlayEl.addEventListener('click', (e) => {
      if (e.target === overlayEl) {
        playSound('button_click');
        closeConfirm(true);
      }
    });

    // CANCEL button
    overlayEl.querySelector('[data-action="cancel"]').addEventListener('click', () => {
      playSound('button_click');
      closeConfirm(true);
    });

    // CONFIRM button
    overlayEl.querySelector('[data-action="confirm"]').addEventListener('click', () => {
      playSound('bonus_buy_confirm');
      if (balance < cost) { showToast('INSUFFICIENT BALANCE'); closeConfirm(true); return; }
      closeConfirm(false);
      onConfirm();
    });

    // Store ref for cleanup on closeBuyBonus
    modal._confirmOverlay = overlayEl;
  }

  // Animate in — simple fade
  modal.alpha = 0;
  htmlDim.style.opacity = '0';
  let inT = 0;
  const inFn = (dt) => {
    inT += dt;
    const a = Math.min(inT / 10, 1);
    modal.alpha = a;
    htmlDim.style.opacity = String(a);
    if (inT >= 10) app.ticker.remove(inFn);
  };
  app.ticker.add(inFn);
  modal._tickerFns.push(inFn);
}


function closeBuyBonus() {
  if (!buyBonusOverlay) return;
  playSound('modal_close');
  _showSideUI();
  _unlockGameUI();
  if (buyBonusOverlay._tickerFns) buyBonusOverlay._tickerFns.forEach(fn => app.ticker.remove(fn));
  // Clean up HTML confirm overlay if open
  if (buyBonusOverlay._confirmOverlay && buyBonusOverlay._confirmOverlay.parentNode) {
    buyBonusOverlay._confirmOverlay.parentNode.removeChild(buyBonusOverlay._confirmOverlay);
  }
  // Clean up HTML dark overlay
  if (buyBonusOverlay._htmlDim && buyBonusOverlay._htmlDim.parentNode) {
    buyBonusOverlay._htmlDim.parentNode.removeChild(buyBonusOverlay._htmlDim);
  }
  const dim = buyBonusOverlay._dim;
  if (dim) { app.stage.removeChild(dim); dim.destroy(); }
  app.view.style.zIndex = '2';
  app.stage.removeChild(buyBonusOverlay);
  buyBonusOverlay.destroy({ children: true });
  buyBonusOverlay = null;
}

function makeSpinBtn(x, y) {
  const c = new PIXI.Container();
  c.interactive = true; c.cursor = 'pointer';
  c.x = x; c.y = y;

  // — Candy donut spin button image —
  const tex = PIXI.Texture.from(assetMap['spin_btn']);
  const medallion = new PIXI.Sprite(tex);
  medallion.anchor.set(0.5);
  medallion.width = 130;
  medallion.height = 130;
  c.addChild(medallion);

  // — Advanced rainbow candy rings —
  const pulseOuter = new PIXI.Container();
  const rainbowColors = [0xff4488, 0xff8844, 0xffdd44, 0x44dd88, 0x44aaff, 0xcc44ff, 0xff44cc];
  const numSegments = rainbowColors.length;
  const arcLen = (Math.PI * 2) / numSegments;
  // Outer ring
  const ring1 = new PIXI.Graphics();
  rainbowColors.forEach((col, i) => {
    ring1.lineStyle(3.5, col, 0.8);
    ring1.arc(0, 0, 74, i * arcLen, (i + 1) * arcLen - 0.04);
  });
  // Inner ring (offset colors)
  const ring2 = new PIXI.Graphics();
  rainbowColors.forEach((col, i) => {
    const ci = (i + 3) % numSegments; // offset colors
    ring2.lineStyle(2, rainbowColors[ci], 0.5);
    ring2.arc(0, 0, 68, i * arcLen, (i + 1) * arcLen - 0.04);
  });
  // Glow dots at segment boundaries
  const dots = new PIXI.Graphics();
  rainbowColors.forEach((col, i) => {
    const angle = i * arcLen;
    dots.beginFill(col, 0.9);
    dots.drawCircle(Math.cos(angle) * 74, Math.sin(angle) * 74, 3);
    dots.endFill();
  });
  pulseOuter.addChild(ring2, ring1, dots);
  c.addChild(pulseOuter);
  const pulse = pulseOuter; // keep reference name for animation

  // — Stop icon overlay (shown while spinning) —
  const stopShape = new PIXI.Graphics();
  stopShape.beginFill(0xffffff, 0.9);
  stopShape.drawRoundedRect(-11, -11, 22, 22, 3);
  stopShape.endFill();
  stopShape.visible = false;
  c.addChild(stopShape);

  // — Interactions —
  c.on('pointerdown', () => {
    playSound('button_click');
    if (_skipWinLines) { _skipWinLines(); return; }
    // Stop auto spins even while spinning
    if (autoSpins !== 0) { autoSpins = 0; _updateAutoBtn(); _hideAutoPicker(); if (spinning) return; }
    if (spinning) return;
    startSpin(); c.scale.set(0.93);
  });
  c.on('pointerup',   () => c.scale.set(1.0));
  c.on('pointerupoutside', () => c.scale.set(1.0));
  c.on('pointerover', () => {
    if (!spinning) { medallion.tint = 0xffccaa; c.scale.set(1.06); }
  });
  c.on('pointerout',  () => { medallion.tint = 0xffffff; c.scale.set(spinning ? 1 : 1.0); });

  // — Animations —
  let bt = 0;
  app.ticker.add((dt) => {
    bt += dt;
    // Stop icon when spinning
    stopShape.visible = spinning;
    // Rainbow rings: counter-rotate, breathe, scale pulse
    pulse.alpha = spinning ? 0 : 0.5 + Math.sin(bt * 0.06) * 0.35;
    ring1.rotation = bt * 0.015;
    ring2.rotation = -bt * 0.01;
    dots.rotation = bt * 0.02;
    const sc = 1 + Math.sin(bt * 0.04) * 0.04;
    pulse.scale.set(sc);
    // Slow rotation when idle
    medallion.rotation = spinning ? medallion.rotation : bt * 0.003;
  });

  layerUI.addChild(c);
}

function _updateTurboBtn() {
  if (!_turboBtn) return;

    _turboBtn.sp.tint = turboMode === 0 ? 0xffffff : turboMode === 1 ? 0xffcc44 : 0xffff00;
  }
  // Show speed label below button
  if (!_turboLabel) {
    _turboLabel = new PIXI.Text('', {
      fontFamily: 'Cherry Bomb One, Arial', fontSize: 10, fill: 0xffffff,
      dropShadow: true, dropShadowColor: 0x000000, dropShadowBlur: 2, dropShadowDistance: 1,
    });
    _turboLabel.anchor.set(0.5, 0);
    _turboLabel.x = _turboBtn.c.x;
    _turboLabel.y = _turboBtn.c.y + 24;
    layerUI.addChild(_turboLabel);
  }
  _turboLabel.text = turboMode === 0 ? '' : turboMode === 1 ? 'FAST' : 'TURBO';
  _turboLabel.style.fill = turboMode === 1 ? 0xffcc44 : 0xffff00;
}

function _updateAutoBtn() {
  if (!_autoBtn) return;
  const on = autoSpins !== 0;
  if (_autoBtn.sp) {
    _autoBtn.sp.tint = on ? 0xffcc44 : 0xffffff;
  }
}

function _showAutoPicker() {
  if (_autoPicker) { _autoPicker.visible = true; return; }
  const counts = [10, 25, 50, 100, 0]; // 0 = ∞
  const BW = 52, BH = 32, GAP = 6;
  const totalW = counts.length * BW + (counts.length - 1) * GAP + 16;
  let px = _autoBtn.c.x - totalW / 2;
  if (px + totalW > BASE_W - 8) px = BASE_W - totalW - 8;
  if (px < 8) px = 8;
  const py = _autoBtn.c.y - 56;

  _autoPicker = new PIXI.Container();
  _autoPicker.x = px; _autoPicker.y = py;

  const bg = new PIXI.Graphics();
  bg.beginFill(0x2a0a30, 0.95);
  bg.lineStyle(2, 0xffd700, 0.8);
  bg.drawRoundedRect(0, 0, totalW, BH + 16, 12);
  bg.endFill();

// ─────────────────────────────────────────────────────────────
//  REEL TICKER
// ─────────────────────────────────────────────────────────────
app.ticker.add((dt) => {
  // PixiJS v7: callback receives deltaTime scalar directly (≈1 at 60fps, ≈2 at 30fps)
  const now = Date.now();

  for (let r = 0; r < REELS; r++) {
    const rs = reelState[r];
    if (!rs.spinning) continue;
    if (now < rs.startTime) continue;   // staggered start — wait for this reel's turn

    const rc = reelContainers[r];

    // ── Phase 0: Backward lurch (reels pull UP before spinning down) ──
    if (rs.lurching) {
      rs.lurchT += dt;
      const p = Math.min(rs.lurchT / LURCH_DUR, 1);
      // Smooth ease-out: fast start, gentle settle at peak
      const ease = 1 - Math.pow(1 - p, 3);
      rc.y = rs.lurchBaseY - LURCH_DIST * ease;
      if (p >= 1) {
        rs.lurching = false;
        rc.y = rs.lurchBaseY; // reset — sprites handle the visual offset
      }
      continue; // don't scroll during lurch
    }

    // ── Acceleration phase: ramp 0 → MAX_VEL (frame-rate independent) ──
    if (!rs.stopping && rs.velocity < MAX_VEL) {
      rs.velocity = Math.min(rs.velocity + ACCEL * dt, MAX_VEL);
    }

    // ── Trigger deceleration ──────────────────────────────
    if (!rs.stopping && now >= rs.stopTime) rs.stopping = true;

    // ── Exponential decay deceleration (frame-rate independent via Math.pow) ──
    if (rs.stopping) {
      rs.velocity *= Math.pow(0.78, dt);
      if (rs.velocity < 5) rs.velocity = 0;
    }

    // ── Scroll sprites down (scaled by deltaTime) ──────────
    const sprites = reelSprites[r];
    for (const sp of sprites) sp.y += rs.velocity * dt;

    // ── Blur: high velocity = full blur; near-stop = remove early (skip on mobile) ──
    if (!_isMobile) {
      const blurVal = rs.velocity * 0.5;
      if (blurVal > 2) {
        reelBlur[r].blurY = Math.min(blurVal, 18);
        if (!rc.filters) rc.filters = reelBlurArr[r];
      } else {
        rc.filters = null;
      }
    }

    // ── Recycle sprites — only during active (non-stopping) spin ──
    if (!rs.stopping) {
      let topY = Infinity;
      for (const s of sprites) { if (s.y < topY) topY = s.y; }
      for (const sp of sprites) {
        if (sp.y >= ROWS * CELL) {
          sp.y = topY - CELL;
          topY = sp.y;
          sp.texture = T(weightedRandom(WEIGHTS));
          sp.width = SYM_SIZE; sp.height = SYM_SIZE;
          sp.rotation = 0;
          sp.tint = 0xffffff;
        }
      }
    }

    // ── Fully stopped ──────────────────────────────────────
    // Gate: don't let reels stop until RGS data has arrived (prevents visual mismatch)
    if (rs.stopping && rs.velocity === 0 && !_rgsDataReady) {
      rs.velocity = 8; // keep spinning at low speed until RGS data arrives
      rs.stopping = false;
    }
    if (rs.stopping && rs.velocity === 0 && !rs.overshooting) {
      snapReel(r);
      rs.spinning = false;
      rs.stopped  = true;
      rc.filters = null;
      playSound('reel_stop');

      // ── Elastic overshoot: snap past target, bounce back ──
      if (!turboMode) {
        rs.overshooting = true;
        rs.overshootT = 0;
        rs.overshootBaseY = GRID_Y;
        // Cancel any lingering bounce from a previous spin
        if (rc._bounceFn) { app.ticker.remove(rc._bounceFn); rc._bounceFn = null; }
        let ot = 0;
        const ovFn = (odt) => {
          ot += odt;
          const p = Math.min(ot / OVERSHOOT_DUR, 1);
          // Elastic ease: overshoot down then spring back with damped oscillation
          const decay = Math.exp(-p * 4);
          const osc = Math.cos(p * Math.PI * 2.5);
          rc.y = GRID_Y + OVERSHOOT_DIST * decay * (1 - p) * osc;
          if (p >= 1) {
            rc.y = GRID_Y;
            rs.overshooting = false;
            app.ticker.remove(ovFn);
            rc._bounceFn = null;
          }
        };
        rc._bounceFn = ovFn;
        app.ticker.add(ovFn);
      } else {
        // Turbo: quick bounce (original behavior)
        if (rc._bounceFn) { app.ticker.remove(rc._bounceFn); rc._bounceFn = null; }
        rc.y = GRID_Y + 7;
        let bt = 0, bounceFn;
        bounceFn = (bdt) => {
          bt += bdt;
          if (bt >= 8) { rc.y = GRID_Y; app.ticker.remove(bounceFn); rc._bounceFn = null; return; }
          rc.y = GRID_Y + 7 * Math.exp(-bt * 0.28) * Math.cos(bt * 0.65);
        };
        rc._bounceFn = bounceFn;
        app.ticker.add(bounceFn);
      }

      checkAllStopped();
    }
  }
});

function snapReel(r) {
  const sprites  = reelSprites[r];
  const target   = reelState[r].targetSyms;
  if (!target) return;

  // Sort sprites by Y position
  sprites.sort((a, b) => a.y - b.y);
  // Assign positions: index 0 = row above (-CELL), 1-3 = visible rows, 4 = below
  for (let i = 0; i < sprites.length; i++) {
    sprites[i].x = 0;
    sprites[i].y = (i - 1) * CELL;
    sprites[i].width  = SYM_SIZE;
    sprites[i].height = SYM_SIZE;
    sprites[i].rotation = 0;
    sprites[i].tint = 0xffffff;
    // Assign target symbols to visible rows
    const row = i - 1; // row -1 is buffer above, rows 0-2 are visible
    if (row >= 0 && row < ROWS) {
      sprites[i].texture = T(target[row]);
      sprites[i].width   = SYM_SIZE;
      sprites[i].height  = SYM_SIZE;
    }
  }
}
