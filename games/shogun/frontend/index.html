// ─────────────────────────────────────────────────────────────
//  REEL TICKER
// ─────────────────────────────────────────────────────────────
app.ticker.add((dt) => {
  // PixiJS v7: callback receives deltaTime scalar directly (≈1 at 60fps, ≈2 at 30fps)
  const now = Date.now();

  for (let r = 0; r < REELS; r++) {
    const rs = reelState[r];
    if (!rs.spinning) continue;
    if (now < rs.startTime) continue;   // staggered start — wait for this reel's turn

    // ── Acceleration phase: ramp 0 → MAX_VEL (frame-rate independent) ──
    if (!rs.stopping && rs.velocity < MAX_VEL) {
      rs.velocity = Math.min(rs.velocity + ACCEL * dt, MAX_VEL);
    }

    // ── Trigger deceleration ──────────────────────────────
    if (!rs.stopping && now >= rs.stopTime) rs.stopping = true;

    // ── Exponential decay deceleration (frame-rate independent via Math.pow) ──
    // Math.pow(0.78, dt) applies the same total decel regardless of frame rate.
    if (rs.stopping) {
      rs.velocity *= Math.pow(0.78, dt);
      if (rs.velocity < 5) rs.velocity = 0;
    }

    // ── Scroll sprites down (scaled by deltaTime) ──────────
    const sprites = reelSprites[r];
    for (const sp of sprites) sp.y += rs.velocity * dt;

    // ── Blur: high velocity = full blur; near-stop = remove early ──
    const blurVal = rs.velocity * 0.5;
    if (blurVal > 2) {
      reelBlur[r].blurY = Math.min(blurVal, 18);
      if (!reelContainers[r].filters) reelContainers[r].filters = [reelBlur[r]];
    } else {
      reelContainers[r].filters = null;
    }

    // ── Recycle sprites — only during active (non-stopping) spin ──
    if (!rs.stopping) {
      for (const sp of sprites) {
        if (sp.y >= ROWS * CELL) {
          let topY = Infinity;
          for (const s of sprites) { if (s.y < topY) topY = s.y; }
          sp.y = topY - CELL;
          sp.texture = T(weightedRandom(WEIGHTS));
          sp.width = SYM_SIZE; sp.height = SYM_SIZE;
        }
      }
    }

    // ── Fully stopped ──────────────────────────────────────
    // Gate: don't let reels stop until RGS data has arrived (prevents visual mismatch)
    if (rs.stopping && rs.velocity === 0 && !_rgsDataReady) {
      rs.velocity = 8; // keep spinning at low speed until RGS data arrives
      rs.stopping = false;
    }
    if (rs.stopping && rs.velocity === 0) {
      snapReel(r);
      rs.spinning = false;
      rs.stopped  = true;
      reelContainers[r].filters = null;
      playSound('reel_stop');

      // Bounce: drop ~7px on impact, spring back with damped cosine (frame-rate independent)
      const rc = reelContainers[r];
      // Cancel any lingering bounce from a previous spin
      if (rc._bounceFn) { app.ticker.remove(rc._bounceFn); rc._bounceFn = null; }
      rc.y = GRID_Y + 7;
      let bt = 0, bounceFn;
      bounceFn = (bdt) => {
        bt += bdt;
        if (bt >= (turboMode ? 8 : 18)) { rc.y = GRID_Y; app.ticker.remove(bounceFn); rc._bounceFn = null; return; }
        rc.y = GRID_Y + 7 * Math.exp(-bt * 0.28) * Math.cos(bt * 0.65);
      };
      rc._bounceFn = bounceFn;
      app.ticker.add(bounceFn);

      checkAllStopped();
    }
  }
});

function snapReel(r) {
  const sprites  = reelSprites[r];
  const target   = reelState[r].targetSyms;
  if (!target) return;

  // Sort sprites by Y position
  sprites.sort((a, b) => a.y - b.y);
  // Assign positions: index 0 = row above (-CELL), 1-3 = visible rows, 4 = below
  for (let i = 0; i < sprites.length; i++) {
    sprites[i].x = 0;
    sprites[i].y = (i - 1) * CELL;
    sprites[i].width  = SYM_SIZE;
    sprites[i].height = SYM_SIZE;
    // Assign target symbols to visible rows
    const row = i - 1; // row -1 is buffer above, rows 0-2 are visible
    if (row >= 0 && row < ROWS) {
      sprites[i].texture = T(target[row]);
      sprites[i].width   = SYM_SIZE;
      sprites[i].height  = SYM_SIZE;
    }
  }
}

// ─────────────────────────────────────────────────────────────
//  SPIN CONTROL
// ─────────────────────────────────────────────────────────────
function startSpin() {
  if (spinning) return;
  if (_rgsBlocked) return;
  if (_winCelebrationActive) return;  // block during win celebration
  if (!IS_REPLAY && !inFS && balance < bet) { showToast('INSUFFICIENT BALANCE'); return; }
  spinning    = true;
  _resultDone = false;
  _spinGen++;
  clearWinLines();
  playSound('spin_start');
  RGS.betEvent(inFS ? 'freespin' : 'base');

  // Base game: clear any expanded wilds from previous spin before generating new board.
  // FS: wildReels persists (sticky mechanic) — only cleared in triggerFS/endFS.
  if (!inFS) {
    wildReels = [];
    resetOverlays();
    roundWin  = 0;
    if (!IS_REPLAY) balance = Math.round((balance - bet) * 100) / 100;
    updateUI();

    if (IS_REPLAY) {
      // ═══ REPLAY MODE: spin data already loaded by startReplayPlayback ═══
      // Don't pick new book entry or call RGS — just use existing _simSpins
    } else if (!IS_DEMO) {
      // ═══ RGS BASE GAME: RGS data is the ONLY source of truth ═══
      // No local book data used — prevents visual mismatch between book and RGS.
      _rgsDataReady = false;
      const wasBuyBonus = _forceBonusSpin; // buy bonus handler already called RGS.play() with correct cost
      _forceBonusSpin = false;
      setTimeout(() => { if (!_rgsDataReady) { _rgsDataReady = true; console.warn('[RGS] timeout — ungating reels'); } }, 10000);
      if (!wasBuyBonus) RGS.play(bet, _simMode); // skip if buy bonus already initiated the round
      // Generate random placeholder board for reel spinning animation.
      // RGS.play() callback will overwrite targetSyms with real data before reels stop.
      lastBoard = [];
      for (let r = 0; r < REELS; r++) {
        const col = [];
        for (let row = 0; row < ROWS; row++) col.push(weightedRandom(WEIGHTS));
        lastBoard.push(col);
      }
      _simSpins = [];  // empty until RGS populates
      _simSpinIdx = 0;
      _simMaxPayout = 0;
    } else {
      // ═══ DEMO BASE GAME: use local book data ═══
      if (!_forceBonusSpin) RGS.play(bet, _simMode);
      _forceBonusSpin = false;
      const entry = pickBookEntry(_simMode);
      if (!entry) { spinning = false; showToast('BOOK NOT LOADED'); return; }
      _currentEntry = entry;
      const processed = processBookEntry(entry);
      _simSpins = processed.spins;
      _simMaxPayout = processed.totalPayout;
      _simSpinIdx = 0;
    }
  } else {
    // ═══ FREE SPINS: increment through existing spin array ═══
    fsLeft--;
    _simSpinIdx++;
    if (fsLeft < 0 || _simSpinIdx >= _simSpins.length) {
      spinning = false;
      endFS();
      return;
    }
  }
  updateUI();

  // Get current spin data — in RGS base game, _simSpins is empty here (filled by RGS callback later)
  const spinData = _simSpins[_simSpinIdx];
  if (!IS_DEMO && !inFS) {
    // RGS mode: don't need spinData yet — reels will spin on random targets.
    // RGS.play() callback sets real lastBoard, targetSyms, and _simSpins.
    // onAllStopped() will read the final spinData after RGS data arrives.
  } else {
    // Demo/FS: spinData must exist from book
    if (!spinData || !spinData.board) {
      spinning = false;
      if (inFS) { showToast('RECOVERING...'); endFS(); return; }
      showToast('BOOK DATA ERROR');
      return;
    }
    lastBoard = spinData.board;
  }

  // Strip expanding wild reels for demo/FS (RGS mode handles this in RGS.play callback)
  if ((IS_DEMO || inFS) && spinData && spinData.wilds && spinData.wilds.length > 0) {
    for (const w of spinData.wilds) {
      const isSticky = wildReels.some(wr => wr.reel === w.reel);
      if (isSticky) continue;
      let wildRow = -1;
      for (let row = 0; row < ROWS; row++) {
        if (lastBoard[w.reel][row] === WILD) { wildRow = row; break; }
      }
      w._landedRow = wildRow >= 0 ? wildRow : 2;
      for (let row = 0; row < ROWS; row++) {
        if (row === w._landedRow) continue;
        if (lastBoard[w.reel][row] === WILD) {
          lastBoard[w.reel][row] = weightedRandom(inFS ? WEIGHTS_FS : WEIGHTS);
        }
      }
    }
  }

  const now = Date.now();
  let spinDelay = 0;

  for (let r = 0; r < REELS; r++) {
    const rs      = reelState[r];
    const isSticky = inFS && wildReels.some(w => w.reel === r);

    if (isSticky) {
      // Locked wild reel — doesn't spin, stays as overlay
      rs.spinning  = false;
      rs.stopping  = false;
      rs.stopped   = true;
      rs.targetSyms = lastBoard[r];
    } else {
      rs.spinning   = true;
      rs.stopping   = false;
      rs.stopped    = false;
      rs.velocity   = 0;
      rs.targetSyms = lastBoard[r];
      rs.startTime  = now + r * (turboMode ? 30 : REEL_STAGGER);
      rs.stopTime   = rs.startTime + (turboMode ? 400 : 1500) + spinDelay * (turboMode ? 60 : 210);
      spinDelay++;
      reelContainers[r].filters = null;
    }
  }

  // Scatter anticipation moved to RGS.play() callback — uses RGS data, not local book
  // In demo mode, use local book data for anticipation
  // Scatter anticipation — includes random teases (demo mode)
  if (IS_DEMO && !inFS && !turboMode && !reelState[4].stopped) {
    const sc0 = lastBoard[0].includes(SCATTER);
    const sc2 = lastBoard[2].includes(SCATTER);
    const realAnticipation = sc0 && sc2;
    const teaseAnticipation = !realAnticipation && Math.random() < 0.10;
    if (realAnticipation || teaseAnticipation) {
      reelState[4].stopTime = Math.max(reelState[4].stopTime, reelState[2].stopTime + 3500);
      const glowDelay = reelState[2].stopTime - Date.now() + 400;
      setTimeout(() => { if (spinning) startAnticipation(4); }, Math.max(glowDelay, 0));
    }
  }

  // If every reel is sticky (all wild), no reel will spin — trigger directly
  if (reelState.every(rs => rs.stopped)) {
    _resultDone = true;
    onAllStopped();
  }
}

function checkAllStopped() {
  if (reelState.some(rs => !rs.stopped)) return;
  if (_resultDone) return;   // already processed this spin's result
  _resultDone = true;
  // NOTE: spinning stays true here — onAllStopped / expandWilds will clear it
  // only after all post-spin animations (wild expansion, scatter pop) finish.
  onAllStopped();
}

function pulseScatterCells() {
  playSound('scatter_land');
  // Premium scatter landing: golden shockwave ring + spark particles per cell
  for (let r = 0; r < REELS; r++) {
    for (let row = 0; row < ROWS; row++) {
      if (lastBoard[r][row] !== SCATTER) continue;
      const cx = GRID_X + r * CELL + SYM_SIZE / 2;
      const cy = GRID_Y + row * CELL + SYM_SIZE / 2;

      // Expanding shockwave ring
      const ring = new PIXI.Graphics();
      layerFX.addChild(ring);

      // Bright center flash (white-gold)
      const flash = new PIXI.Graphics();
      flash.beginFill(0xfff8e0, 0.9);
      flash.drawCircle(cx, cy, SYM_SIZE * 0.3);
      flash.endFill();
      flash.filters = [new PIXI.filters.BlurFilter(12)];
      layerFX.addChild(flash);

      // Spark particles
      const sparks = [];
      for (let i = 0; i < 14; i++) {
        const s = new PIXI.Graphics();
        const sz = 1.5 + Math.random() * 2.5;
        s.beginFill(Math.random() < 0.6 ? 0xffd700 : 0xffffff, 1);
        s.drawCircle(0, 0, sz);
        s.endFill();
        s.x = cx; s.y = cy;
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 3;
        s._vx = Math.cos(angle) * speed;
        s._vy = Math.sin(angle) * speed;
        layerFX.addChild(s);
        sparks.push(s);
      }

      let t = 0;
      const _scDur = turboMode ? 12 : 35;
      const fn = (dt) => {
        t += dt;
        const p = Math.min(t / _scDur, 1);

        // Ring expands outward
        const radius = SYM_SIZE * 0.2 + p * SYM_SIZE * 0.6;
        const rAlpha = 0.8 * (1 - p);
        ring.clear();
        ring.lineStyle(3 - p * 2, 0xffd700, rAlpha);
        ring.drawCircle(cx, cy, radius);
        if (p < 0.5) {
          ring.lineStyle(1.5, 0xffffff, rAlpha * 0.5);
          ring.drawCircle(cx, cy, radius * 0.85);
        }

        // Center flash fades
        flash.alpha = 0.9 * Math.pow(1 - p, 2);

        // Sparks fly outward and fade
        sparks.forEach(s => {
          s.x += s._vx; s.y += s._vy;
          s._vx *= 0.96; s._vy *= 0.96;
          s.alpha = Math.max(0, 1 - p * 1.3);
        });

        if (t >= _scDur) {
          layerFX.removeChild(ring); ring.destroy();
          layerFX.removeChild(flash); flash.destroy();
          sparks.forEach(s => { layerFX.removeChild(s); s.destroy(); });
          app.ticker.remove(fn);
        }
      };
      app.ticker.add(fn);
    }
  }
}

function animateScatterPop(cb) {
  const scatters = [];
  for (let r = 0; r < REELS; r++)
    for (let row = 0; row < ROWS; row++)
      if (lastBoard[r][row] === SCATTER)
        scatters.push({ r, row });

  // Guard: if no scatter symbols on board (data mismatch), don't hang — call cb immediately
  if (scatters.length === 0) {
    console.warn('[SCATTER] scatterTrigger fired but no scatter symbols on board — skipping animation');
    cb();
    return;
  }

  const scatterTex = T(SCATTER);
  const cleanup    = [];
  let done = 0;

  scatters.forEach(({ r, row }, idx) => {
    setTimeout(() => {
      const cx = GRID_X + r * CELL;
      const cy = GRID_Y + row * CELL;
      const mx = cx + SYM_SIZE / 2;
      const my = cy + SYM_SIZE / 2;

      // Light rays radiating from center
      const rays = new PIXI.Graphics();
      cleanup.push(rays);
      layerFX.addChild(rays);

      // Expanding golden shockwave
      const wave = new PIXI.Graphics();
      cleanup.push(wave);
      layerFX.addChild(wave);

      // Bright white flash
      const cFlash = new PIXI.Graphics();
      cFlash.beginFill(0xffffff, 1);
      cFlash.drawCircle(mx, my, SYM_SIZE * 0.4);
      cFlash.endFill();
      cFlash.filters = [new PIXI.filters.BlurFilter(18)];
      cleanup.push(cFlash);
      layerFX.addChild(cFlash);

      // Scatter sprite overlay — pops in with elastic bounce
      const sp = new PIXI.Sprite(scatterTex);
      sp.anchor.set(0.5);
      sp.x = mx; sp.y = my;
      sp.width = SYM_SIZE * 0.4; sp.height = SYM_SIZE * 0.4;
      cleanup.push(sp);
      layerFX.addChild(sp);

      // Gold spark burst
      const sparks = [];
      for (let i = 0; i < 20; i++) {
        const s = new PIXI.Graphics();
        const sz = 1 + Math.random() * 3;
        s.beginFill(Math.random() < 0.5 ? 0xffd700 : 0xffaa00, 1);
        s.drawCircle(0, 0, sz);
        s.endFill();
        s.x = mx; s.y = my;
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 5;
        s._vx = Math.cos(angle) * speed;
        s._vy = Math.sin(angle) * speed;
        cleanup.push(s);
        layerFX.addChild(s);
        sparks.push(s);
      }

      let t = 0;
      const fn = (dt) => {
        t += dt;
        const p = Math.min(t / (turboMode ? 10 : 30), 1);

        // Elastic bounce for scatter sprite: overshoots to 1.4 then settles to 1.2
        const elastic = p < 1
          ? 1 - Math.pow(2, -10 * p) * Math.cos(p * Math.PI * 2.5)
          : 1;
        const sc = 0.4 + elastic * 0.8;
        sp.width  = SYM_SIZE * sc;
        sp.height = SYM_SIZE * sc;

        // Light rays — 8 beams radiating outward
        rays.clear();
        const rayAlpha = 0.5 * Math.pow(1 - p, 1.5);
        const rayLen = SYM_SIZE * 0.3 + p * SYM_SIZE * 1.2;
        for (let i = 0; i < 8; i++) {
          const a = (i / 8) * Math.PI * 2 + t * 0.02;
          rays.lineStyle(2 - p, 0xffd700, rayAlpha);
          rays.moveTo(mx, my);
          rays.lineTo(mx + Math.cos(a) * rayLen, my + Math.sin(a) * rayLen);
        }

        // Shockwave ring expands
        const waveR = SYM_SIZE * 0.3 + p * SYM_SIZE * 0.8;
        wave.clear();
        wave.lineStyle(4 * (1 - p), 0xffd700, 0.7 * (1 - p));
        wave.drawCircle(mx, my, waveR);
        if (p < 0.6) {
          wave.lineStyle(2, 0xffffff, 0.3 * (1 - p / 0.6));
          wave.drawCircle(mx, my, waveR * 0.7);
        }

        // White flash fades quickly
        cFlash.alpha = Math.pow(1 - p, 3);

        // Sparks fly out
        sparks.forEach(s => {
          s.x += s._vx; s.y += s._vy;
          s._vx *= 0.95; s._vy *= 0.95;
          s.alpha = Math.max(0, 1 - p * 1.5);
        });

        if (t >= (turboMode ? 10 : 30)) {
          app.ticker.remove(fn);
          // Settle: keep sprite enlarged with persistent golden glow
          sp.width = SYM_SIZE * 1.2; sp.height = SYM_SIZE * 1.2;
          rays.clear(); wave.clear();
          sparks.forEach(s => { s.alpha = 0; });

          // Persistent pulsing glow ring around settled scatter
          const glow = new PIXI.Graphics();
          cleanup.push(glow);
          layerFX.addChild(glow);
          let gt = 0;
          const glowFn = (gdt) => {
            gt += gdt;
            const ga = 0.35 + Math.sin(gt * 0.12) * 0.2;
            glow.clear();
            glow.lineStyle(3, 0xffd700, ga);
            glow.drawRoundedRect(cx - 6, cy - 6, SYM_SIZE + 12, SYM_SIZE + 12, 10);
            glow.lineStyle(1.5, 0xffaa00, ga * 0.4);
            glow.drawRoundedRect(cx - 10, cy - 10, SYM_SIZE + 20, SYM_SIZE + 20, 12);
          };
          app.ticker.add(glowFn);
          glow._tickFn = glowFn;

          done++;
          if (done === scatters.length) {
            const scGen = _spinGen;
            setTimeout(() => {
              cleanup.forEach(o => {
                if (o._tickFn) app.ticker.remove(o._tickFn);
                if (o.parent) o.parent.removeChild(o);
                o.destroy();
              });
              if (_spinGen === scGen) cb();
            }, turboMode ? 400 : 2200);
          }
        }
      };
      app.ticker.add(fn);
    }, idx * (turboMode ? 100 : 400));  // stagger between scatters
  });
}


async function onAllStopped() {
  // ── RGS mode: await play response and sync data BEFORE any decisions ──
  if (!IS_DEMO && RGS._playPromise) {
    try {
      await RGS._playPromise;
      if (RGS._rgsSpins && RGS._rgsSpins.length > 0) {
        _simSpins = RGS._rgsSpins;
        _simMaxPayout = RGS._rgsMaxPayout;
        if (!inFS) _simSpinIdx = 0;
        console.log('[RGS] synced', _simSpins.length, 'spins in onAllStopped');
        // Board and reel targets already set by RGS.play() callback (stripped wilds).
        // Do NOT re-snap here — that would overwrite with the raw post-expansion board.
      }
    } catch(e) {
      console.error('[RGS] failed to sync data in onAllStopped:', e);
    }
  }

  // spinData is now authoritative (RGS data in real mode, book data in demo/FS)
  const spinData = _simSpins[_simSpinIdx];

  // Guard: if no spin data (RGS failed or timed out), end the spin gracefully
  if (!spinData) {
    console.warn('[SPIN] No spin data in onAllStopped, ending spin');
    spinning = false;
    if (inFS) { endFS(); } else { await RGS.endRound().catch(()=>{}); }
    updateUI();
    return;
  }

  // Check for scatter trigger
  const hasScatterTrigger = spinData && spinData.scatterTrigger;
  let scatterCount = 0;
  if (hasScatterTrigger) {
    scatterCount = spinData.scatterTrigger.positions.length;
  }

  // Scatter landing animation: scan board for ANY scatter symbols
  if (!inFS) {
    let hasScattersOnBoard = false;
    for (let r = 0; r < REELS; r++) {
      for (let row = 0; row < ROWS; row++) {
        if (lastBoard[r][row] === SCATTER) { hasScattersOnBoard = true; break; }
      }
      if (hasScattersOnBoard) break;
    }
    if (hasScattersOnBoard) pulseScatterCells();
  }

  // Scatter pop animation — trigger for both demo and RGS when 3+ scatters
  if (!inFS && scatterCount >= 3) {
    animateScatterPop(() => {
      afterWilds();
    });
    return;
  }

  // Wild expansion from spin data (now consistent for both modes)
  const newWilds = [];
  if (spinData && spinData.wilds && spinData.wilds.length > 0) {
    for (const w of spinData.wilds) {
      const isAlreadyWild = wildReels.some(wr => wr.reel === w.reel);
      if (isAlreadyWild) continue;
      // Use actual landed row from stripping phase, or find it on the board
      let landedRow = w._landedRow;
      if (landedRow == null) {
        landedRow = -1;
        for (let row = 0; row < ROWS; row++) {
          if (lastBoard[w.reel][row] === WILD) { landedRow = row; break; }
        }
        if (landedRow < 0) landedRow = 2; // fallback: center
      }
      newWilds.push({ reel: w.reel, row: landedRow, mult: w.mult });
    }
  }

  if (newWilds.length > 0) {
    const thisGen = _spinGen;
    setTimeout(() => {
      if (_spinGen !== thisGen) return;
      expandWilds(newWilds, () => {
        if (_spinGen !== thisGen) return;
        afterWilds();
      }, thisGen);
    }, turboMode ? 0 : 500);
  } else {
    afterWilds();
  }
}

// ─────────────────────────────────────────────────────────────
//  WIN CALCULATION  (left-to-right payline scan, Zeus-style)
// ─────────────────────────────────────────────────────────────

// Real payline scanner — evaluates the ACTUAL board against PAYLINES + PAYTABLE
// Used in RGS mode where local book data doesn't match the displayed board
function scanPaylines(board) {
  lastWinLines = [];
  let total = 0;

  for (let i = 0; i < PAYLINES.length; i++) {
    const line = PAYLINES[i];

    // Determine base symbol (first non-wild on the line from left)
    let baseSym = null;
    for (let c = 0; c < REELS; c++) {
      const s = board[c][line[c]];
      if (s !== WILD && s !== SCATTER) {
        baseSym = s;
        break;
      }
    }
    // All wilds from left — treat as best paying symbol (dragon)
    if (!baseSym) baseSym = 'dragon';

    if (!PAYTABLE[baseSym]) continue;

    // Count consecutive matching symbols from left (wild substitutes)
    let count = 0;
    for (let c = 0; c < REELS; c++) {
      const s = board[c][line[c]];
      if (s === baseSym || s === WILD) {
        count++;
      } else {
        break;
      }
    }

    if (count >= 3) {
      const payIdx = count - 3; // 0=3oak, 1=4oak, 2=5oak
      const pay = PAYTABLE[baseSym][payIdx];
      if (pay > 0) {
        const lineWin = Math.round(pay * bet * 100) / 100;
        total += lineWin;
        lastWinLines.push({ line, count, base: baseSym, win: lineWin });
      }
    }
  }

  return Math.round(total * 100) / 100;
}

function calculateWins(board) {
  // Book-driven: wins come from the book entry, not local calculation
  const spinData = _simSpins[_simSpinIdx];
  lastWinLines = [];

  if (!spinData || !spinData.wins || spinData.wins.length === 0) return 0;

  let total = 0;
  for (const w of spinData.wins) {
    // Book lineIndex is 1-based (SDK paylines dict keys 1-20), frontend PAYLINES is 0-based
    const lineIdx = (w.meta && w.meta.lineIndex != null) ? w.meta.lineIndex - 1 : -1;
    const line = (lineIdx >= 0 && lineIdx < PAYLINES.length) ? PAYLINES[lineIdx] : null;
    const lineWin = w.win * bet; // w.win is already in bet-multiplier units (cents/100)
    total += lineWin;
    if (line) {
      lastWinLines.push({ line, count: w.kind, base: w.symbol, win: lineWin });
    }
  }

  return Math.round(total * 100) / 100;
}

// ─────────────────────────────────────────────────────────────
//  WIN CELEBRATION  — Big Win / Mega Win / Epic Win / Sensational Win
//  Shogun castle platform + ornate scroll frame + gold coin rain
// ─────────────────────────────────────────────────────────────
const WIN_TIERS = [
  { min: 10,  label: 'BIG WIN',         color: [0xffd700, 0xdaa520], stroke: 0x1a0a00, glow: 0xcc0000, duration: 240,  coins: 35  },
  { min: 20,  label: 'MEGA WIN',        color: [0xfffacd, 0xffd700], stroke: 0x2a0800, glow: 0xff2200, duration: 360,  coins: 60  },
  { min: 50,  label: 'EPIC WIN',        color: [0xffffff, 0xffd700], stroke: 0x3a0a00, glow: 0xff4400, duration: 480,  coins: 90  },
  { min: 100, label: 'SENSATIONAL WIN', color: [0xffffff, 0xfffacd], stroke: 0x4a1000, glow: 0xff6600, duration: 600,  coins: 130 },
];

function getWinTier(winAmount) {
  const mult = winAmount / bet;
  let tier = null;
  for (const t of WIN_TIERS) {
    if (mult >= t.min) tier = t;
  }
  return tier;
}

let _winCelebrationActive = false;

function showWinCelebration(winAmount, onComplete) {
  const finalTier = getWinTier(winAmount);
  if (!finalTier) { onComplete(); return; }

  _winCelebrationActive = true;
  playSound('coin_count');

  try {

  // ── Dark overlay — nearly opaque with red tint ──
  document.getElementById('screenDim').style.display = 'block';
  const dim = new PIXI.Graphics();
  dim.beginFill(0x0a0000, 0.65);
  dim.drawRect(-500, -500, BASE_W + 1000, BASE_H + 1000);
  dim.endFill();
  app.stage.addChild(dim);

  const c = new PIXI.Container();
  c.interactive = true;
  c.hitArea = new PIXI.Rectangle(0, 0, BASE_W, BASE_H);
  app.stage.addChild(c);

  // ── Win frame sprite (center, holds the counter) ──
  // Image is 1904x640 — target ~660px display width (~40% of canvas)
  const frameTex = PIXI.Texture.from(assetMap['win_frame']);
  const frame = new PIXI.Sprite(frameTex);
  const frameScale = 0.35;
  frame.scale.set(frameScale);
  frame.anchor.set(0.5);
  frame.x = BASE_W / 2;
  frame.y = BASE_H / 2 + 50;
  frame.alpha = 0;
  c.addChild(frame);
  const frameDispW = 1904 * frameScale; // ~666
  const frameDispH = 640 * frameScale;  // ~224

  // ── Tier label — BIG text on top (like Zeus "SENSATIONAL!" above the frame) ──
  const firstTier = WIN_TIERS[0];
  const tierGlow = new PIXI.Text(firstTier.label, {
    fontFamily: 'Georgia, serif', fontSize: 72, fontWeight: 'bold',
    fill: firstTier.glow,
    stroke: firstTier.glow, strokeThickness: 16,
    letterSpacing: 6,
  });
  tierGlow.anchor.set(0.5);
  tierGlow.x = BASE_W / 2;
  tierGlow.y = BASE_H / 2 - 60;
  tierGlow.alpha = 0;
  tierGlow.blendMode = PIXI.BLEND_MODES.ADD;
  c.addChild(tierGlow);

  const tierLabel = new PIXI.Text(firstTier.label, {
    fontFamily: 'Georgia, serif', fontSize: 72, fontWeight: 'bold',
    fill: firstTier.color,
    fillGradientStops: [0, 1],
    stroke: firstTier.stroke, strokeThickness: 7,
    dropShadow: true, dropShadowColor: 0x000000, dropShadowBlur: 14, dropShadowDistance: 3,
    letterSpacing: 6,
  });
  tierLabel.anchor.set(0.5);
  tierLabel.x = BASE_W / 2;
  tierLabel.y = BASE_H / 2 - 60;
  tierLabel.scale.set(0);
  c.addChild(tierLabel);

  // ── Win counter (on the frame) ──
  const counterText = new PIXI.Text(formatMoney(0), {
    fontFamily: 'Georgia, serif', fontSize: 52, fontWeight: 'bold',
    fill: [0xffffff, 0xffd700],
    fillGradientStops: [0, 1],
    stroke: 0x1a0a00, strokeThickness: 5,
    dropShadow: true, dropShadowColor: 0x000000, dropShadowBlur: 10, dropShadowDistance: 3,
  });
  counterText.anchor.set(0.5);
  counterText.x = BASE_W / 2;
  counterText.y = BASE_H / 2 + 50; // centered on the frame
  counterText.alpha = 0;
  c.addChild(counterText);

  // ── Gold coins with bounce physics ──
  const coins = [];
  const COIN_COUNT = finalTier.coins;
  const GROUND_Y = BASE_H - 40; // coins bounce off bottom
  for (let i = 0; i < COIN_COUNT; i++) {
    const coin = new PIXI.Graphics();
    const r = 4 + Math.random() * 6;
    // Draw coin face (ellipse for 3D look)
    coin.beginFill(0xb8860b, 0.9);
    coin.drawEllipse(0, 2, r, r); // edge/shadow
    coin.endFill();
    coin.beginFill(0xffd700, 1);
    coin.drawEllipse(0, 0, r, r); // face
    coin.endFill();
    // Inner ring detail
    coin.lineStyle(1, 0xb8860b, 0.5);
    coin.drawCircle(0, 0, r * 0.6);
    coin.lineStyle(0);
    // White highlight
    coin.beginFill(0xffffff, 0.35);
    coin.drawEllipse(-r * 0.25, -r * 0.3, r * 0.2, r * 0.15);
    coin.endFill();

    // Start from top, spread across width
    coin.x = BASE_W * 0.15 + Math.random() * BASE_W * 0.7;
    coin.y = -30 - Math.random() * 500;
    coin._r = r;
    coin._vy = 0.5 + Math.random() * 1.5;
    coin._vx = (Math.random() - 0.5) * 2;
    coin._gravity = 0.12 + Math.random() * 0.06;
    coin._bounce = 0.4 + Math.random() * 0.25; // bounciness
    coin._spin = (Math.random() - 0.5) * 0.12;
    coin._flipPhase = Math.random() * Math.PI * 2;
    coin._flipSpeed = 0.04 + Math.random() * 0.06;
    coin._delay = Math.random() * 60; // stagger spawn
    coin._age = 0;
    coin.alpha = 0;
    coins.push(coin);
    c.addChild(coin);
  }

  // ── "TAP TO CONTINUE" ──
  const tapText = new PIXI.Text('TAP ANYWHERE TO SKIP', {
    fontFamily: 'Arial', fontSize: 14, fill: 0x997755, letterSpacing: 3,
  });
  tapText.anchor.set(0.5);
  tapText.x = BASE_W / 2;
  tapText.y = BASE_H / 2 + 160;
  tapText.alpha = 0;
  c.addChild(tapText);

  // ── Flash layer ──
  const flash = new PIXI.Graphics();
  flash.beginFill(0xfff4cc, 1);
  flash.drawRect(-500, -500, BASE_W + 1000, BASE_H + 1000);
  flash.endFill();
  flash.alpha = 0;
  c.addChild(flash);

  // ── State ──
  let ticks = 0, currentCount = 0, currentTierIdx = 0;
  let skipped = false, closing = false, closeTicks = 0;
  let shakeIntensity = 0;
  const countDuration = turboMode ? Math.ceil(finalTier.duration * 0.4) : finalTier.duration;
  const _introLen = turboMode ? 12 : 30;
  const _closeLen = turboMode ? 8 : 18;
  const _countStart = turboMode ? 6 : 15;
  const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

  function updateTierLabel(idx) {
    const t = WIN_TIERS[idx];
    tierLabel.text = t.label;
    tierLabel.style.fill = t.color;
    tierLabel.style.stroke = t.stroke;
    tierGlow.text = t.label;
    tierGlow.style.fill = t.glow;
    tierGlow.style.stroke = t.glow;
  }
  function triggerShake(v) { shakeIntensity = v; }
  function triggerFlash() { flash.alpha = 0.4; }

  const tickFn = (dt) => {
    ticks += dt;

    // ── Intro: fade in platform, frame, label ──
    if (ticks <= _introLen) {
      const p = Math.min(ticks / _introLen, 1);
      // Frame fades in (scale intro timing to _introLen)
      const frameFade = Math.max(0, Math.min((ticks - _introLen * 0.25) / (_introLen * 0.5), 1));
      frame.alpha = frameFade;
      frame.scale.set(frameScale * (0.9 + frameFade * 0.1));
      // Label scale bounce
      const labelStart = _introLen * 0.15;
      if (ticks > labelStart) {
        const lp = Math.min((ticks - labelStart) / (_introLen * 0.6), 1);
        const overshoot = lp < 0.6 ? (lp / 0.6) * 1.25 : 1.25 - (lp - 0.6) / 0.4 * 0.25;
        tierLabel.scale.set(overshoot);
        tierGlow.scale.set(overshoot);
        tierGlow.alpha = Math.min(lp, 0.35);
      }
      counterText.alpha = Math.max(0, Math.min((ticks - _introLen * 0.3) / (_introLen * 0.4), 1));
      tapText.alpha = Math.max(0, Math.min((ticks - _introLen * 0.6) / (_introLen * 0.4), 0.5));
    } else {
      // Ensure everything is fully visible after intro
      frame.alpha = 1;
      counterText.alpha = 1;
      tapText.alpha = 0.5;
    }

    // ── Count up ──
    if (!skipped && ticks > _countStart) {
      const countProgress = Math.min((ticks - _countStart) / countDuration, 1);
      currentCount = easeOutCubic(countProgress) * winAmount;
      counterText.text = formatMoney(currentCount);

      const mult = currentCount / bet;
      let newTierIdx = 0;
      for (let i = 0; i < WIN_TIERS.length; i++) {
        if (mult >= WIN_TIERS[i].min) newTierIdx = i;
      }
      if (newTierIdx > currentTierIdx) {
        currentTierIdx = newTierIdx;
        updateTierLabel(newTierIdx);
        triggerShake(12);
        triggerFlash();
        tierLabel.scale.set(1.35);
        tierGlow.scale.set(1.35);
      }
      if (countProgress >= 1 && !closing) startClose();
    }

    // ── Label idle pulse ──
    if (ticks > _introLen && !closing) {
      const pulse = 1 + Math.sin(ticks * 0.05) * 0.025;
      tierLabel.scale.set(pulse);
      tierGlow.scale.set(pulse);
      tierGlow.alpha = 0.2 + Math.sin(ticks * 0.08) * 0.12;
    }

    // ── Gold coins with gravity + bounce ──
    coins.forEach(coin => {
      coin._age += dt;
      if (coin._age < coin._delay) return;
      coin.alpha = 1;
      coin._vy += coin._gravity * dt;
      coin.y += coin._vy * dt;
      coin.x += coin._vx * dt;
      coin.rotation += coin._spin * dt;
      // Coin flip effect: scaleX oscillates
      coin._flipPhase += coin._flipSpeed * dt;
      coin.scale.x = Math.cos(coin._flipPhase);
      // Bounce off ground
      if (coin.y >= GROUND_Y - coin._r) {
        coin.y = GROUND_Y - coin._r;
        coin._vy = -Math.abs(coin._vy) * coin._bounce;
        coin._vx *= 0.85; // friction
        if (Math.abs(coin._vy) < 0.3) coin._vy = 0; // stop bouncing
      }
      // Wrap horizontal
      if (coin.x < -20) coin.x = BASE_W + 20;
      if (coin.x > BASE_W + 20) coin.x = -20;
    });

    // ── Screen shake ──
    if (shakeIntensity > 0) {
      c.x = (Math.random() - 0.5) * shakeIntensity;
      c.y = (Math.random() - 0.5) * shakeIntensity;
      shakeIntensity *= 0.86;
      if (shakeIntensity < 0.5) { shakeIntensity = 0; c.x = 0; c.y = 0; }
    }

    // ── Flash fade ──
    if (flash.alpha > 0) {
      flash.alpha *= 0.85;
      if (flash.alpha < 0.01) flash.alpha = 0;
    }

    // ── Close ──
    if (closing) {
      closeTicks += dt;
      const p = Math.min(closeTicks / _closeLen, 1);
      c.alpha = 1 - p;
      dim.alpha = 0.65 * (1 - p);
      if (p >= 1) { cleanup(); onComplete(); }
    }
  };

  function startClose() {
    if (closing) return;
    closing = true; closeTicks = 0;
    counterText.text = formatMoney(winAmount);
    updateTierLabel(WIN_TIERS.indexOf(finalTier));
  }

  function skipToEnd() {
    if (closing) return;
    skipped = true;
    counterText.text = formatMoney(winAmount);
    const fi = WIN_TIERS.indexOf(finalTier);
    if (fi > currentTierIdx) { currentTierIdx = fi; updateTierLabel(fi); triggerFlash(); }
    tierLabel.scale.set(1); tierGlow.scale.set(1);
    setTimeout(() => startClose(), 300);
  }

  function cleanup() {
    stopSound('coin_count');
    app.ticker.remove(tickFn);
    if (c.parent) app.stage.removeChild(c);
    if (dim.parent) app.stage.removeChild(dim);
    c.destroy({ children: true });
    dim.destroy();
    document.getElementById('screenDim').style.display = 'none';
    _winCelebrationActive = false;
  }

  c.on('pointerdown', skipToEnd);
  app.ticker.add(tickFn);

  } catch (err) {
    console.error('[SHOGUN] Win celebration error:', err);
    _winCelebrationActive = false;
    document.getElementById('screenDim').style.display = 'none';
    onComplete();
  }
}

// Quick per-spin win flash during Free Spins (no full celebration)
function showFSWinFlash(winAmount, onComplete) {
  spinning = true;  // Block input during flash
  playSound('coin_count');
  const label = new PIXI.Text(formatMoney(winAmount), {
    fontFamily: 'Georgia, serif', fontSize: 52, fontWeight: 'bold',
    fill: [0xffffff, 0xffd700],
    fillGradientStops: [0, 1],
    stroke: 0x1a0a00, strokeThickness: 6,
    dropShadow: true, dropShadowColor: 0x000000, dropShadowBlur: 12, dropShadowDistance: 3,
  });
  label.anchor.set(0.5);
  label.x = BASE_W / 2;
  label.y = BASE_H / 2;
  label.scale.set(0.3);
  label.alpha = 0;
  app.stage.addChild(label);

  let ticks = 0;
  const totalTicks = turboMode ? 20 : 70; // turbo: ~0.3s, normal: ~1.2s
  const fn = (dt) => {
    ticks += dt;
    const p = ticks / totalTicks;
    if (p < 0.15) {
      // Scale in
      const t = p / 0.15;
      label.scale.set(0.3 + 0.7 * t);
      label.alpha = t;
    } else if (p < 0.7) {
      // Hold
      label.scale.set(1);
      label.alpha = 1;
    } else {
      // Fade out + float up
      const t = (p - 0.7) / 0.3;
      label.alpha = 1 - t;
      label.y = BASE_H / 2 - 30 * t;
    }
    if (ticks >= totalTicks) {
      app.ticker.remove(fn);
      if (label.parent) app.stage.removeChild(label);
      label.destroy();
      spinning = false;
      onComplete();
    }
  };
  app.ticker.add(fn);
}

// ── Payline Visualization ──
let _paylineCycleTimer = null;
let _paylinePulseTimer = null;
function clearWinLines() {
  if (_paylineCycleTimer) { clearInterval(_paylineCycleTimer); _paylineCycleTimer = null; }
  if (_paylinePulseTimer) { cancelAnimationFrame(_paylinePulseTimer); _paylinePulseTimer = null; }
  paylineLayer.removeChildren();
}
function showWinLines() {
  clearWinLines();
  if (lastWinLines.length === 0) return;
  let idx = 0;
  let pulsePhase = 0;
  const PAYLINE_COLORS = [0xFF4444, 0x44FF44, 0x4488FF, 0xFFAA00, 0xFF44FF, 0x44FFFF, 0xFFFF44, 0xFF8844,
    0x88FF44, 0x4444FF, 0xFF4488, 0x44FFAA, 0xAA44FF, 0xFFFF88, 0x88FFFF, 0xFF88FF, 0xAAFF44, 0x44AAFF, 0xFF44AA, 0xAAFFAA];

  function drawLine(w) {
    // Cancel previous pulse rAF before clearing children
    if (_paylinePulseTimer) { cancelAnimationFrame(_paylinePulseTimer); _paylinePulseTimer = null; }
    paylineLayer.removeChildren();
    const color = PAYLINE_COLORS[idx % PAYLINE_COLORS.length];

    // Dim overlay on non-winning symbols
    const dim = new PIXI.Graphics();
    dim.beginFill(0x000000, 0.45);
    dim.drawRect(GRID_X, GRID_Y, REELS * CELL - SYM_GAP, ROWS * CELL - SYM_GAP);
    dim.endFill();
    // Cut out winning symbol positions
    dim.blendMode = PIXI.BLEND_MODES.NORMAL;
    for (let c = 0; c < w.count; c++) {
      const sx = GRID_X + c * CELL, sy = GRID_Y + w.line[c] * CELL;
      dim.beginHole(); dim.drawRoundedRect(sx - 2, sy - 2, SYM_SIZE + 4, SYM_SIZE + 4, 8); dim.endHole();
    }
    paylineLayer.addChild(dim);

    // Outer wide glow line
    const glOuter = new PIXI.Graphics();
    glOuter.lineStyle(14, color, 0.15);
    for (let c = 0; c < w.count; c++) {
      const x = GRID_X + c * CELL + SYM_SIZE / 2, y = GRID_Y + w.line[c] * CELL + SYM_SIZE / 2;
      c === 0 ? glOuter.moveTo(x, y) : glOuter.lineTo(x, y);
    }
    paylineLayer.addChild(glOuter);

    // Middle glow line
    const glMid = new PIXI.Graphics();
    glMid.lineStyle(6, color, 0.5);
    for (let c = 0; c < w.count; c++) {
      const x = GRID_X + c * CELL + SYM_SIZE / 2, y = GRID_Y + w.line[c] * CELL + SYM_SIZE / 2;
      c === 0 ? glMid.moveTo(x, y) : glMid.lineTo(x, y);
    }
    paylineLayer.addChild(glMid);

    // Core bright line
    const glCore = new PIXI.Graphics();
    glCore.lineStyle(2, 0xFFFFFF, 0.9);
    for (let c = 0; c < w.count; c++) {
      const x = GRID_X + c * CELL + SYM_SIZE / 2, y = GRID_Y + w.line[c] * CELL + SYM_SIZE / 2;
      c === 0 ? glCore.moveTo(x, y) : glCore.lineTo(x, y);
    }
    paylineLayer.addChild(glCore);

    // Winning symbol highlight frames
    for (let c = 0; c < w.count; c++) {
      const sx = GRID_X + c * CELL, sy = GRID_Y + w.line[c] * CELL;
      // Glow border
      const frame = new PIXI.Graphics();
      frame.lineStyle(3, color, 0.85);
      frame.drawRoundedRect(sx - 4, sy - 4, SYM_SIZE + 8, SYM_SIZE + 8, 10);
      // Outer soft glow
      frame.lineStyle(8, color, 0.2);
      frame.drawRoundedRect(sx - 7, sy - 7, SYM_SIZE + 14, SYM_SIZE + 14, 12);
      paylineLayer.addChild(frame);

      // Corner accent dots
      const corners = [[sx - 4, sy - 4], [sx + SYM_SIZE + 4, sy - 4], [sx - 4, sy + SYM_SIZE + 4], [sx + SYM_SIZE + 4, sy + SYM_SIZE + 4]];
      for (const [cx, cy] of corners) {
        const dot = new PIXI.Graphics();
        dot.beginFill(0xFFFFFF, 0.9); dot.drawCircle(cx, cy, 3); dot.endFill();
        paylineLayer.addChild(dot);
      }
    }

    // Win amount label at the end of the line
    if (w.win > 0) {
      const lastC = w.count - 1;
      const lx = GRID_X + lastC * CELL + SYM_SIZE + 12;
      const ly = GRID_Y + w.line[lastC] * CELL + SYM_SIZE / 2;
      const label = new PIXI.Text(formatMoney(w.win), {
        fontFamily: 'Arial Black, Arial, sans-serif',
        fontSize: 22,
        fontWeight: 'bold',
        fill: [0xFFFFFF, color],
        fillGradientStops: [0, 1],
        stroke: 0x000000,
        strokeThickness: 4,
        dropShadow: true,
        dropShadowColor: color,
        dropShadowBlur: 8,
        dropShadowDistance: 0,
      });
      label.anchor.set(0, 0.5);
      label.x = lx;
      label.y = ly;
      // If label goes off-screen right, flip it to the left of the last symbol
      if (lx + label.width > BASE_W - 10) {
        label.anchor.set(1, 0.5);
        label.x = GRID_X + lastC * CELL - 12;
      }
      paylineLayer.addChild(label);
    }

    // Pulse animation on the core line + frames
    glCore._pulseTarget = true;
    function pulse() {
      pulsePhase += 0.06;
      const a = 0.6 + 0.4 * Math.sin(pulsePhase);
      for (let i = 0; i < paylineLayer.children.length; i++) {
        const child = paylineLayer.children[i];
        if (child === glCore) child.alpha = 0.5 + 0.5 * Math.sin(pulsePhase);
      }
      _paylinePulseTimer = requestAnimationFrame(pulse);
    }
    pulse();
  }

  drawLine(lastWinLines[0]);
  if (lastWinLines.length > 1) {
    _paylineCycleTimer = setInterval(() => { idx = (idx + 1) % lastWinLines.length; drawLine(lastWinLines[idx]); }, 1500);
    // Auto-stop cycling after 8 seconds so animations don't loop forever
    setTimeout(() => { clearWinLines(); }, 8000);
  }

  // Allow tap/click anywhere on the grid to skip win line animations
  const skipOverlay = new PIXI.Graphics();
  skipOverlay.beginFill(0x000000, 0.001); // nearly invisible hit area
  skipOverlay.drawRect(GRID_X, GRID_Y, REELS * CELL, ROWS * CELL);
  skipOverlay.endFill();
  skipOverlay.interactive = true;
  skipOverlay.cursor = 'pointer';
  skipOverlay.on('pointerdown', () => { clearWinLines(); });
  paylineLayer.addChild(skipOverlay);
}

async function afterWilds() {
  // All post-spin animations (wild expansion, scatter pop) are complete.
  // DON'T set spinning=false yet — wait until endRound completes.
  // Setting it early lets users click spin before the round is closed (400 errors).
  lastWinLines = []; // clear stale paylines from previous spin

  // RGS data was already synced in onAllStopped (await + replace + snap).
  // No duplicate replacement needed here.

  // After wild expansion, update lastBoard to reflect the expanded state.
  // Wins are calculated against the post-expansion board (all rows wild on expanded reels),
  // so lastBoard must match — otherwise payline highlights show wrong symbols.
  if (wildReels.length > 0) {
    for (const wr of wildReels) {
      for (let row = 0; row < ROWS; row++) {
        lastBoard[wr.reel][row] = WILD;
      }
    }
  }

  // Get spin data (now correct for both RGS and demo/FS)
  const spinData = _simSpins[_simSpinIdx];

  // Win calculation — uses spinData from RGS in real mode, local book in demo/FS
  let spinWin = calculateWins(lastBoard);

  if (spinWin > 0) {
    roundWin = Math.round((roundWin + spinWin) * 100) / 100;
    const maxWin = Math.round(_simMaxPayout * bet * 100) / 100;
    if (maxWin > 0 && roundWin > maxWin) {
      spinWin = Math.round((spinWin - (roundWin - maxWin)) * 100) / 100;
      if (spinWin < 0) spinWin = 0;
      roundWin = maxWin;
    }
    if (!IS_REPLAY && spinWin > 0) balance = Math.round((balance + spinWin) * 100) / 100;
  }
  showWinLines();

  // Update sticky wilds from spin data (works for both RGS and demo now)
  if (spinData && spinData.stickyWilds) {
    wildReels = spinData.stickyWilds.map(w => ({ reel: w.reel, mult: w.mult }));
  }

  updateUI();
  if (inFS) saveGameState();

  // Check scatter trigger from spin data (now uses RGS data in real mode!)
  const hasScatterTrigger = spinData && spinData.scatterTrigger;
  let scatterCount = hasScatterTrigger ? spinData.scatterTrigger.positions.length : 0;
  let fsTriggerCount = hasScatterTrigger ? spinData.scatterTrigger.totalFs : 0;

  // Fallback: if RGS says round is active but no scatterTrigger event, count scatters on board
  if (!IS_DEMO && !inFS && scatterCount < 3 && RGS._roundHasWin) {
    let boardScatters = 0;
    for (let r = 0; r < REELS; r++) {
      for (let row = 0; row < ROWS; row++) {
        if (lastBoard[r][row] === SCATTER) boardScatters++;
      }
    }
    if (boardScatters >= 3) {
      console.log('[RGS] fallback scatter detection:', boardScatters, 'scatters on board');
      scatterCount = boardScatters;
      fsTriggerCount = 10; // default: 3 scatters = 10 FS
    }
  }

  const tier = (!inFS && spinWin > 0) ? getWinTier(spinWin) : null;

  if (spinWin > 0) {
    const winMult = spinWin / bet;
    if (winMult >= 50) playSound('win_epic');
    else if (winMult >= 10) playSound('win_big');
    else playSound('win_small');
  }

  // Close base game round IMMEDIATELY before any celebration animation.
  // This prevents 400 "player has active bet" errors if user clicks spin
  // during a small win flash (which doesn't set _winCelebrationActive).
  // Skip for: FS trigger (round stays active for free spins), FS mode, demo.
  if (!IS_DEMO && !inFS && scatterCount < 3) {
    await RGS.endRound();
    updateUI();
  }
  // NOW it's safe to allow new spins — round is closed
  spinning = false;

  const continueAfterCelebration = async () => {
    // continueAfterCelebration
    if (!inFS && scatterCount >= 3) {
      autoSpins = 0; _updateAutoBtn();
      triggerFS(fsTriggerCount);
    } else if (inFS) {
      updateUI();
      // Check if there are more FS spins in the book entry
      const hasMoreSpins = _simSpinIdx + 1 < _simSpins.length;
      const hitMaxWin = roundWin >= 15000 * bet;
      if (fsLeft <= 0 || hitMaxWin || !hasMoreSpins) {
        endFS();
      } else {
        const fsGen = _spinGen;
        setTimeout(() => { if (_spinGen === fsGen && !spinning) startSpin(); }, turboMode ? 100 : 1200);
      }
    } else {
      // Base game — round already closed above, just handle UI + auto-spins
      updateUI();
      clearGameState();
      // Replay mode: show outro after base game spin completes
      if (IS_REPLAY) {
        showReplayOutro(roundWin, () => {
          roundWin = 0; wildReels = []; resetOverlays();
          showReplayIntro(_replayData, () => startReplayPlayback());
        });
        return;
      }
      if (autoSpins !== 0) {
        if (autoSpins > 0) { autoSpins--; _updateAutoBtn(); }
        if (autoSpins === 0) {
          _updateAutoBtn();
        } else {
          const ag = _spinGen;
          setTimeout(() => { if (_spinGen === ag && !spinning) startSpin(); }, turboMode ? 80 : 600);
        }
      }
    }
  };

  if (inFS && spinWin > 0) {
    showFSWinFlash(spinWin, continueAfterCelebration);
  } else if (tier) {
    showWinCelebration(spinWin, continueAfterCelebration);
  } else if (spinWin > 0 && !inFS) {
    // Small base game win — brief win flash with amount pop-up
    showSmallWinFlash(spinWin, continueAfterCelebration);
  } else {
    continueAfterCelebration();
  }
}

// Brief win amount flash for small base game wins (below big-win tier)
function showSmallWinFlash(winAmount, onComplete) {
  spinning = true; // block new spins during flash animation
  const winText = new PIXI.Text(formatMoney(winAmount), {
    fontFamily: 'Georgia, serif', fontSize: 48, fontWeight: 'bold',
    fill: [0xffd700, 0xffaa00],
    fillGradientStops: [0, 1],
    stroke: 0x000000, strokeThickness: 5,
    dropShadow: true, dropShadowColor: 0x000000, dropShadowBlur: 8, dropShadowDistance: 2,
  });
  winText.anchor.set(0.5);
  winText.x = BASE_W / 2;
  winText.y = BASE_H / 2;
  winText.scale.set(0.3);
  winText.alpha = 0;
  app.stage.addChild(winText);

  let t = 0;
  const duration = turboMode ? 40 : 70;
  const fn = (dt) => {
    t += dt;
    const p = t / duration;
    if (p < 0.2) {
      // Pop in
      const ep = p / 0.2;
      winText.scale.set(0.3 + 0.9 * ep);
      winText.alpha = ep;
    } else if (p < 0.7) {
      // Hold
      winText.scale.set(1.2);
      winText.alpha = 1;
    } else {
      // Fade out + float up
      const fp = (p - 0.7) / 0.3;
      winText.alpha = 1 - fp;
      winText.y = BASE_H / 2 - 30 * fp;
    }
    if (t >= duration) {
      app.ticker.remove(fn);
      if (winText.parent) winText.parent.removeChild(winText);
      winText.destroy();
      spinning = false;
      onComplete();
    }
  };
  app.ticker.add(fn);
}

// ─────────────────────────────────────────────────────────────
//  BOARD GENERATOR
// ─────────────────────────────────────────────────────────────
function makeBoard() {
  const board = [];

  // ── Step 1: fill with regular symbols only (no wild, no scatter) ──
  for (let r = 0; r < REELS; r++) {
    const col = [];
    const isSticky = wildReels.some(w => w.reel === r);
    for (let row = 0; row < ROWS; row++) {
      col.push(isSticky ? WILD : weightedRandom(inFS ? WEIGHTS_FS : WEIGHTS));
    }
    board.push(col);
  }

  // ── Step 2: wild placement — exactly 1 wild_tile per chosen reel, max 1 reel ──
  // Super bonus: guarantee a wild on the pending reel (first FS spin)
  if (_pendingSuperWild && inFS) {
    const sr = _pendingSuperWild.reel;
    const wildRow = Math.floor(Math.random() * ROWS);
    board[sr][wildRow] = WILD;
  }
  // Base game: ~30% chance, any reel (not already sticky)
  // FS:        ~45% chance, non-sticky reel only
  // This is the ONLY place WILD enters the board (besides sticky FS reels above).
  if (!inFS && Math.random() < 0.30) {
    const pick    = Math.floor(Math.random() * REELS);
    const wildRow = Math.floor(Math.random() * ROWS);
    board[pick][wildRow] = WILD;  // overwrites whatever was there — 1 wild, 1 reel
  } else if (inFS && Math.random() < 0.45) {
    const available = [0,1,2,3,4].filter(r => !wildReels.some(w => w.reel === r));
    if (available.length > 0) {
      const pick    = available[Math.floor(Math.random() * available.length)];
      const wildRow = Math.floor(Math.random() * ROWS);
      board[pick][wildRow] = WILD;
    }
  }

  // ── Step 3: scatter placement — base game only, reels 0/2/4, independent per reel ──
  // Each reel rolls independently so you can get 0, 1, 2, or 3 scatters.
  // ~18% chance per reel → ~0.6% for all 3 (bonus), ~8% for 1 scatter, ~3% for 2 (tease/bait)
  if (!inFS) {
    [0, 2, 4].forEach(r => {
      // Force scatter on all 3 reels when buying bonus
      if (_forceBonusSpin || Math.random() < 0.18) {
        const candidates = [];
        for (let row = 0; row < ROWS; row++) {
          if (board[r][row] !== WILD) candidates.push(row);
        }
        if (candidates.length > 0) {
          board[r][candidates[Math.floor(Math.random() * candidates.length)]] = SCATTER;
        }
      }
    });
    if (_forceBonusSpin) _forceBonusSpin = false;
  }

  return board;
}

// ─────────────────────────────────────────────────────────────
//  WILD EXPANSION ANIMATION
// ─────────────────────────────────────────────────────────────
function expandWilds(list, done, gen) {
  // In turbo mode, skip video and speed up all animations
  const _tSpd = turboMode ? 4 : 1;
  let idx = 0;
  function next() {
    // Abort if a new spin started while we were waiting
    if (_spinGen !== gen) return;
    if (idx >= list.length) { done(); return; }
    const {reel, row, mult} = list[idx++];
    wildReels.push({reel, mult});
    playSound('wild_expand');
    if (mult > 1) playSound('multiplier_hit');

    const ov = wildOverlays[reel];
    const badge = ov.getChildByName('badge');
    if (badge) {
      const btxt = badge.getChildByName('btxt');
      if (mult >= 2) {
        btxt.text = `${mult}×`;
        btxt.visible = true;
      } else {
        btxt.visible = false; // hide "1×" text but keep WILD label visible
      }
      badge._showBadge = true; // always show badge (WILD label)
    }

    // Show the separate border graphic
    const brd = layerWild.getChildByName('brd_' + reel);
    if (brd) brd.visible = true;

    // Squash-stretch the landing wild tile for haptic impact feel
    {
      const sprites = reelSprites[reel];
      const landingSp = sprites.find(s => Math.abs(s.y - row * CELL) < 4);
      if (landingSp) {
        let sqt = 0, sqFn;
        sqFn = (dt) => {
          sqt += dt;
          const p = Math.min(sqt / (9 / _tSpd), 1);
          // Phase 0-0.4: squash to 80%  |  Phase 0.4-1.0: spring back to 100%
          const sy = p < 0.4
            ? 1 - 0.2 * (p / 0.4)
            : 0.8 + 0.2 * Math.pow((p - 0.4) / 0.6, 0.5);
          landingSp.height = SYM_SIZE * sy;
          landingSp.y     = row * CELL + (SYM_SIZE - landingSp.height) / 2;
          if (p >= 1) {
            landingSp.height = SYM_SIZE;
            landingSp.y     = row * CELL;
            app.ticker.remove(sqFn);
          }
        };
        app.ticker.add(sqFn);
      }
    }

    // Gold flash on the landing cell
    const cellX = GRID_X + reel * CELL;
    const cellY = GRID_Y + row * CELL;
    const flash = new PIXI.Graphics();
    flash.beginFill(0xffd700, 0.9);
    flash.drawRoundedRect(cellX - 2, cellY - 2, SYM_SIZE + 4, SYM_SIZE + 4, 6);
    flash.endFill();
    layerFX.addChild(flash);

    // Reset overlay to normal position (no pivot trick — mask handles reveal now)
    ov.pivot.set(0, 0);
    ov.x = GRID_X + reel * CELL;
    ov.y = GRID_Y;
    ov.scale.set(1, 1);

    // Reveal mask: starts at just the landing row, expands upward+downward
    // This keeps the image at correct proportions — no scale distortion.
    const revealMask = new PIXI.Graphics();
    ov.addChild(revealMask);
    ov.mask = revealMask;
    ov.visible = true;
    // Hide badge — will pop in after video first loop
    if (badge) { badge.visible = false; badge.scale.set(0); }
    // Start video playback
    if (ov._vid) {
      ov._vid.currentTime = 0;
      ov._vid.playbackRate = turboMode ? 16 : 1;
      ov._vid.play().catch(()=>{});
    }

    // Light rays from reel center
    spawnLightRays(cellX + SYM_SIZE / 2, GRID_Y + GRID_H / 2);

    // Gold sparks from the landing cell
    spawnWildParticles(cellX + SYM_SIZE / 2, cellY + CELL / 2);

    const originY = row * CELL + CELL / 2;   // center of landing row in local coords

    let t = 0;
    let tickFn;
    tickFn = (edt) => {
      // Abort: new spin started while animation was in progress
      if (_spinGen !== gen) {
        layerFX.removeChild(flash);
        // Restore clip mask and remove the temporary revealMask from the container
        // so the overlay is in a clean state for the next expansion on this reel.
        ov.mask = ov.getChildAt(0);  // clipMask is always index 0
        if (ov.children.indexOf(revealMask) !== -1) ov.removeChild(revealMask);
        ov.visible = false;
        app.ticker.remove(tickFn);
        return;
      }

      t += edt;

      // Flash fades over first 12 frames
      flash.alpha = Math.max(0, 1 - t / (12 / _tSpd));
      if (t >= 12 / _tSpd) { layerFX.removeChild(flash); }

      // Reveal grows from originY outward — cubic ease-out
      const progress = Math.min(t / (28 / _tSpd), 1);
      const ease     = 1 - Math.pow(1 - progress, 3);
      const halfH    = ease * (GRID_H / 2 + CELL);
      const top      = Math.max(0, originY - halfH);
      const bottom   = Math.min(GRID_H, originY + halfH);

      revealMask.clear();
      revealMask.beginFill(0xffffff);
      revealMask.drawRect(0, top, SYM_SIZE, bottom - top);
      revealMask.endFill();

      if (progress >= 1) {
        // Full reveal — remove animation mask, clip mask takes over
        ov.mask   = ov.getChildAt(0);   // clipMask is always index 0
        ov.removeChild(revealMask);

        // Screen shake on wild landing impact
        screenShake(6, 20);

        // Brief full-reel white flash
        const impactFlash = new PIXI.Graphics();
        impactFlash.beginFill(0xffffff, 0.55);
        impactFlash.drawRect(GRID_X + reel * CELL, GRID_Y, SYM_SIZE, GRID_H);
        impactFlash.endFill();
        layerFX.addChild(impactFlash);
        let ft = 0, fFn;
        fFn = (fdt) => {
          ft += fdt;
          impactFlash.alpha = Math.max(0, 0.55 - ft * 0.06);
          if (ft >= 10) { layerFX.removeChild(impactFlash); app.ticker.remove(fFn); }
        };
        app.ticker.add(fFn);

        // Start pulsing animated glow on this wild reel border
        startWildGlow(reel);

        app.ticker.remove(tickFn);

        // Badge pop — wait for video first loop, then show badge, THEN proceed to next reel
        const proceedToNext = () => {
          setTimeout(() => { if (_spinGen === gen) next(); }, turboMode ? 50 : 400);
        };

        if (badge && ov._vid) {
          const vidEl = ov._vid;
          const showBadge = () => {
            badge.visible = true;
            badge.scale.set(0);
            let bt = 0, bFn;
            bFn = (bdt) => {
              bt += bdt;
              const bp = Math.min(bt / (12 / _tSpd), 1);
              const bease = bp < 0.5
                ? 1.4 * Math.pow(bp / 0.5, 2)
                : 1.4 - 0.4 * ((bp - 0.5) / 0.5);
              badge.scale.set(bease);
              if (bp >= 1) {
                badge.scale.set(1);
                app.ticker.remove(bFn);
                proceedToNext();
              }
            };
            app.ticker.add(bFn);
          };
          let badgeShown = false;
          const onEnded = () => {
            if (badgeShown) return;
            badgeShown = true;
            vidEl.removeEventListener('ended', onEnded);
            showBadge();
          };
          vidEl.addEventListener('ended', onEnded);
          // Fallback if ended event doesn't fire
          setTimeout(() => {
            if (!badgeShown) {
              badgeShown = true;
              vidEl.removeEventListener('ended', onEnded);
              showBadge();
            }
          }, turboMode ? 500 : 4000);
        } else if (badge) {
          badge.visible = true;
          badge.scale.set(1);
          proceedToNext();
        } else {
          proceedToNext();
        }
      }
    };
    app.ticker.add(tickFn);
  }
  next();
}

// God rays / light burst from wild reel center
function spawnLightRays(cx, cy) {
  const RAYS = 14;
  const rays = [];
  for (let i = 0; i < RAYS; i++) {
    const angle = (i / RAYS) * Math.PI * 2;
    rays.push({ angle, len: 0.0 });
  }
  const g = new PIXI.Graphics();
  layerFX.addChild(g);

  let t = 0, rFn;
  rFn = (dt) => {
    t += dt;
    const progress = Math.min(t / 35, 1);
    const ease = progress < 0.5
      ? 4 * Math.pow(progress, 2)
      : 1 - Math.pow(-2 * progress + 2, 2) / 2;

    g.clear();
    const maxLen = GRID_H * 0.85;
    const maxW   = 22;

    rays.forEach((ray, i) => {
      const phase = Math.sin(t * 0.12 + i * 0.8) * 0.2 + 0.8;
      const len   = ease * maxLen * (0.6 + (i % 3) * 0.2) * phase;
      const w     = ease * maxW * (0.4 + (i % 2) * 0.3) * phase;
      const alpha = ease * 0.18 * phase * (1 - progress * 0.7);
      if (alpha < 0.01) return;

      g.beginFill(0xd4a017, alpha);
      const nx = Math.cos(ray.angle + Math.PI / 2);
      const ny = Math.sin(ray.angle + Math.PI / 2);
      const dx = Math.cos(ray.angle);
      const dy = Math.sin(ray.angle);
      g.drawPolygon([
        cx + nx * w / 2, cy + ny * w / 2,
        cx + dx * len,   cy + dy * len,
        cx - nx * w / 2, cy - ny * w / 2,
      ]);
      g.endFill();
    });

    if (t >= 50) { layerFX.removeChild(g); app.ticker.remove(rFn); }
  };
  app.ticker.add(rFn);
}

// Gold sparks + coin burst from wild landing position
function spawnWildParticles(cx, cy) {
  const COUNT = 48;
  const particles = [];

  for (let i = 0; i < COUNT; i++) {
    const p = new PIXI.Graphics();

    // Colour: gold, deep gold, orange-red
    const roll = Math.random();
    const color = roll > 0.6 ? 0xffd700 : roll > 0.3 ? 0xd4a017 : 0xff5500;
    const alpha = 0.85 + Math.random() * 0.15;
    const sz = 2.5 + Math.random() * 4;

    p.beginFill(color, alpha);
    const shape = Math.random();
    if (shape > 0.65) {
      // Circle spark
      p.drawCircle(0, 0, sz);
    } else if (shape > 0.30) {
      // Diamond
      p.drawPolygon([-sz, 0, 0, -sz * 1.8, sz, 0, 0, sz * 1.8]);
    } else {
      // Small star / irregular pentagon
      const pts = [];
      for (let s = 0; s < 5; s++) {
        const a1 = (s / 5) * Math.PI * 2 - Math.PI / 2;
        const a2 = ((s + 0.5) / 5) * Math.PI * 2 - Math.PI / 2;
        pts.push(Math.cos(a1) * sz, Math.sin(a1) * sz);
        pts.push(Math.cos(a2) * sz * 0.45, Math.sin(a2) * sz * 0.45);
      }
      p.drawPolygon(pts);
    }
    p.endFill();
    p.x = cx; p.y = cy;

    // Motion: first 16 particles fountain straight up, rest radial
    let angle, speed;
    if (i < 16) {
      // Fountain: shoot upward with spread
      angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.4;
      speed = 8 + Math.random() * 14;
    } else {
      // Radial burst
      angle = (i / COUNT) * Math.PI * 2 + Math.random() * 0.5;
      speed = 3 + Math.random() * 10;
    }

    p._vx = Math.cos(angle) * speed;
    p._vy = Math.sin(angle) * speed;
    p._life = 0;
    p._max  = 40 + Math.random() * 30;
    p._spin = (Math.random() - 0.5) * 0.25;
    layerFX.addChild(p);
    particles.push(p);
  }

  let pFn;
  pFn = (pdt) => {
    let anyAlive = false;
    for (const p of particles) {
      p._life += pdt;
      if (p._life >= p._max) { p.visible = false; continue; }
      anyAlive = true;
      p.x     += p._vx * pdt;
      p.y     += p._vy * pdt;
      p._vy   += 0.4 * pdt;          // gravity
      p._vx   *= Math.pow(0.98, pdt); // air resistance
      p.alpha  = Math.pow(1 - p._life / p._max, 0.6); // slower fade
      p.rotation += p._spin * pdt;
    }
    if (!anyAlive) {
      for (const p of particles) layerFX.removeChild(p);
      app.ticker.remove(pFn);
    }
  };
  app.ticker.add(pFn);
}

// ─────────────────────────────────────────────────────────────
//  IDLE WILD SPARKLE  (periodic ambient particles from sticky reels)
// ─────────────────────────────────────────────────────────────
{
  // Fires a small puff of 6-8 sparks from a random edge of each active wild reel
  const IDLE_INTERVAL = 140; // frames between puffs
  let idleTick = 0;

  app.ticker.add((dt) => {
    idleTick += dt;
    if (idleTick < IDLE_INTERVAL) return;
    idleTick = 0;

    wildReels.forEach(({ reel }) => {
      if (!wildOverlays[reel].visible) return;
      const cx = GRID_X + reel * CELL + SYM_SIZE / 2;
      // Emit from top or bottom edge randomly
      const ey = Math.random() > 0.5 ? GRID_Y : GRID_Y + GRID_H;
      const ex = GRID_X + reel * CELL + Math.random() * SYM_SIZE;

      for (let i = 0; i < 7; i++) {
        const p = new PIXI.Graphics();
        const isGold = Math.random() > 0.35;
        p.beginFill(isGold ? 0xffd700 : 0xd4a017, 0.85);
        const sz = 1 + Math.random() * 2.5;
        p.drawCircle(0, 0, sz);
        p.endFill();
        p.x = ex + (Math.random() - 0.5) * 30;
        p.y = ey;
        const upward = ey <= GRID_Y;
        const baseVY = upward ? -(2 + Math.random() * 3) : (2 + Math.random() * 3);
        p._vx = (Math.random() - 0.5) * 3;
        p._vy = baseVY;
        p._life = 0; p._max = 30 + Math.random() * 20;
        layerFX.addChild(p);

        let iFn;
        iFn = (idt) => {
          p._life += idt;
          if (p._life >= p._max) { layerFX.removeChild(p); app.ticker.remove(iFn); return; }
          p.x += p._vx * idt; p.y += p._vy * idt;
          p._vy += (upward ? 0.15 : -0.15) * idt;
          p.alpha = 1 - p._life / p._max;
        };
        app.ticker.add(iFn);
      }
    });
  });
}

// ─────────────────────────────────────────────────────────────
//  FREE SPINS
// ─────────────────────────────────────────────────────────────
// Number of permanent children added to each wildOverlay container at setup time.
// Any children beyond this count are stale revealMask objects left by aborted animations.
const WILD_OVERLAY_BASE_CHILDREN = 3; // clipMask, sh (video sprite), badge

function resetOverlays() {
  wildOverlays.forEach((o, r) => {
    o.visible = false;
    // Pause video and reset badge for next use
    if (o._vid) { o._vid.pause(); o._vid.currentTime = 0; }
    const bdg = o.getChildByName && o.getChildByName('badge');
    if (bdg) { bdg.visible = true; bdg.scale.set(1); }
    o.scale.set(1, 1);
    o.pivot.set(0, 0);
    o.x = GRID_X + r * CELL;
    o.y = GRID_Y;

    // Remove any stale revealMask children left by aborted expansion animations
    while (o.children.length > WILD_OVERLAY_BASE_CHILDREN) {
      o.removeChildAt(o.children.length - 1);
    }
    // Restore clip mask (index 0) in case it was replaced mid-animation
    o.mask = o.getChildAt(0);

    // Hide static border
    const brd = layerWild.getChildByName('brd_' + r);
    if (brd) { brd.visible = false; brd.alpha = 1; }

    // Cancel pulsing glow + hide bloom border
    if (wildGlowFns[r]) { app.ticker.remove(wildGlowFns[r]); wildGlowFns[r] = null; }
    const brd2 = layerWild.getChildByName('brd2_' + r);
    if (brd2) brd2.visible = false;
  });
}

let _buyBonusSuper = false;
let _forceBonusSpin = false;  // when true, makeBoard guarantees 3 scatters
let _pendingSuperWild = null; // saved wild info for super bonus (survives startSpin clear) // true when super bonus purchased (keeps pre-placed wild)

function triggerFS(count) {
  inFS = true; fsLeft = count;
  stopAllMusic();
  playSound('free_spins_trigger');
  _pendingSuperWild = null;
  _buyBonusSuper = false;
  wildReels = [];
  resetOverlays();
  const fsStartGen = _spinGen;
  showFSIntro(count, () => {
    playSound('free_spins_music');
    if (_spinGen === fsStartGen && !spinning) startSpin();
  });
}

async function endFS() {
  const totalWin = roundWin;
  inFS = false;
  _simMode = 'base'; // reset to base mode after FS
  // Keep wildReels and overlays visible until next spin starts.
  // startSpin() already clears them: wildReels=[]; resetOverlays();
  clearGameState();
  stopSound('free_spins_music');
  if (totalWin > 0) playSound('total_win');
  if (!IS_REPLAY) await RGS.endRound().catch(e=>console.warn('end-round failed',e));

  // Replay mode: show replay outro instead of normal FS outro
  if (IS_REPLAY) {
    const fsTier = totalWin > 0 ? getWinTier(totalWin) : null;
    const showOutro = () => {
      showReplayOutro(totalWin, () => {
        // "Replay Again" — restart the same replay
        roundWin = 0; wildReels = []; resetOverlays();
        showReplayIntro(_replayData, () => startReplayPlayback());
      });
    };
    if (fsTier) { showWinCelebration(totalWin, showOutro); } else { showOutro(); }
    return;
  }

  // Show win celebration for total FS win, then the outro screen
  const fsTier = totalWin > 0 ? getWinTier(totalWin) : null;
  if (fsTier) {
    showWinCelebration(totalWin, () => {
      showFSOutro(totalWin, () => { playSound('base_game_music'); updateUI(); });
    });
  } else {
    showFSOutro(totalWin, () => { playSound('base_game_music'); updateUI(); });
  }
}

async function fetchReplayData() {
  // Replay uses locally loaded book data. The Event ID from the Replay tab
  // is the index into the book array for the specified mode.
  const mode = REPLAY_MODE || 'base';
  console.log('[REPLAY] Looking up book entry — mode:', mode, 'eventId:', REPLAY_EVENT_ID);

  // Ensure the book for this mode is loaded
  await loadBook(mode);
  const book = _books[mode];
  if (!book || !book.length) {
    console.error('[REPLAY] No book data for mode:', mode);
    return null;
  }

  // Find the entry by event ID (index into book array)
  const eventIdx = REPLAY_EVENT_ID ? parseInt(REPLAY_EVENT_ID, 10) : 0;
  let entry = null;
  if (!isNaN(eventIdx) && eventIdx >= 0 && eventIdx < book.length) {
    entry = book[eventIdx];
  } else if (REPLAY_EVENT_ID) {
    // Try matching by simulation_id field if present
    entry = book.find(e => String(e.simulation_id) === REPLAY_EVENT_ID || String(e.id) === REPLAY_EVENT_ID);
  }
  if (!entry) {
    // Fallback: use first entry so replay still shows something
    console.warn('[REPLAY] Event ID', REPLAY_EVENT_ID, 'not found in book (length:', book.length, '), using first entry');
    entry = book[0];
  }

  try {
    const betAmt = REPLAY_AMOUNT ? fromRGS(parseInt(REPLAY_AMOUNT, 10)) : bet;
    const payout = (entry.payoutMultiplier || 0);
    const processed = processBookEntry(entry);
    console.log('[REPLAY] Loaded entry — payout:', processed.totalPayout, 'spins:', processed.spins.length);
    return { spins: processed.spins, totalPayout: processed.totalPayout,
             mode: mode, bet: betAmt, totalWin: processed.totalPayout * betAmt,
             payoutMultiplier: processed.totalPayout };
  } catch(e) {
    console.error('[REPLAY] Failed to process book entry:', e);
    return null;
  }
}

// ─────────────────────────────────────────────────────────────
//  SCATTER ANTICIPATION  (pulsing glow on reel while it baits)
// ─────────────────────────────────────────────────────────────
function startAnticipation(reel) {
  playSound('reel_anticipation');
  const x  = GRID_X + reel * CELL;
  const mx = x + SYM_SIZE / 2;
  const my = GRID_Y + GRID_H / 2;

  const glow = new PIXI.Graphics();
  layerFX.addChild(glow);

  // Dim the other reels
  const dim = new PIXI.Graphics();
  dim.beginFill(0x000000, 0.45);
  for (let r = 0; r < REELS; r++) {
    if (r !== reel) dim.drawRect(GRID_X + r * CELL, GRID_Y, SYM_SIZE, GRID_H);
  }
  dim.endFill();
  layerFX.addChild(dim);

  // Floating golden particles along the reel
  const sparks = [];
  for (let i = 0; i < 12; i++) {
    const s = new PIXI.Graphics();
    const sz = 1 + Math.random() * 2;
    s.beginFill(Math.random() < 0.6 ? 0xffd700 : 0xffcc00, 0.8);
    s.drawCircle(0, 0, sz);
    s.endFill();
    s.x = x + Math.random() * SYM_SIZE;
    s.y = GRID_Y + Math.random() * GRID_H;
    s._baseX = s.x;
    s._speed = 0.3 + Math.random() * 0.6;
    s._drift = (Math.random() - 0.5) * 0.8;
    s._phase = Math.random() * Math.PI * 2;
    layerFX.addChild(s);
    sparks.push(s);
  }

  let t = 0;
  const antFn = (adt) => {
    t += adt;
    if (!reelState[reel].spinning) {
      layerFX.removeChild(glow);
      layerFX.removeChild(dim);
      sparks.forEach(s => layerFX.removeChild(s));
      app.ticker.remove(antFn);
      return;
    }

    const pulse = 0.4 + Math.sin(t * 0.15) * 0.3;
    const pulse2 = 0.3 + Math.sin(t * 0.1 + 1) * 0.2;

    glow.clear();
    // Outer golden border — pulsing
    glow.lineStyle(4, 0xffd700, pulse);
    glow.drawRoundedRect(x - 4, GRID_Y - 4, SYM_SIZE + 8, GRID_H + 8, 10);
    // Inner warm glow fill
    glow.beginFill(0xffd700, 0.04 + Math.sin(t * 0.15) * 0.03);
    glow.drawRoundedRect(x, GRID_Y, SYM_SIZE, GRID_H, 6);
    glow.endFill();
    // Softer outer halo
    glow.lineStyle(2, 0xffaa00, pulse2 * 0.5);
    glow.drawRoundedRect(x - 8, GRID_Y - 8, SYM_SIZE + 16, GRID_H + 16, 13);

    // Animate floating sparks upward with drift
    sparks.forEach(s => {
      s.y -= s._speed;
      s.x = s._baseX + Math.sin(t * 0.08 + s._phase) * 6;
      s.alpha = 0.4 + Math.sin(t * 0.12 + s._phase) * 0.4;
      // Respawn at bottom when out of grid
      if (s.y < GRID_Y - 10) {
        s.y = GRID_Y + GRID_H + 5;
        s._baseX = x + Math.random() * SYM_SIZE;
      }
    });
  };
  app.ticker.add(antFn);
}

// ─────────────────────────────────────────────────────────────
//  SCREEN SHAKE  (stage-level camera effect)
// ─────────────────────────────────────────────────────────────
let _activeShakeFn = null;
function screenShake(intensity, duration) {
  // Cancel any existing shake before starting a new one
  if (_activeShakeFn) { app.ticker.remove(_activeShakeFn); app.stage.x = 0; app.stage.y = 0; }
  const dur = turboMode ? Math.max(duration * 0.4, 4) : duration;
  let t = 0;
  _activeShakeFn = (dt) => {
    t += dt;
    if (t >= dur) {
      app.stage.x = 0;
      app.stage.y = 0;
      app.ticker.remove(_activeShakeFn);
      _activeShakeFn = null;
      return;
    }
    const decay = Math.pow(1 - t / dur, 2);
    app.stage.x = (Math.random() * 2 - 1) * intensity * decay;
    app.stage.y = (Math.random() * 2 - 1) * intensity * decay * 0.5;
  };
  app.ticker.add(_activeShakeFn);
}

// ─────────────────────────────────────────────────────────────
//  ANIMATED WILD BORDER GLOW  (running light around perimeter)
// ─────────────────────────────────────────────────────────────
// Track per-reel glow animations so resetOverlays can cancel them
const wildGlowFns = new Array(5).fill(null);

function startWildGlow(r) {
  if (wildGlowFns[r]) { app.ticker.remove(wildGlowFns[r]); wildGlowFns[r] = null; }

  const brd = layerWild.getChildByName('brd_' + r);
  if (!brd) return;

  let brd2 = layerWild.getChildByName('brd2_' + r);
  if (!brd2) {
    brd2 = new PIXI.Graphics();
    brd2.name = 'brd2_' + r;
    layerWild.addChild(brd2);
  }
  brd2.visible = true;

  const rx = GRID_X + r * CELL;
  const ry = GRID_Y;
  const RW = SYM_SIZE;
  const RH = GRID_H;
  const P  = 2 * (RW + RH);  // perimeter in pixels
  const SPREAD = 90;           // glow spread along perimeter

  // Four side definitions: each is [x1,y1,x2,y2], start offset in perimeter
  const SIDES = [
    [rx,    ry,    rx+RW, ry,    0      ],  // top
    [rx+RW, ry,    rx+RW, ry+RH, RW     ],  // right
    [rx+RW, ry+RH, rx,   ry+RH, RW+RH  ],  // bottom (RTL)
    [rx,    ry+RH, rx,    ry,    RW+RH+RW],  // left (bottom→top)
  ];
  const SEG_LENGTHS = [RW, RH, RW, RH];

  let gt = 0;
  const LOOP_T = 160;  // frames per full loop

  const fn = (dt) => {
    if (!brd.visible) {
      brd2.visible = false;
      app.ticker.remove(fn);
      wildGlowFns[r] = null;
      return;
    }
    gt += dt;

    // Pulsing red outer bloom
    const pulse = 0.5 + Math.sin(gt * 0.07) * 0.5;
    brd2.clear();
    brd2.lineStyle(6 + pulse * 6, 0xff2200, 0.07 + pulse * 0.13);
    brd2.drawRoundedRect(rx - 5, ry - 5, RW + 10, RH + 10, 10);

    // Running gold light — position in pixels along perimeter
    const lightPx = ((gt / LOOP_T) % 1) * P;

    brd.clear();
    const STEPS = 24;  // segments per side

    SIDES.forEach(([x1, y1, x2, y2, segStart], si) => {
      const segLen = SEG_LENGTHS[si];
      for (let s = 0; s < STEPS; s++) {
        const t0  = s       / STEPS;
        const t1  = (s + 1) / STEPS;
        const mid = (t0 + t1) / 2;
        const posPx = segStart + mid * segLen;

        // Wrap-around distance on perimeter
        let d = Math.abs(posPx - lightPx);
        if (d > P / 2) d = P - d;

        const bright = Math.max(0, 1 - d / SPREAD);
        if (bright < 0.03) continue;

        const alpha = 0.35 + bright * 0.65;
        const lw    = 2   + bright * 3.5;
        brd.lineStyle(lw, 0xffd700, alpha);
        brd.moveTo(x1 + (x2 - x1) * t0, y1 + (y2 - y1) * t0);
        brd.lineTo(x1 + (x2 - x1) * t1, y1 + (y2 - y1) * t1);
      }
    });
  };
  app.ticker.add(fn);
  wildGlowFns[r] = fn;
}

        if (pt >= 15) { txtWin.scale.set(1); app.ticker.remove(_winScaleFn); _winScaleFn = null; }
      };
      app.ticker.add(_winScaleFn);
    } else {
      txtWin.text  = formatMoney(0);
      txtWin.style.fill = 0xd4a017;
      txtWin.scale.set(1);
    }
  }
  if (typeof _syncPortraitBar === 'function') _syncPortraitBar();
}

  xBtn.on('pointerdown',()=>{ playSound('button_click'); closeInfo(); });
  modal.addChild(xBtn);

  // Swipe gesture for page navigation (mobile touch)
  let _swStartX = 0;
  dim.on('pointerdown', (e) => { _swStartX = e.data.global.x; });
  dim.on('pointerup', (e) => {
    const dx = e.data.global.x - _swStartX;
    if (Math.abs(dx) > 40) {
      const np = currentPage + (dx < 0 ? 1 : -1);
      if (np >= 0 && np < pages.length) goPage(np);
    } else if (Math.abs(dx) < 8) {
      closeInfo();  // tap (no swipe) on background = close
    }
  });

  _gameInfoOverlay = modal;
  app.stage.addChild(modal);
}

// ─────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────
const portraitWarning = new PIXI.Container(); portraitWarning.visible = false; portraitWarning.interactive = true; portraitWarning.interactiveChildren = false;
const _pwBg = new PIXI.Graphics(); _pwBg.beginFill(0x08020e); _pwBg.drawRect(-500,-500,BASE_W+1000,BASE_H+1000); _pwBg.endFill(); portraitWarning.addChild(_pwBg);

// ── Portrait logo (above canvas) ─────────────────────────────

// ── Portrait HTML control bar ────────────────────────────────

_portraitBar.id = 'portrait-bar';
_portraitBar.innerHTML =

// Wire portrait bar button handlers
document.getElementById('p-spin').addEventListener('pointerdown', function(e){ e.preventDefault(); startSpin(); });
document.getElementById('p-minus').addEventListener('pointerdown', function(e){

document.getElementById('p-plus').addEventListener('pointerdown', function(e){

document.getElementById('p-buy').addEventListener('pointerdown', function(e){

});
document.getElementById('p-turbo').addEventListener('pointerdown', function(e){
