// ─────────────────────────────────────────────────────────────
//  SPIN CONTROL
// ─────────────────────────────────────────────────────────────
function startSpin() {
  if (spinning) return;
  if (_rgsBlocked) return;
  if (_winCelebrationActive) return;  // block during win celebration
  if (!IS_REPLAY && !inFS && balance < getEffectiveBet()) { showToast('INSUFFICIENT BALANCE'); return; }

  spinning    = true;
  _resultDone = false;
  _spinGen++;
  clearWinLines();
  playSound('spin_start');
  playSound('spin_loop');
  // betEvent for FS: round is already active, safe to send immediately
  if (inFS) RGS.betEvent('freespin');

  // Base game: clear any expanded wilds from previous spin before generating new board.
  // FS: wildReels persists (sticky mechanic) — only cleared in triggerFS/endFS.
  if (!inFS) {
    wildReels = [];
    resetOverlays();
    roundWin  = 0;
    if (!IS_REPLAY) balance = Math.round((balance - getEffectiveBet()) * 100) / 100;
    updateUI();

    if (IS_REPLAY) {
      // ═══ REPLAY MODE: spin data already loaded by startReplayPlayback ═══
      // Don't pick new book entry or call RGS — just use existing _simSpins
    } else if (!IS_DEMO) {
      // ═══ RGS BASE GAME: RGS data is the ONLY source of truth ═══
      // No local book data used — prevents visual mismatch between book and RGS.
      _rgsDataReady = false;
      const wasBuyBonus = _forceBonusSpin; // buy bonus handler already called RGS.play() with correct cost
      _forceBonusSpin = false;
      setTimeout(() => { if (!_rgsDataReady) { _rgsDataReady = true; console.warn('[RGS] timeout — ungating reels'); } }, 10000);
      if (!wasBuyBonus) RGS.play(getEffectiveBet(), _simMode); // skip if buy bonus already initiated the round
      // Generate random placeholder board for reel spinning animation.
      // RGS.play() callback will overwrite targetSyms with real data before reels stop.
      lastBoard = [];
      for (let r = 0; r < REELS; r++) {
        const col = [];
        for (let row = 0; row < ROWS; row++) col.push(weightedRandom(WEIGHTS));
        lastBoard.push(col);
      }
      _simSpins = [];  // empty until RGS populates
      _simSpinIdx = 0;
      _simMaxPayout = 0;
    } else {
      // ═══ DEMO BASE GAME: use local book data ═══
      const wasBuyBonusDemo = _forceBonusSpin; // save before clearing
      if (!_forceBonusSpin) RGS.play(getEffectiveBet(), _simMode);
      // NOTE: _forceBonusSpin stays true until after makeBoard() uses it
      const entry = pickBookEntry(_simMode);
      if (!entry) {
        // No book loaded — generate random demo board with wilds & scatters
        _currentEntry = null;
        lastBoard = makeBoard(); // uses _forceBonusSpin to force scatters
        _forceBonusSpin = false;
        // Detect wilds on board and create expanding wild data with random multipliers
        const _demoWilds = [];
        for (let r = 0; r < REELS; r++) {
          for (let row = 0; row < ROWS; row++) {
            if (lastBoard[r][row] === WILD) {
              _demoWilds.push({ reel: r, mult: pickWildMultiplier(), _landedRow: row });
              break;
            }
          }
        }
        // Count scatters on board for trigger data
        let _scatterPositions = [];
        for (let r = 0; r < REELS; r++) {
          for (let row = 0; row < ROWS; row++) {
            if (lastBoard[r][row] === SCATTER) _scatterPositions.push([r, row]);
          }
        }
        const _scTrigger = _scatterPositions.length >= 3
          ? { totalFs: 10, positions: _scatterPositions } : null;

        // For buy bonus: pre-generate all free spin boards
        const _fsSpins = [];
        if (wasBuyBonusDemo && _scTrigger) {
          const fsCount = 10;
          const _lockedWildReels = []; // reels that have become locked wilds
          // Super bonus: guarantee a Wild on reel 2 from spin 1
          if (_buyBonusSuper) _lockedWildReels.push(2);
          for (let fi = 0; fi < fsCount; fi++) {
            const fsBoard = _makeFSBoard(_lockedWildReels);
            const fsWilds = [];
            for (let r = 0; r < REELS; r++) {
              for (let row = 0; row < ROWS; row++) {
                if (fsBoard[r][row] === WILD) {
                  fsWilds.push({ reel: r, mult: pickWildMultiplier(), _landedRow: row });
                  // Lock this reel for all subsequent spins
                  if (!_lockedWildReels.includes(r)) _lockedWildReels.push(r);
                  break;
                }
              }
            }
            // ~25% chance to land a new Wild on a non-locked reel
            if (Math.random() < 0.25) {
              const freeReels = [0,1,2,3,4].filter(r => !_lockedWildReels.includes(r));
              if (freeReels.length > 0) {
                const wr = freeReels[Math.floor(Math.random() * freeReels.length)];
                const wrow = Math.floor(Math.random() * ROWS);
                fsBoard[wr][wrow] = WILD;
                fsWilds.push({ reel: wr, mult: pickWildMultiplier(), _landedRow: wrow });
                _lockedWildReels.push(wr);
              }
            }
            _fsSpins.push({
              board: fsBoard, wilds: fsWilds, wins: [], winAmount: 0,
              scatterTrigger: null, stickyWilds: fsWilds.map(w => ({reel: w.reel, mult: w.mult})),
              fsUpdate: null, anticipation: []
            });
          }
        }

        _simSpins = [{ board: lastBoard, wilds: _demoWilds, wins: [], winAmount: 0,
                       scatterTrigger: _scTrigger, stickyWilds: null, fsUpdate: null, anticipation: [] },
                     ..._fsSpins];
        _fsPreGenerated = _fsSpins.length > 0; // true for Buy Bonus (all FS boards pre-loaded)
        _simMaxPayout = 0;
        _simSpinIdx = 0;
      } else {
        _forceBonusSpin = false;
        _currentEntry = entry;
        const processed = processBookEntry(entry);
        _simSpins = processed.spins;
        _fsPreGenerated = processed.spins.length > 1; // book data has all spins pre-loaded
        _simMaxPayout = processed.totalPayout;
        _simSpinIdx = 0;
      }
    }
  } else {
    // ═══ FREE SPINS: increment through existing spin array ═══
    fsLeft--;
    _simSpinIdx++;
    if (fsLeft < 0) {
      spinning = false;
      endFS();
      return;
    }
    // Demo mode: generate FS board on the fly if we ran out of pre-generated ones
    if (IS_DEMO && _simSpinIdx >= _simSpins.length) {
      const lockedReels = wildReels.map(w => w.reel);
      const fsBoard = _makeFSBoard(lockedReels);
      const fsWilds = [];
      for (let r = 0; r < REELS; r++) {
        for (let row = 0; row < ROWS; row++) {
          if (fsBoard[r][row] === WILD) {
            fsWilds.push({ reel: r, mult: pickWildMultiplier(), _landedRow: row });
            break;
          }
        }
      }
      // ~20% chance for new Wild on unlocked reel
      if (Math.random() < 0.20) {
        const freeReels = [0,1,2,3,4].filter(r => !lockedReels.includes(r));
        if (freeReels.length > 0) {
          const wr = freeReels[Math.floor(Math.random() * freeReels.length)];
          const wrow = Math.floor(Math.random() * ROWS);
          fsBoard[wr][wrow] = WILD;
          fsWilds.push({ reel: wr, mult: pickWildMultiplier(), _landedRow: wrow });
        }
      }
      // DEBUG: check board before push
      const _pushCounts = fsBoard.map(col => col.filter(c => c === 'wild').length);
      if (_pushCounts.some(c => c > 1)) {
        console.error('[ON-THE-FLY BUG] Board has >1 wild per reel before push!');
      }
      _simSpins.push({
        board: fsBoard, wilds: fsWilds, wins: [], winAmount: 0,
        scatterTrigger: null, stickyWilds: [...wildReels.map(w=>({reel:w.reel,mult:w.mult})), ...fsWilds.filter(w => !lockedReels.includes(w.reel)).map(w=>({reel:w.reel,mult:w.mult}))],
        fsUpdate: null, anticipation: []
      });
    }
    if (_simSpinIdx >= _simSpins.length) {
      spinning = false;
      endFS();
      return;
    }
  }
  updateUI();

  // Get current spin data — in RGS base game, _simSpins is empty here (filled by RGS callback later)
  const spinData = _simSpins[_simSpinIdx];
  if (!IS_DEMO && !inFS) {
    // RGS mode: don't need spinData yet — reels will spin on random targets.
    // RGS.play() callback sets real lastBoard, targetSyms, and _simSpins.
    // onAllStopped() will read the final spinData after RGS data arrives.
  } else {
    // Demo/FS: spinData must exist from book
    if (!spinData || !spinData.board) {
      spinning = false;
      if (inFS) { showToast('RECOVERING...'); endFS(); return; }
      showToast('BOOK DATA ERROR');
      return;
    }
    lastBoard = spinData.board.map(col => [...col]); // DEEP COPY — never mutate spinData.board
    // DEBUG: check if board is pre-corrupted with all wilds
    if (inFS) {
      // Check ORIGINAL spinData.board directly (not through lastBoard alias)
      const origBoard = _simSpins[_simSpinIdx].board;
      const wildCounts = lastBoard.map((col, r) => col.filter(c => c === WILD).length);
      if (wildCounts.some(c => c === ROWS)) {
        console.error('[WILD BUG] Board already ALL WILD at spin start! spinIdx:', _simSpinIdx,
          'board ref same as prev?', _simSpinIdx > 1 && _simSpins[_simSpinIdx].board === _simSpins[_simSpinIdx-1].board);
      }
    }
  }

  // Strip expanding wild reels for demo/FS (RGS mode handles this in RGS.play callback)
  if ((IS_DEMO || inFS) && spinData && spinData.wilds && spinData.wilds.length > 0) {
    for (const w of spinData.wilds) {
      const isSticky = wildReels.some(wr => wr.reel === w.reel);
      if (isSticky) continue;
      let wildRow = -1;
      for (let row = 0; row < ROWS; row++) {
        if (lastBoard[w.reel][row] === WILD) { wildRow = row; break; }
      }
      w._landedRow = wildRow >= 0 ? wildRow : 2;
      for (let row = 0; row < ROWS; row++) {
        if (row === w._landedRow) continue;
        if (lastBoard[w.reel][row] === WILD) {
          lastBoard[w.reel][row] = weightedRandom(inFS ? WEIGHTS_FS : WEIGHTS);
        }
      }
    }
  }

  // Strip sticky wild reels: book/RGS data has ALL cells as WILD (math engine's
  // post-expansion view), but visually we need 1 wild → expand animation.
  // Keep exactly 1 wild at a random row, replace rest with random FS symbols.
  if (inFS && wildReels.length > 0) {
    for (const wr of wildReels) {
      let wildCount = 0;
      for (let row = 0; row < ROWS; row++) {
        if (lastBoard[wr.reel][row] === WILD) wildCount++;
      }
      if (wildCount > 1) {
        const keepRow = Math.floor(Math.random() * ROWS);
        for (let row = 0; row < ROWS; row++) {
          if (row === keepRow) {
            lastBoard[wr.reel][row] = WILD;
          } else {
            lastBoard[wr.reel][row] = weightedRandom(WEIGHTS_FS);
          }
        }
      }
    }
  }

  // ── DEBUG: trace wild state at spin start ──
  if (inFS) {
  }

  const now = Date.now();
  let spinDelay = 0;

  for (let r = 0; r < REELS; r++) {
    const rs      = reelState[r];
    const isSticky = inFS && wildReels.some(w => w.reel === r);

    if (isSticky) {
      // Locked wild reel — spins normally but guaranteed to land Wild
      // Reset overlay so it re-expands after landing
      const ov = wildOverlays[r];
      if (ov) {
        ov.visible = false;
        const bdg = ov._badge; if (bdg) bdg.visible = false;
      }
      // Also hide the border graphic
      const brd = layerWild.getChildByName('brd_' + r);
      if (brd) brd.visible = false;
      // Show sprites and clear stale WILD textures left by afterWilds() mutation
      if (reelSprites[r]) reelSprites[r].forEach(sp => {
        sp.visible = true;
        sp.texture = T(weightedRandom(WEIGHTS_FS));
        sp.width = SYM_SIZE; sp.height = SYM_SIZE;
      });
      rs.spinning   = true;
      rs.stopping   = false;
      rs.stopped    = false;
      rs.velocity   = 0;
      rs.targetSyms = lastBoard[r];
      rs.overshooting = false;
      // Backward lurch — skip in turbo mode for speed
      rs.lurching   = !turboMode;
      rs.lurchT     = 0;
      rs.lurchBaseY = GRID_Y;
      const _stagger = turboMode === 2 ? 10 : turboMode === 1 ? 40 : REEL_STAGGER;
      const _baseStop = turboMode === 2 ? 200 : turboMode === 1 ? 600 : 1500;
      const _delayMul = turboMode === 2 ? 20 : turboMode === 1 ? 80 : 210;
      rs.startTime  = now + r * _stagger;
      rs.stopTime   = rs.startTime + _baseStop + spinDelay * _delayMul;
      spinDelay++;
      reelContainers[r].filters = null;
    } else {
      rs.spinning   = true;
      rs.stopping   = false;
      rs.stopped    = false;
      rs.velocity   = 0;
      rs.targetSyms = lastBoard[r];
      rs.overshooting = false;
      // Backward lurch — skip in turbo mode for speed
      rs.lurching   = !turboMode;
      rs.lurchT     = 0;
      rs.lurchBaseY = GRID_Y;
      const _stagger = turboMode === 2 ? 10 : turboMode === 1 ? 40 : REEL_STAGGER;
      const _baseStop = turboMode === 2 ? 200 : turboMode === 1 ? 600 : 1500;
      const _delayMul = turboMode === 2 ? 20 : turboMode === 1 ? 80 : 210;
      rs.startTime  = now + r * _stagger;
      rs.stopTime   = rs.startTime + _baseStop + spinDelay * _delayMul;
      spinDelay++;
      reelContainers[r].filters = null;
    }
  }

  // Scatter anticipation moved to RGS.play() callback — uses RGS data, not local book
  // In demo mode, use local book data for anticipation
  // Scatter anticipation — real scatters only (demo mode)
  if (IS_DEMO && !inFS && !turboMode && !reelState[4].stopped) {
    const sc0 = lastBoard[0].includes(SCATTER);
    const sc2 = lastBoard[2].includes(SCATTER);
    const realAnticipation = sc0 && sc2;
    if (realAnticipation) {
      reelState[4].stopTime = Math.max(reelState[4].stopTime, reelState[2].stopTime + 3500);
      const glowDelay = reelState[2].stopTime - Date.now() + 400;
      setTimeout(() => { if (spinning) startAnticipation(4); }, Math.max(glowDelay, 0));
    }
  }

  // If every reel is sticky (all wild), no reel will spin — trigger directly
  if (reelState.every(rs => rs.stopped)) {
    _resultDone = true;
    onAllStopped();
  }
}

function checkAllStopped() {
  if (reelState.some(rs => !rs.stopped)) return;
  if (_resultDone) return;   // already processed this spin's result
  _resultDone = true;
  // NOTE: spinning stays true here — onAllStopped / expandWilds will clear it
  // only after all post-spin animations (wild expansion, scatter pop) finish.
  onAllStopped();
}

// ─────────────────────────────────────────────────────────────
//  GRAPHICS OBJECT POOL — reuse instead of creating new each spin
// ─────────────────────────────────────────────────────────────
const _gfxPool = [];
function getGfx() {
  if (_gfxPool.length > 0) {
    const g = _gfxPool.pop();
    g.clear();
    g.alpha = 1;
    g.scale.set(1);
    g.rotation = 0;
    g.tint = 0xffffff;
    g.blendMode = PIXI.BLEND_MODES.NORMAL;
    g.visible = true;
    g.x = 0; g.y = 0;
    return g;
  }
  return new PIXI.Graphics();
}
function releaseGfx(g) {
  g.clear();
  if (g.parent) g.parent.removeChild(g);
  g.visible = false;
  _gfxPool.push(g);
}
// Batch release + destroy for cleanup arrays
function cleanupDisplayList(arr) {
  for (const obj of arr) {
    if (obj instanceof PIXI.Graphics) {
      releaseGfx(obj);
    } else {
      if (obj.parent) obj.parent.removeChild(obj);
      obj.destroy({ children: true, texture: false, baseTexture: false });
    }
  }
  arr.length = 0;
}

function animateScatterPop(cb) {
  const scatters = [];
  for (let r = 0; r < REELS; r++)
    for (let row = 0; row < ROWS; row++)
      if (lastBoard[r][row] === SCATTER)
        scatters.push({ r, row });

  if (scatters.length === 0) {
    console.warn('[SCATTER] scatterTrigger fired but no scatter symbols on board — skipping animation');
    cb();
    return;
  }

  const scGen = _spinGen;
  const scatterTex = T(SCATTER);
  const cleanup = [];
  const centerX = GRID_X + GRID_W / 2;
  const centerY = GRID_Y + GRID_H / 2;

  // Phase 1: Each scatter pulses and lifts, staggered
  const sprites = [];
  scatters.forEach(({ r, row }, idx) => {
    const cellX = GRID_X + r * CELL;
    const cellY = GRID_Y + row * CELL;
    const mx = cellX + SYM_SIZE / 2;
    const my = cellY + SYM_SIZE / 2;

    // Scatter sprite clone
    const sp = new PIXI.Sprite(scatterTex);
    sp.anchor.set(0.5);
    sp.x = mx; sp.y = my;
    sp.width = SYM_SIZE; sp.height = SYM_SIZE;
    cleanup.push(sp);
    layerFX.addChild(sp);

    // Pulsing glow behind each scatter
    const glow = getGfx();
    cleanup.push(glow);
    layerFX.addChild(glow);

    // Trail particles per scatter
    const trail = [];
    for (let i = 0; i < 8; i++) {
      const tp = getGfx();
      tp.beginFill(0xffd700, 0.7);
      tp.drawCircle(0, 0, 1.5 + Math.random() * 2);
      tp.endFill();
      tp.x = mx; tp.y = my;
      tp.alpha = 0;
      cleanup.push(tp);
      layerFX.addChild(tp);
      trail.push(tp);
    }

    sprites.push({ sp, glow, mx, my, trail, startDelay: idx * (turboMode ? 4 : 12) });
  });

  // Phase 1 animation: pulse + glow
  const P1_DUR = turboMode ? 15 : 40;
  let t1 = 0;
  const phase1Fn = (dt) => {
    t1 += dt;
    let allDone = true;

    sprites.forEach(({ sp, glow, mx, my, trail, startDelay }) => {
      const lt = t1 - startDelay;
      if (lt < 0) { allDone = false; return; }
      const p = Math.min(lt / P1_DUR, 1);

      // Elastic bounce scale
      const elastic = p < 1
        ? 1 - Math.pow(2, -10 * p) * Math.cos(p * Math.PI * 3)
        : 1;
      const sc = 0.8 + elastic * 0.5;
      sp.width = SYM_SIZE * sc; sp.height = SYM_SIZE * sc;

      // Pulsing glow
      const ga = 0.5 * (1 - p * 0.5);
      glow.clear();
      glow.beginFill(0xffd700, ga * 0.15);
      glow.drawCircle(mx, my, SYM_SIZE * 0.6 * sc);
      glow.endFill();
      glow.lineStyle(3, 0xffd700, ga);
      glow.drawCircle(mx, my, SYM_SIZE * 0.5 * sc);

      if (p < 1) allDone = false;
    });

    if (allDone || (_spinGen !== scGen)) {
      app.ticker.remove(phase1Fn);
      if (_spinGen !== scGen) { cleanupAll(); return; }
      startPhase2();
    }
  };
  app.ticker.add(phase1Fn);

  // Phase 2: Fly scatters to center + merge
  function startPhase2() {
    playSound('scatter_merge');
    const FLY_DUR = turboMode ? 12 : 30;
    let t2 = 0;

    // Store starting positions
    sprites.forEach(s => { s.startX = s.sp.x; s.startY = s.sp.y; });

    const phase2Fn = (dt) => {
      t2 += dt;
      const p = Math.min(t2 / FLY_DUR, 1);
      // Ease-in-out cubic
      const ease = p < 0.5 ? 4 * p * p * p : 1 - Math.pow(-2 * p + 2, 3) / 2;

      sprites.forEach(({ sp, glow, startX, startY, trail }) => {
        sp.x = startX + (centerX - startX) * ease;
        sp.y = startY + (centerY - startY) * ease;
        // Shrink as they approach center
        const sc = 1.3 * (1 - ease * 0.6);
        sp.width = SYM_SIZE * sc; sp.height = SYM_SIZE * sc;
        sp.alpha = 1;
        // Glow follows
        glow.clear();
        glow.beginFill(0xffd700, 0.12 * (1 - ease));
        glow.drawCircle(sp.x, sp.y, SYM_SIZE * 0.4 * sc);
        glow.endFill();
        // Trail particles
        trail.forEach((tp, ti) => {
          const trailP = Math.max(0, p - ti * 0.03);
          tp.x = startX + (centerX - startX) * trailP * 0.9;
          tp.y = startY + (centerY - startY) * trailP * 0.9;
          tp.alpha = (1 - ease) * 0.6;
        });
      });

      if (p >= 1 || (_spinGen !== scGen)) {
        app.ticker.remove(phase2Fn);
        if (_spinGen !== scGen) { cleanupAll(); return; }
        startPhase3();
      }
    };
    app.ticker.add(phase2Fn);
  }

  // Phase 3: Merge explosion + shockwave from center
  function startPhase3() {
    screenShake(10, turboMode ? 10 : 25);

    // Hide flying sprites
    sprites.forEach(({ sp, glow, trail }) => {
      sp.alpha = 0; glow.clear();
      trail.forEach(tp => { tp.alpha = 0; });
    });

    // Massive center flash
    const mergeFlash = new PIXI.Graphics();
    mergeFlash.beginFill(0xffffff, 1);
    mergeFlash.drawCircle(centerX, centerY, SYM_SIZE * 0.8);
    mergeFlash.endFill();
    if (!_isMobile) mergeFlash.filters = [new PIXI.filters.BlurFilter(24)];
    cleanup.push(mergeFlash);
    layerFX.addChild(mergeFlash);

    // Merge shockwave rings
    const shockwave1 = new PIXI.Graphics();
    const shockwave2 = new PIXI.Graphics();
    cleanup.push(shockwave1, shockwave2);
    layerFX.addChild(shockwave1);
    layerFX.addChild(shockwave2);

    // Light rays from center
    const mergeRays = new PIXI.Graphics();
    cleanup.push(mergeRays);
    layerFX.addChild(mergeRays);

    // Explosion particles
    const expParticles = [];
    for (let i = 0; i < 40; i++) {
      const ep = new PIXI.Graphics();
      const sz = 1.5 + Math.random() * 3.5;
      const colors = [0xffd700, 0xffaa00, 0xffffff, 0xff69b4, 0xffe066, 0x87ceeb];
      ep.beginFill(colors[Math.floor(Math.random() * colors.length)], 1);
      ep.drawCircle(0, 0, sz);
      ep.endFill();
      ep.x = centerX; ep.y = centerY;
      const angle = Math.random() * Math.PI * 2;
      const speed = 3 + Math.random() * 8;
      ep._vx = Math.cos(angle) * speed;
      ep._vy = Math.sin(angle) * speed - 1;
      cleanup.push(ep);
      layerFX.addChild(ep);
      expParticles.push(ep);
    }

    // Full screen flash overlay
    const screenFlash = new PIXI.Graphics();
    screenFlash.beginFill(0xffffff, 0.4);
    screenFlash.drawRect(0, 0, BASE_W, BASE_H);
    screenFlash.endFill();
    cleanup.push(screenFlash);
    layerFX.addChild(screenFlash);

    const P3_DUR = turboMode ? 20 : 50;
    let t3 = 0;
    const phase3Fn = (dt) => {
      t3 += dt;
      const p = Math.min(t3 / P3_DUR, 1);

      // Screen flash fades fast
      screenFlash.alpha = 0.4 * Math.pow(1 - p, 4);

      // Center flash shrinks and fades
      mergeFlash.alpha = Math.pow(1 - p, 2);

      // Dual shockwaves expand
      const sw1R = SYM_SIZE * 0.3 + p * GRID_W * 0.6;
      shockwave1.clear();
      shockwave1.lineStyle(5 * (1 - p), 0xffd700, 0.8 * (1 - p));
      shockwave1.drawCircle(centerX, centerY, sw1R);
      const sw2R = SYM_SIZE * 0.2 + p * GRID_W * 0.45;
      shockwave2.clear();
      shockwave2.lineStyle(3 * (1 - p), 0xffffff, 0.5 * (1 - p));
      shockwave2.drawCircle(centerX, centerY, sw2R);

      // Light rays spin outward
      mergeRays.clear();
      const rAlpha = 0.7 * Math.pow(1 - p, 1.5);
      const rLen = SYM_SIZE * 0.5 + p * GRID_W * 0.5;
      for (let i = 0; i < 16; i++) {
        const a = (i / 16) * Math.PI * 2 + t3 * 0.04;
        mergeRays.lineStyle(3 - p * 2, 0xffd700, rAlpha * (0.5 + 0.5 * Math.sin(a * 4)));
        mergeRays.moveTo(centerX, centerY);
        mergeRays.lineTo(centerX + Math.cos(a) * rLen, centerY + Math.sin(a) * rLen);
      }

      // Particles fly out with gravity
      expParticles.forEach(ep => {
        ep.x += ep._vx;
        ep.y += ep._vy;
        ep._vx *= 0.96;
        ep._vy += 0.12;
        ep._vy *= 0.96;
        ep.alpha = Math.max(0, 1 - p * 1.3);
      });

      if (t3 >= P3_DUR || (_spinGen !== scGen)) {
        app.ticker.remove(phase3Fn);
        // Hold briefly then clean up and callback
        const holdTime = turboMode ? 200 : 800;
        setTimeout(() => {
          cleanupAll();
          if (_spinGen === scGen) cb();
        }, holdTime);
      }
    };
    app.ticker.add(phase3Fn);
  }

  function cleanupAll() {
    cleanup.forEach(o => {
      if (o._tickFn) app.ticker.remove(o._tickFn);
      if (o instanceof PIXI.Graphics) {
        releaseGfx(o);
      } else {
        if (o.parent) o.parent.removeChild(o);
        if (!o.destroyed) o.destroy({ children: true, texture: false, baseTexture: false });
      }
    });
  }
}


async function onAllStopped() {
  stopSound('spin_loop');
  // ── RGS mode: await play response and sync data BEFORE any decisions ──
  if (!IS_DEMO && RGS._playPromise) {
    try {
      await RGS._playPromise;
      if (RGS._rgsSpins && RGS._rgsSpins.length > 0) {
        _simSpins = RGS._rgsSpins;
        _fsPreGenerated = RGS._rgsSpins.length > 1; // RGS returns all spins (base + FS) upfront
        _simMaxPayout = RGS._rgsMaxPayout;
        if (!inFS) _simSpinIdx = 0;
        // Board and reel targets already set by RGS.play() callback (stripped wilds).
        // Do NOT re-snap here — that would overwrite with the raw post-expansion board.
      }
    } catch(e) {
      console.error('[RGS] failed to sync data in onAllStopped:', e);
    }
  }

  // spinData is now authoritative (RGS data in real mode, book data in demo/FS)
  const spinData = _simSpins[_simSpinIdx];

  // Guard: if no spin data (RGS failed or timed out), end the spin gracefully
  if (!spinData) {
    console.warn('[SPIN] No spin data in onAllStopped, ending spin');
    spinning = false;
    if (inFS) { endFS(); } else { await RGS.endRound().catch(()=>{}); }
    updateUI();
    return;
  }

  // Check for scatter trigger
  const hasScatterTrigger = spinData && spinData.scatterTrigger;
  let scatterCount = 0;
  if (hasScatterTrigger) {
    scatterCount = spinData.scatterTrigger.positions.length;
  }

  // Scatter detection — sound only for 1-2, full celebration for 3+
  if (!inFS) {
    let boardScatterCount = 0;
    for (let r = 0; r < REELS; r++)
      for (let row = 0; row < ROWS; row++)
        if (lastBoard[r][row] === SCATTER) boardScatterCount++;

    if (boardScatterCount >= 3) {
      setTimeout(() => { animateScatterPop(() => { afterWilds(); }); }, 320);
      return;
    } else if (boardScatterCount >= 1) {
      playSound('scatter_land');
    }
  }

  // ── DEBUG: trace wild state at spin end ──
  if (inFS) {
  }

  // Wild expansion from spin data (now consistent for both modes)
  const newWilds = [];
  if (spinData && spinData.wilds && spinData.wilds.length > 0) {
    for (const w of spinData.wilds) {
      const isAlreadyWild = wildReels.some(wr => wr.reel === w.reel);
      if (isAlreadyWild) continue;
      // Use actual landed row from stripping phase, or find it on the board
      let landedRow = w._landedRow;
      if (landedRow == null) {
        landedRow = -1;
        for (let row = 0; row < ROWS; row++) {
          if (lastBoard[w.reel][row] === WILD) { landedRow = row; break; }
        }
        if (landedRow < 0) landedRow = 2; // fallback: center
      }
      newWilds.push({ reel: w.reel, row: landedRow, mult: w.mult });
    }
  }

  // Sticky wild multiplier re-reveal: in FS, existing sticky wilds get fresh multipliers each spin
  // skipReels: Set of reel indices that were JUST expanded this spin — their mults are already locked
  const _revealStickyMults = (done, skipReels) => {
    if (!inFS || wildReels.length === 0) { done(); return; }
    // Use spinData.stickyWilds if available, otherwise fall back to wildReels
    const stickySource = (spinData && spinData.stickyWilds && spinData.stickyWilds.length > 0)
      ? spinData.stickyWilds
      : wildReels.map(wr => ({ reel: wr.reel, mult: wr.mult }));
    const stickyToReveal = stickySource.filter(sw =>
      wildReels.some(wr => wr.reel === sw.reel) &&
      !(skipReels && skipReels.has(sw.reel))  // skip wilds that just expanded — their mult is locked
    );
    if (stickyToReveal.length === 0) { done(); return; }
    let completed = 0;
    const thisGen = _spinGen;
    stickyToReveal.forEach((sw, idx) => {
      const ov = wildOverlays[sw.reel];
      if (!ov) { completed++; if (completed >= stickyToReveal.length) done(); return; }
      const badge = ov._badge;
      if (!badge) { completed++; if (completed >= stickyToReveal.length) done(); return; }
      // Stagger: expand overlay with mask animation, then spin multiplier
      const delay = turboMode ? idx * 3 : idx * 10;
      setTimeout(() => {
        if (_spinGen !== thisGen) return;
        // Hide sprites
        if (reelSprites[sw.reel]) reelSprites[sw.reel].forEach(sp => { sp.visible = false; });
        // lastBoard wild fill deferred to afterWilds() which creates a safe copy
        // Find wild position for expansion origin
        let wildRow = 2;
        for (let row = 0; row < ROWS; row++) {
          if (wildReels.some(wr => wr.reel === sw.reel)) { wildRow = row; break; }
        }
        // Mask-based expansion
        ov.pivot.set(0, 0);
        ov.x = GRID_X + sw.reel * CELL;
        ov.y = GRID_Y;
        ov.scale.set(1, 1);
        const revealMask = new PIXI.Graphics();
        ov.addChild(revealMask);
        ov.mask = revealMask;
        ov.visible = true;
        const originY = wildRow * CELL + CELL / 2;
        let t = 0;
        const expandFn = (edt) => {
          if (_spinGen !== thisGen) {
            ov.mask = ov.getChildAt(0);
            if (ov.children.indexOf(revealMask) !== -1) ov.removeChild(revealMask);
            app.ticker.remove(expandFn);
            return;
          }
          t += edt;
          const speed = turboMode ? 2.0 : 1.0;
          const progress = Math.min(t / (18 / speed), 1);
          const ease = 1 - Math.pow(1 - progress, 3);
          const halfH = ease * (GRID_H / 2 + CELL);
          const top = Math.max(0, originY - halfH);
          const bottom = Math.min(GRID_H, originY + halfH);
          revealMask.clear();
          revealMask.beginFill(0xffffff);
          revealMask.drawRect(0, top, SYM_SIZE, bottom - top);
          revealMask.endFill();
          if (progress >= 1) {
            ov.mask = ov.getChildAt(0);
            ov.removeChild(revealMask);
            app.ticker.remove(expandFn);
            const brd = layerWild.getChildByName('brd_' + sw.reel);
            if (brd) brd.visible = true;
            _runMultSpinner(badge, sw.mult, thisGen, () => {
              completed++;
              if (completed >= stickyToReveal.length) done();
            });
          }
        };
        app.ticker.add(expandFn);
        playSound('wild_expand');
      }, delay * 16);
    });
  };

  if (newWilds.length > 0) {
    const thisGen = _spinGen;
    // Track which reels are being expanded NOW — their mults lock on expand completion
    const newWildReelSet = new Set(newWilds.map(w => w.reel));
    setTimeout(() => {
      if (_spinGen !== thisGen) return;
      expandWilds(newWilds, () => {
        if (_spinGen !== thisGen) return;
        // Pass skipReels so sticky re-reveal doesn't touch the just-expanded wilds
        _revealStickyMults(() => { afterWilds(); }, newWildReelSet);
      }, thisGen);
    }, turboMode ? 0 : 500);
  } else if (inFS && wildReels.length > 0) {
    // No new wilds — just re-reveal sticky overlays via _revealStickyMults
    // (which already has mask expansion + multiplier spinner built in).
    // Brief pause so landed symbols are visible before expansion.
    const thisGen = _spinGen;
    setTimeout(() => {
      if (_spinGen !== thisGen) return;
      _revealStickyMults(() => { afterWilds(); });
    }, turboMode ? 50 : 350);
  } else {
    afterWilds();
  }
}

// ─────────────────────────────────────────────────────────────
//  WIN CALCULATION  (left-to-right payline scan, Zeus-style)
// ─────────────────────────────────────────────────────────────

// Real payline scanner — evaluates the ACTUAL board against PAYLINES + PAYTABLE
// Used in RGS mode where local book data doesn't match the displayed board
function scanPaylines(board) {
  lastWinLines = [];
  let total = 0;

  for (let i = 0; i < PAYLINES.length; i++) {
    const line = PAYLINES[i];

    // Determine base symbol (first non-wild on the line from left)
    let baseSym = null;
    for (let c = 0; c < REELS; c++) {
      const s = board[c][line[c]];
      if (s !== WILD && s !== SCATTER) {
        baseSym = s;
        break;
      }
    }
    // All wilds from left — treat as best paying symbol (watermelon)
    if (!baseSym) baseSym = 'watermelon';

    if (!PAYTABLE[baseSym]) continue;

    // Count consecutive matching symbols from left (wild substitutes)
    let count = 0;
    for (let c = 0; c < REELS; c++) {
      const s = board[c][line[c]];
      if (s === baseSym || s === WILD) {
        count++;
      } else {
        break;
      }
    }

    if (count >= 3) {
      const payIdx = count - 3; // 0=3oak, 1=4oak, 2=5oak
      const pay = PAYTABLE[baseSym][payIdx];
      if (pay > 0) {
        const lineWin = Math.round(pay * bet * 100) / 100;
        total += lineWin;
        lastWinLines.push({ line, count, base: baseSym, win: lineWin });
      }
    }
  }

  return Math.round(total * 100) / 100;
}

function calculateWins(board) {
  // Book-driven: wins come from the book entry, not local calculation
  const spinData = _simSpins[_simSpinIdx];
  lastWinLines = [];

  if (!spinData || !spinData.wins || spinData.wins.length === 0) return 0;

  let total = 0;
  for (const w of spinData.wins) {
    // Book lineIndex is 1-based (SDK paylines dict keys 1-20), frontend PAYLINES is 0-based
    const lineIdx = (w.meta && w.meta.lineIndex != null) ? w.meta.lineIndex - 1 : -1;
    const line = (lineIdx >= 0 && lineIdx < PAYLINES.length) ? PAYLINES[lineIdx] : null;
    const lineWin = w.win * bet; // w.win is already in bet-multiplier units (cents/100)
    total += lineWin;
    if (line) {
      lastWinLines.push({ line, count: w.kind, base: w.symbol, win: lineWin });
    }
  }

  return Math.round(total * 100) / 100;
}

function getWinTier(winAmount) {
  const mult = winAmount / bet;
  let tier = null;
  for (const t of WIN_TIERS) {
    if (mult >= t.min) tier = t;
  }
  return tier;

let _winCelebrationActive = false;

function showWinCelebration(winAmount, onComplete) {
  const finalTier = getWinTier(winAmount);
  if (!finalTier) { onComplete(); return; }

  _winCelebrationActive = true;
  paylineLayer.visible = false;  // hide win line frames behind celebration
  const _FONT = "'Cherry Bomb One', 'Fredoka', sans-serif";

  // ── Tier-specific config ──
  const tierIdx = WIN_TIERS.indexOf(finalTier);
  const tierConfig = [
    { sprinkles: 20, sparkles: 8,  bursts: 0, shake: 0, glowPulse: 0.15, framePulse: 0,    rainbowTint: false, countMs: 1500 },
    { sprinkles: 40, sparkles: 15, bursts: 1, shake: 3, glowPulse: 0.25, framePulse: 0,    rainbowTint: false, countMs: 2000 },
    { sprinkles: 65, sparkles: 25, bursts: 2, shake: 5, glowPulse: 0.40, framePulse: 0,    rainbowTint: false, countMs: 2500 },
    { sprinkles: 80, sparkles: 35, bursts: 3, shake: 7, glowPulse: 0.55, framePulse: 0.03, rainbowTint: true,  countMs: 3000 },
  ][tierIdx] || { sprinkles: 20, sparkles: 8, bursts: 0, shake: 0, glowPulse: 0.15, framePulse: 0, rainbowTint: false, countMs: 1500 };

  // No dark overlay — celebration appears directly on bright game view
  const winDimEl = null;

  try {

  const c = new PIXI.Container();
  c.interactive = true;
  c.hitArea = new PIXI.Rectangle(0, 0, BASE_W, BASE_H);
  app.stage.addChild(c);
  const _celebGfx = [];


  // ── Ornate candy plaque/banner ──
  const FRAME_W = 720, FRAME_H = 320;
  const frameContainer = new PIXI.Container();
  frameContainer.x = BASE_W / 2;
  frameContainer.y = BASE_H / 2;
  frameContainer.scale.set(0.3);
  frameContainer.alpha = 0;
  c.addChild(frameContainer);



  // Main plaque body — deep pink-to-magenta gradient (simulated with layers)
  const plaqueBase = getGfx(); _celebGfx.push(plaqueBase);
  plaqueBase.beginFill(0x6b1040, 0.95);
  plaqueBase.drawRoundedRect(-FRAME_W/2, -FRAME_H/2, FRAME_W, FRAME_H, 18);
  plaqueBase.endFill();
  frameContainer.addChild(plaqueBase);

  // Gradient overlay — lighter at top, darker at bottom (glazed chocolate bar feel)
  const gradTop = getGfx(); _celebGfx.push(gradTop);
  gradTop.beginFill(0xcc3377, 0.5);
  gradTop.drawRoundedRect(-FRAME_W/2 + 4, -FRAME_H/2 + 4, FRAME_W - 8, FRAME_H * 0.45, 14);
  gradTop.endFill();
  frameContainer.addChild(gradTop);

  const gradBot = getGfx(); _celebGfx.push(gradBot);
  gradBot.beginFill(0x3a0520, 0.4);
  gradBot.drawRoundedRect(-FRAME_W/2 + 4, FRAME_H * 0.05, FRAME_W - 8, FRAME_H * 0.45, 14);
  gradBot.endFill();
  frameContainer.addChild(gradBot);

  // Glossy highlight strip across top (like a glazed surface)
  const glossy = getGfx(); _celebGfx.push(glossy);
  glossy.beginFill(0xffffff, 0.12);
  glossy.drawRoundedRect(-FRAME_W/2 + 20, -FRAME_H/2 + 8, FRAME_W - 40, FRAME_H * 0.18, 10);
  glossy.endFill();
  frameContainer.addChild(glossy);


  // Inner center radiance
  const innerGlow = getGfx(); _celebGfx.push(innerGlow);
  innerGlow.beginFill(0xff69b4, 0.06);
  innerGlow.drawEllipse(0, 10, FRAME_W * 0.35, FRAME_H * 0.3);
  innerGlow.endFill();
  innerGlow.blendMode = PIXI.BLEND_MODES.ADD;
  frameContainer.addChild(innerGlow);

  // Corner candy gems (faceted look)
  const corners = [[-1,-1],[1,-1],[-1,1],[1,1]];
  const gemColors = [0xff6b9d, 0x4ecdc4, 0xffe66d, 0xa78bfa];
  corners.forEach(([cx, cy], idx) => {
    const gem = getGfx(); _celebGfx.push(gem);
    const gx = cx * (FRAME_W/2 - 2), gy = cy * (FRAME_H/2 - 2);
    // Gem body
    gem.beginFill(gemColors[idx], 0.9);
    gem.drawCircle(gx, gy, 10);
    gem.endFill();
    // Gem border
    gem.lineStyle(1.5, 0xffffff, 0.5);
    gem.drawCircle(gx, gy, 10);
    gem.lineStyle(0);
    // Gem highlight
    gem.beginFill(0xffffff, 0.5);
    gem.drawCircle(gx - 3, gy - 3, 3.5);
    gem.endFill();
    frameContainer.addChild(gem);
  });


  // Top candy ornament (lollipop swirl)
  const lollipop = getGfx(); _celebGfx.push(lollipop);
  // Stick
  lollipop.beginFill(0xffeedd, 0.8);
  lollipop.drawRect(-2, -FRAME_H/2 - 28, 4, 22);
  lollipop.endFill();
  // Candy circle
  lollipop.beginFill(0xff6b9d, 0.9);
  lollipop.drawCircle(0, -FRAME_H/2 - 38, 14);
  lollipop.endFill();
  // Swirl lines
  lollipop.lineStyle(2, 0xffffff, 0.4);
  lollipop.arc(0, -FRAME_H/2 - 38, 6, 0, Math.PI * 1.2);
  lollipop.lineStyle(1.5, 0xff3366, 0.5);
  lollipop.arc(0, -FRAME_H/2 - 38, 10, Math.PI * 0.5, Math.PI * 1.8);
  lollipop.lineStyle(0);
  // Highlight
  lollipop.beginFill(0xffffff, 0.35);
  lollipop.drawCircle(-4, -FRAME_H/2 - 42, 4);
  lollipop.endFill();
  frameContainer.addChild(lollipop);

  // ── Tier label (upper third of frame) ──
  const firstTier = WIN_TIERS[0];
  const tierGlow = new PIXI.Text(firstTier.label, {
    fontFamily: _FONT, fontSize: firstTier.fontSize, fontWeight: 'bold',
    fill: firstTier.glow,
    stroke: firstTier.glow, strokeThickness: 18,
    letterSpacing: 8,
  });
  tierGlow.anchor.set(0.5);
  tierGlow.x = 0;
  tierGlow.y = -FRAME_H * 0.22;
  tierGlow.alpha = 0;
  tierGlow.blendMode = PIXI.BLEND_MODES.ADD;
  frameContainer.addChild(tierGlow);

  const tierLabel = new PIXI.Text(firstTier.label, {
    fontFamily: _FONT, fontSize: firstTier.fontSize, fontWeight: 'bold',
    fill: [0xffe57f, 0xff9500],
    fillGradientType: PIXI.TEXT_GRADIENT.LINEAR_VERTICAL,
    fillGradientStops: [0, 1],
    stroke: 0x5a2e00, strokeThickness: 6,
    dropShadow: true, dropShadowColor: 0x3a1d00, dropShadowBlur: 6, dropShadowDistance: 4, dropShadowAlpha: 0.8,
    letterSpacing: 6,
  });
  tierLabel.anchor.set(0.5);
  tierLabel.x = 0;
  tierLabel.y = -FRAME_H * 0.22;
  tierLabel.scale.set(0);
  frameContainer.addChild(tierLabel);

  // ── Win counter (lower third of frame) ──
  const counterText = new PIXI.Text(formatMoney(0), {
    fontFamily: _FONT, fontSize: firstTier.amountSize, fontWeight: 'bold',
    fill: [0xffffff, 0xffd700],
    fillGradientType: PIXI.TEXT_GRADIENT.LINEAR_VERTICAL,
    fillGradientStops: [0, 1],
    stroke: 0x5a2e00, strokeThickness: 7,
    dropShadow: true, dropShadowColor: 0x3a1d00, dropShadowBlur: 8, dropShadowDistance: 5, dropShadowAlpha: 0.9,
    letterSpacing: 4,
  });
  counterText.anchor.set(0.5);
  counterText.x = 0;
  counterText.y = FRAME_H * 0.18;
  counterText.alpha = 0;
  frameContainer.addChild(counterText);

  // ── Amount flash glow (pre-rendered, used on count-up finish) ──
  const amountFlash = new PIXI.Sprite(PIXI.Texture.from('assets/glow_soft.png'));
  amountFlash.anchor.set(0.5);
  amountFlash.x = 0;
  amountFlash.y = FRAME_H * 0.18;
  amountFlash.scale.set(1.2);
  amountFlash.alpha = 0;
  amountFlash.blendMode = PIXI.BLEND_MODES.ADD;
  amountFlash.tint = 0xffd700;
  frameContainer.addChild(amountFlash);

  // ── "TAP ANYWHERE TO CONTINUE" ──
  const tapText = new PIXI.Text('TAP ANYWHERE TO CONTINUE', {
    fontFamily: "'Fredoka', Arial, sans-serif", fontSize: 16, fill: 0xd4a574, letterSpacing: 3, fontWeight: 'bold',
  });
  tapText.anchor.set(0.5);
  tapText.x = 0;
  tapText.y = FRAME_H * 0.42 + 20;
  tapText.alpha = 0;
  frameContainer.addChild(tapText);

  // ── Sprinkles shower (tiny candy-colored rectangles tumbling down) ──
  const sprinkles = [];
  const sprinkleColors = [0xff6b9d, 0x7dd3fc, 0xffe66d, 0x6ee7b7, 0xffffff, 0xa78bfa, 0xff8a65];
  const SPRINKLE_COUNT = _isMobile ? Math.floor(tierConfig.sprinkles * 0.5) : tierConfig.sprinkles;
  for (let i = 0; i < SPRINKLE_COUNT; i++) {
    const sp = getGfx(); _celebGfx.push(sp);
    const w = 2 + Math.random() * 3, h = 6 + Math.random() * 5;
    sp.beginFill(sprinkleColors[Math.floor(Math.random() * sprinkleColors.length)], 0.85);
    sp.drawRoundedRect(-w/2, -h/2, w, h, 1);
    sp.endFill();
    // Spread across screen edges, avoiding center frame area
    const side = Math.random();
    if (side < 0.3) sp.x = Math.random() * BASE_W * 0.25;
    else if (side < 0.6) sp.x = BASE_W * 0.75 + Math.random() * BASE_W * 0.25;
    else sp.x = Math.random() * BASE_W;
    sp.y = -10 - Math.random() * 400;
    sp._vy = 0.8 + Math.random() * 1.2;
    sp._vx = (Math.random() - 0.5) * 0.8;
    sp._rotSpeed = (Math.random() - 0.5) * 0.08;
    sp._delay = Math.random() * 60;
    sp._age = 0;
    sp.rotation = Math.random() * Math.PI;
    sp.alpha = 0;
    sprinkles.push(sp);
    c.addChild(sp);
  }

  // ── Sugar sparkles (twinkling star/diamond particles, white + gold) ──
  const sparkles = [];
  const SPARKLE_COUNT = _isMobile ? Math.floor(tierConfig.sparkles * 0.6) : tierConfig.sparkles;
  for (let i = 0; i < SPARKLE_COUNT; i++) {
    const sp = getGfx(); _celebGfx.push(sp);
    const sz = 1.5 + Math.random() * 2.5;
    const isGold = Math.random() > 0.6;
    sp.beginFill(isGold ? 0xffd700 : 0xffffff, 0.9);
    if (sp.drawStar) sp.drawStar(0, 0, 4, sz, sz * 0.35);
    else sp.drawCircle(0, 0, sz);
    sp.endFill();
    sp.blendMode = PIXI.BLEND_MODES.ADD;
    sp.x = Math.random() * BASE_W;
    sp.y = Math.random() * BASE_H;
    sp._phase = Math.random() * Math.PI * 2;
    sp._twinkleSpeed = 0.04 + Math.random() * 0.06;
    sp._lifeOffset = Math.random() * 100;
    sp.alpha = 0;
    sparkles.push(sp);
    c.addChild(sp);
  }

  // ── Candy pop bursts (gumball circles that explode outward from center) ──
  const candyPops = [];
  const burstColors = [0xff6b9d, 0x4ecdc4, 0xffe66d, 0xa78bfa, 0xff8a65, 0x7dd3fc, 0xf472b6];
  const BURST_COUNT = tierConfig.bursts;
  for (let b = 0; b < BURST_COUNT; b++) {
    // Each burst: 8-12 small circles
    const burstSize = 8 + Math.floor(Math.random() * 5);
    // Burst origin: center for first, sides for additional
    let originX = BASE_W / 2, originY = BASE_H / 2;
    if (b === 1) { originX = BASE_W * 0.15; originY = BASE_H * 0.4; }
    if (b === 2) { originX = BASE_W * 0.85; originY = BASE_H * 0.4; }
    for (let i = 0; i < burstSize; i++) {
      const pop = getGfx(); _celebGfx.push(pop);
      const r = 3 + Math.random() * 5;
      const color = burstColors[Math.floor(Math.random() * burstColors.length)];
      pop.beginFill(color, 0.9);
      pop.drawCircle(0, 0, r);
      pop.endFill();
      // Small highlight
      pop.beginFill(0xffffff, 0.3);
      pop.drawCircle(-r * 0.25, -r * 0.25, r * 0.3);
      pop.endFill();
      pop.x = originX;
      pop.y = originY;
      const angle = (i / burstSize) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
      const speed = 3 + Math.random() * 5;
      pop._vx = Math.cos(angle) * speed;
      pop._vy = Math.sin(angle) * speed - 2;
      pop._gravity = 0.12 + Math.random() * 0.06;
      pop._delay = b * 15 + Math.random() * 5;
      pop._age = 0;
      pop._life = 60 + Math.random() * 40;
      pop.alpha = 0;
      candyPops.push(pop);
      c.addChild(pop);
    }
  }


  // ── State ──
  let ticks = 0, currentCount = 0, currentTierIdx = 0;
  let skipped = false, closing = false, closeTicks = 0;
  let holdTicks = 0, holding = false, countFinished = false;
  let shakeIntensity = 0;
  const countDuration = turboMode ? Math.ceil(tierConfig.countMs / 33) : Math.ceil(tierConfig.countMs / 16.67);
  const _introLen = turboMode ? 18 : 40;
  const _holdLen = turboMode ? 40 : 80;
  const _closeLen = turboMode ? 12 : 20;
  const _countStart = turboMode ? 10 : 22;
  const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

  // Auto-dismiss timer for auto-spin
  let autoDismissTimer = null;
  if (autoSpins !== 0) {
    autoDismissTimer = setTimeout(() => { if (!closing) startClose(); }, turboMode ? 1500 : 3000);
  }

  // Play tier sound on entrance
  playSound(finalTier.sound);
  playSound('coin_count');

  function updateTierVisuals(idx) {
    const t = WIN_TIERS[idx];
    tierLabel.text = t.label;
    tierLabel.style.fontSize = t.fontSize;
    tierLabel.style.fill = [0xffe57f, 0xff9500];
    tierLabel.style.stroke = 0x5a2e00;
    tierGlow.text = t.label;
    tierGlow.style.fontSize = t.fontSize;
    tierGlow.style.fill = t.glow;
    tierGlow.style.stroke = t.glow;
    counterText.style.fontSize = t.amountSize;
    if (idx > 0) playSound(t.sound);
  }
  function triggerShake(v) { shakeIntensity = v; }

  const tickFn = (dt) => {
    ticks += dt;

    // ── Intro: dramatic entrance ──
    if (ticks <= _introLen) {
      // Frame scales up with elastic bounce: 0.3 → 1.05 → 1.0
      const frameStart = _introLen * 0.1;
      if (ticks > frameStart) {
        const fp = Math.min((ticks - frameStart) / (_introLen * 0.55), 1);
        let elastic;
        if (fp < 0.6) elastic = (fp / 0.6) * 1.05;
        else if (fp < 0.8) elastic = 1.05 - ((fp - 0.6) / 0.2) * 0.08;
        else elastic = 0.97 + ((fp - 0.8) / 0.2) * 0.03;
        frameContainer.scale.set(elastic);
        frameContainer.alpha = Math.min(fp * 2.5, 1);
      }

      // Tier label drops from above with bounce
      const labelStart = _introLen * 0.25;
      if (ticks > labelStart) {
        const lp = Math.min((ticks - labelStart) / (_introLen * 0.45), 1);
        // Bounce ease
        let bounce;
        if (lp < 0.5) bounce = (lp / 0.5);
        else if (lp < 0.7) bounce = 1 + (1 - ((lp - 0.5) / 0.2)) * 0.15;
        else if (lp < 0.85) bounce = 1.15 - ((lp - 0.7) / 0.15) * 0.15;
        else bounce = 1.0;
        tierLabel.scale.set(bounce);
        tierGlow.scale.set(bounce);
        // Drop from above: y offset
        const dropOffset = (1 - Math.min(lp * 1.5, 1)) * -80;
        tierLabel.y = -FRAME_H * 0.22 + dropOffset;
        tierGlow.y = -FRAME_H * 0.22 + dropOffset;
        tierGlow.alpha = Math.min(lp * 0.6, 0.4);
      }

      // Counter + tap fade in
      const counterFade = Math.max(0, Math.min((ticks - _introLen * 0.5) / (_introLen * 0.3), 1));
      counterText.alpha = counterFade;
      tapText.alpha = Math.max(0, Math.min((ticks - _introLen * 0.75) / (_introLen * 0.25), 0.6));

      // Entry shake
      if (ticks > _introLen * 0.2 && ticks < _introLen * 0.4 && tierConfig.shake > 0) {
        shakeIntensity = tierConfig.shake;
      }
    } else {
      frameContainer.scale.set(1);
      frameContainer.alpha = 1;
      counterText.alpha = 1;
      tapText.alpha = 0.6;
    }

    // ── Count up with ease-out cubic ──
    if (!skipped && !holding && ticks > _countStart) {
      const countProgress = Math.min((ticks - _countStart) / countDuration, 1);
      currentCount = easeOutCubic(countProgress) * winAmount;
      counterText.text = formatMoney(currentCount);

      // Subtle scale pulse during counting
      const countPulse = 1 + Math.sin(ticks * 0.25) * 0.015;
      counterText.scale.set(countPulse);

      // Check tier escalation
      const mult = currentCount / bet;
      let newTierIdx = 0;
      for (let i = 0; i < WIN_TIERS.length; i++) {
        if (mult >= WIN_TIERS[i].min) newTierIdx = i;
      }
      if (newTierIdx > currentTierIdx) {
        currentTierIdx = newTierIdx;
        updateTierVisuals(newTierIdx);
        triggerShake(WIN_TIERS[newTierIdx].shake);
        tierLabel.scale.set(1.35);
        tierGlow.scale.set(1.35);
      }

      // Count finished → amount punch + hold
      if (countProgress >= 1 && !countFinished) {
        countFinished = true;
        holding = true;
        holdTicks = 0;
        // Amount punch: scale 1.0 → 1.2 → 1.0 elastic
        counterText.scale.set(1.25);
        // Brief bright flash behind amount
        amountFlash.alpha = 0.6;
        triggerShake(tierConfig.shake * 0.4);
        playSound('multiplier_hit');
      }
    }

    // ── Hold phase ──
    if (holding && !closing) {
      holdTicks += dt;
      // Settle counter scale back with elastic
      const settle = Math.min(holdTicks / 18, 1);
      const settleEase = settle < 0.5
        ? 1.25 - settle * 0.6
        : 0.95 + (1 - settle) * 0.1;
      counterText.scale.set(settleEase);
      if (holdTicks >= _holdLen) startClose();
    }

    // ── Amount flash fade ──
    if (amountFlash.alpha > 0) {
      amountFlash.alpha *= 0.92;
      if (amountFlash.alpha < 0.01) amountFlash.alpha = 0;
    }

    // ── Label idle pulse ──
    if (ticks > _introLen && !closing) {
      const pulse = 1 + Math.sin(ticks * 0.05) * 0.025;
      if (!holding || holdTicks > 8) {
        tierLabel.scale.set(pulse);
        tierGlow.scale.set(pulse);
        tierLabel.y = -FRAME_H * 0.22;
        tierGlow.y = -FRAME_H * 0.22;
      }
      tierGlow.alpha = 0.2 + Math.sin(ticks * 0.08) * 0.15;
    }

    // ── SENSATIONAL rainbow tint cycling ──
    if (tierConfig.rainbowTint && !closing) {
      const hueShift = (ticks * 0.015) % 1;
      const r = Math.floor((Math.sin(hueShift * Math.PI * 2) * 0.5 + 0.5) * 255);
      const g = Math.floor((Math.sin(hueShift * Math.PI * 2 + 2.094) * 0.3 + 0.5) * 255);
      const b = Math.floor((Math.sin(hueShift * Math.PI * 2 + 4.189) * 0.3 + 0.5) * 255);
      // Frame scale pulse for SENSATIONAL
      if (tierConfig.framePulse > 0 && ticks > _introLen) {
        const framePulse = 1 + Math.sin(ticks * 0.052) * tierConfig.framePulse;
        if (!holding) frameContainer.scale.set(framePulse);
      }
    }

    // ── Sprinkles shower ──
    sprinkles.forEach(sp => {
      sp._age += dt;
      if (sp._age < sp._delay) return;
      sp.alpha = 0.85;
      sp.y += sp._vy * dt;
      sp.x += sp._vx * dt;
      sp.rotation += sp._rotSpeed * dt;
      if (sp.y > BASE_H + 20) { sp.y = -15; sp.x = Math.random() * BASE_W; }
      if (closing) sp.alpha *= Math.max(0, 1 - closeTicks / _closeLen);
    });

    // ── Sugar sparkles (twinkle in/out) ──
    sparkles.forEach(sp => {
      if (ticks < _introLen * 0.4) { sp.alpha = 0; return; }
      sp._phase += sp._twinkleSpeed * dt;
      // Twinkle: fade in and out with random offset for staggered timing
      const twinkle = Math.sin(sp._phase + sp._lifeOffset) * 0.5 + 0.5;
      sp.alpha = twinkle * 0.7;
      // Slight upward drift
      sp.y -= 0.15 * dt;
      if (sp.y < -10) { sp.y = BASE_H + 10; sp.x = Math.random() * BASE_W; }
      if (closing) sp.alpha *= Math.max(0, 1 - closeTicks / _closeLen);
    });

    // ── Candy pop bursts ──
    candyPops.forEach(pop => {
      pop._age += dt;
      if (pop._age < pop._delay) return;
      const life = pop._age - pop._delay;
      if (life > pop._life) { pop.alpha = 0; return; }
      pop.alpha = Math.max(0, 1 - life / pop._life);
      pop._vy += pop._gravity * dt;
      pop.x += pop._vx * dt;
      pop.y += pop._vy * dt;
      pop._vx *= 0.98;
      pop.scale.set(Math.max(0.3, 1 - life / pop._life * 0.5));
      if (closing) pop.alpha *= Math.max(0, 1 - closeTicks / _closeLen);
    });

    // ── Tap text breathing pulse ──
    if (ticks > _introLen && !closing) {
      tapText.alpha = 0.5 + Math.sin(ticks * 0.06) * 0.3;
    }

    // ── Screen shake ──
    if (shakeIntensity > 0) {
      c.x = (Math.random() - 0.5) * shakeIntensity;
      c.y = (Math.random() - 0.5) * shakeIntensity;
      shakeIntensity *= 0.88;
      if (shakeIntensity < 0.4) { shakeIntensity = 0; c.x = 0; c.y = 0; }
    }


    // ── Close: fade out + scale down ──
    if (closing) {
      closeTicks += dt;
      const p = Math.min(closeTicks / _closeLen, 1);
      const fadeEase = easeOutCubic(p);
      c.alpha = 1 - fadeEase;
      frameContainer.scale.set(1 - fadeEase * 0.1);
      if (winDimEl) winDimEl.style.opacity = String(1 - fadeEase);
      if (p >= 1) { cleanup(); onComplete(); }
    }
  };

  function startClose() {
    if (closing) return;
    closing = true; closeTicks = 0;
    stopSound('coin_count');
    counterText.text = formatMoney(winAmount);
    const fi = WIN_TIERS.indexOf(finalTier);
    if (fi !== currentTierIdx) updateTierVisuals(fi);
  }

  function skipToEnd() {
    if (closing) return;
    skipped = true;
    holding = false;
    counterText.text = formatMoney(winAmount);
    counterText.scale.set(1);
    const fi = WIN_TIERS.indexOf(finalTier);
    if (fi > currentTierIdx) { currentTierIdx = fi; updateTierVisuals(fi); }
    tierLabel.scale.set(1); tierGlow.scale.set(1);
    tierLabel.y = -FRAME_H * 0.22; tierGlow.y = -FRAME_H * 0.22;
    setTimeout(() => startClose(), 150);
  }

  function cleanup() {
    stopSound('coin_count');
    if (autoDismissTimer) clearTimeout(autoDismissTimer);
    app.ticker.remove(tickFn);
    for (const g of _celebGfx) releaseGfx(g);
    _celebGfx.length = 0;
    if (c.parent) app.stage.removeChild(c);
    c.destroy({ children: true, texture: false, baseTexture: false });
    if (winDimEl && winDimEl.parentNode) winDimEl.remove();
    app.view.style.zIndex = '2';
    _winCelebrationActive = false;
    paylineLayer.visible = true;
  }

  c.on('pointerdown', skipToEnd);
  app.ticker.add(tickFn);

  } catch (err) {
    console.error('[SUGAR STACK] Win celebration error:', err);
    _winCelebrationActive = false;
    paylineLayer.visible = true;
    if (winDimEl && winDimEl.parentNode) winDimEl.remove();
    app.view.style.zIndex = '2';
    onComplete();
  }
}

// Quick per-spin win flash during Free Spins (no full celebration)
function showFSWinFlash(winAmount, onComplete) {
  spinning = true;  // Block input during flash
  playSound('coin_count');
  let _skipped = false;

  const label = new PIXI.Text(formatMoney(winAmount), {
    fontFamily: "'Cherry Bomb One', 'Fredoka', sans-serif", fontSize: 52, fontWeight: 'bold',
    fill: [0xffffff, 0xffd700],
    fillGradientStops: [0, 1],
    stroke: 0x1a0a00, strokeThickness: 6,
    dropShadow: true, dropShadowColor: 0x000000, dropShadowBlur: 12, dropShadowDistance: 3,
  });
  label.anchor.set(0.5);
  label.x = BASE_W / 2;
  label.y = BASE_H / 2;
  label.scale.set(0.3);
  label.alpha = 0;
  app.stage.addChild(label);

  // Skip overlay — click/tap anywhere to skip FS win flash
  const skipHit = getGfx();
  skipHit.beginFill(0x000000, 0.001);
  skipHit.drawRect(0, 0, BASE_W, BASE_H);
  skipHit.endFill();
  skipHit.interactive = true;
  skipHit.cursor = 'pointer';
  app.stage.addChild(skipHit);

  function cleanup() {
    app.ticker.remove(fn);
    if (label.parent) app.stage.removeChild(label);
    label.destroy({ children: true, texture: false, baseTexture: false });
    releaseGfx(skipHit);
    stopSound('coin_count');
    spinning = false;
  }

  skipHit.on('pointerdown', () => {
    if (_skipped) return;
    _skipped = true;
    cleanup();
    onComplete();
  });

  let ticks = 0;
  const totalTicks = turboMode ? 20 : 70; // turbo: ~0.3s, normal: ~1.2s
  const fn = (dt) => {
    if (_skipped) return;
    ticks += dt;
    const p = ticks / totalTicks;
    if (p < 0.15) {
      // Scale in
      const t = p / 0.15;
      label.scale.set(0.3 + 0.7 * t);
      label.alpha = t;
    } else if (p < 0.7) {
      // Hold
      label.scale.set(1);
      label.alpha = 1;
    } else {
      // Fade out + float up
      const t = (p - 0.7) / 0.3;
      label.alpha = 1 - t;
      label.y = BASE_H / 2 - 30 * t;
    }
    if (ticks >= totalTicks) {
      if (_skipped) return;
      _skipped = true;
      cleanup();
      onComplete();
    }
  };
  app.ticker.add(fn);
}

// ── Payline Visualization ──
let _paylineCycleTimer = null;
let _paylinePulseTimer = null;
let _skipWinLines = null; // global skip function — set during payline cycling
function clearWinLines() {
  if (_paylineCycleTimer) { clearInterval(_paylineCycleTimer); _paylineCycleTimer = null; }
  if (_paylinePulseTimer) { app.ticker.remove(_paylinePulseTimer); _paylinePulseTimer = null; }
  // Release pooled Graphics back to pool, destroy Text objects
  while (paylineLayer.children.length > 0) {
    const child = paylineLayer.children[0];
    if (child instanceof PIXI.Graphics) {
      releaseGfx(child);
    } else {
      paylineLayer.removeChild(child);
      if (!child.destroyed) child.destroy({ children: true, texture: false, baseTexture: false });
    }
  }
}
function showWinLines(totalWin, onComplete) {
  clearWinLines();
  if (lastWinLines.length === 0) { if (onComplete) onComplete(); return; }

  let _finished = false;
  function finishAll() {
    if (_finished) return;
    _finished = true;
    _skipWinLines = null;
    clearWinLines();
    if (onComplete) onComplete();
  }
  _skipWinLines = finishAll;

  // Collect all winning symbol positions (deduplicated)
  const winPositions = new Set();
  for (const w of lastWinLines) {
    for (let c = 0; c < w.count; c++) {
      winPositions.add(c + ',' + w.line[c]);
    }
  }

  // Dim overlay with cutouts for winning symbols
  const dim = getGfx();
  dim.beginFill(0x000000, 0.4);
  dim.drawRect(GRID_X, GRID_Y, REELS * CELL - SYM_GAP, ROWS * CELL - SYM_GAP);
  dim.endFill();
  winPositions.forEach(key => {
    const [c, r] = key.split(',').map(Number);
    const sx = GRID_X + c * CELL, sy = GRID_Y + r * CELL;
    dim.beginHole(); dim.drawRoundedRect(sx - 2, sy - 2, SYM_SIZE + 4, SYM_SIZE + 4, 8); dim.endHole();
  });
  paylineLayer.addChild(dim);

  // Subtle gold glow frames on winning symbols (no payline lines)
  winPositions.forEach(key => {
    const [c, r] = key.split(',').map(Number);
    const sx = GRID_X + c * CELL, sy = GRID_Y + r * CELL;
    const frame = getGfx();
    frame.lineStyle(3, 0xffd700, 0.7);
    frame.drawRoundedRect(sx - 4, sy - 4, SYM_SIZE + 8, SYM_SIZE + 8, 10);
    frame.lineStyle(6, 0xffd700, 0.15);
    frame.drawRoundedRect(sx - 7, sy - 7, SYM_SIZE + 14, SYM_SIZE + 14, 12);
    paylineLayer.addChild(frame);
  });

  // Scale pulse on winning sprites
  const pulsedSprites = [];
  winPositions.forEach(key => {
    const [c, r] = key.split(',').map(Number);
    const sp = reelSprites[c] ? reelSprites[c][r + 1] : null;
    if (sp) pulsedSprites.push({ sp, origScale: sp.scale.x });
  });

  let pulseT = 0;
  const pulseFn = (dt) => {
    pulseT += dt * 0.05;
    const s = 1 + Math.sin(pulseT * 2) * 0.06;
    for (const { sp, origScale } of pulsedSprites) {
      sp.scale.set(origScale * s);
    }
  };
  app.ticker.add(pulseFn);
  _paylinePulseTimer = pulseFn;

  // Candy-styled count-up text in center of grid
  const winText = new PIXI.Text(formatMoney(0), {
    fontFamily: "'Cherry Bomb One', 'Fredoka', sans-serif",
    fontSize: 56,
    fontWeight: 'bold',
    fill: [0xffe57f, 0xff9500],
    fillGradientStops: [0, 1],
    stroke: 0x5a2e00,
    strokeThickness: 5,
    dropShadow: true,
    dropShadowColor: 0x3a1d00,
    dropShadowBlur: 4,
    dropShadowDistance: 3,
    dropShadowAlpha: 0.8,
  });
  winText.anchor.set(0.5);
  winText.x = GRID_X + GRID_W / 2;
  winText.y = GRID_Y + GRID_H / 2;
  winText.scale.set(0.3);
  winText.alpha = 0;
  paylineLayer.addChild(winText);

  // Count-up animation
  const countDuration = turboMode ? 400 : 800;
  const holdDuration = turboMode ? 200 : 500;
  const fadeDuration = turboMode ? 150 : 300;
  const startTime = performance.now();
  playSound('coin_count');

  const countUpFn = () => {
    if (_finished) { app.ticker.remove(countUpFn); return; }
    const elapsed = performance.now() - startTime;

    if (elapsed < countDuration) {
      // Count-up phase — ease-out cubic
      const t = Math.min(elapsed / countDuration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      const current = totalWin * eased;
      winText.text = formatMoney(current);
      winText.alpha = 1;
      // Scale bounce: pop in during first 20%, then settle
      if (t < 0.15) {
        winText.scale.set(0.3 + 0.85 * (t / 0.15));
      } else {
        winText.scale.set(1.15 - 0.15 * Math.min((t - 0.15) / 0.2, 1));
      }
      // Bottom bar count-up in sync
      if (txtWin) { txtWin.text = formatMoney(current); txtWin.style.fill = 0xffd700; }
    } else if (elapsed < countDuration + holdDuration) {
      // Hold phase — final value displayed
      winText.text = formatMoney(totalWin);
      winText.scale.set(1);
      winText.alpha = 1;
      if (txtWin) { txtWin.text = formatMoney(totalWin); txtWin.style.fill = 0xffd700; }
    } else if (elapsed < countDuration + holdDuration + fadeDuration) {
      // Fade out + float up
      const fp = (elapsed - countDuration - holdDuration) / fadeDuration;
      winText.alpha = 1 - fp;
      winText.y = GRID_Y + GRID_H / 2 - 30 * fp;
    } else {
      // Done — reset sprites and finish
      app.ticker.remove(countUpFn);
      for (const { sp, origScale } of pulsedSprites) sp.scale.set(origScale);
      finishAll();
    }
  };
  app.ticker.add(countUpFn);

  // Skip overlay — tap anywhere to skip
  const skipOverlay = new PIXI.Graphics();
  skipOverlay.beginFill(0x000000, 0.001);
  skipOverlay.drawRect(GRID_X, GRID_Y, REELS * CELL, ROWS * CELL);
  skipOverlay.endFill();
  skipOverlay.interactive = true;
  skipOverlay.cursor = 'pointer';
  skipOverlay.on('pointerdown', () => {
    for (const { sp, origScale } of pulsedSprites) sp.scale.set(origScale);
    if (txtWin) { txtWin.text = formatMoney(totalWin); txtWin.style.fill = 0xffd700; }
    finishAll();
  });
  paylineLayer.addChild(skipOverlay);
}

async function afterWilds() {
  // All post-spin animations (wild expansion, scatter pop) are complete.
  // DON'T set spinning=false yet — wait until endRound completes.
  // Setting it early lets users click spin before the round is closed (400 errors).
  lastWinLines = []; // clear stale paylines from previous spin

  // RGS data was already synced in onAllStopped (await + replace + snap).
  // No duplicate replacement needed here.

  // After wild expansion, create a COPY of lastBoard with expanded wilds.
  // Wins are calculated against the post-expansion board (all rows wild on expanded reels).
  // CRITICAL: do NOT mutate lastBoard in place — it's a reference to spinData.board
  // in _simSpins, and mutating it corrupts future spins' board data.
  if (wildReels.length > 0) {
    // DEBUG: check spinData.board BEFORE copy
    const _origCounts = _simSpins[_simSpinIdx].board.map(col => col.filter(c => c === WILD).length);

    lastBoard = lastBoard.map((col, r) => {
      if (wildReels.some(wr => wr.reel === r)) {
        return col.map(() => WILD);
      }
      return [...col]; // shallow copy to prevent any other mutation leaks
    });

    // DEBUG: check spinData.board AFTER copy — should be unchanged
    const _afterCounts = _simSpins[_simSpinIdx].board.map(col => col.filter(c => c === WILD).length);
    if (_afterCounts.some((c, i) => c !== _origCounts[i])) {
      console.error('[afterWilds BUG] spinData.board was mutated despite copy!');
    }
    // Also check NEXT spin's board
    if (_simSpins[_simSpinIdx + 1]) {
      const _nextCounts = _simSpins[_simSpinIdx + 1].board.map(col => col.filter(c => c === WILD).length);
    }
  }

  // Get spin data (now correct for both RGS and demo/FS)
  const spinData = _simSpins[_simSpinIdx];

  // Win calculation — uses spinData from RGS in real mode, local book in demo/FS
  let spinWin = calculateWins(lastBoard);

  if (spinWin > 0) {
    roundWin = Math.round((roundWin + spinWin) * 100) / 100;
    const maxWin = Math.round(_simMaxPayout * bet * 100) / 100;
    if (maxWin > 0 && roundWin > maxWin) {
      spinWin = Math.round((spinWin - (roundWin - maxWin)) * 100) / 100;
      if (spinWin < 0) spinWin = 0;
      roundWin = maxWin;
    }
    if (!IS_REPLAY && spinWin > 0) balance = Math.round((balance + spinWin) * 100) / 100;
  }
  // Update sticky wilds from spin data — ONLY during free spins.
  // Base game wilds are one-shot (expand + pay, then clear on next spin).
  // Without this guard, base game book entries with stale stickyWilds events
  // leak wilds into the next spin, corrupting the entire board.
  if (inFS && spinData && spinData.stickyWilds) {
    wildReels = spinData.stickyWilds.map(w => ({ reel: w.reel, mult: w.mult }));
  }

  // Update balance/bet/FS in bottom bar (NOT win — paylines show individual wins first)
  if (txtBalance) txtBalance.text = formatMoney(balance);
  if (txtBet) txtBet.text = formatMoney(bet);
  if (txtFS) txtFS.text = inFS ? `FREE SPINS: ${fsLeft} LEFT` : '';
  if (typeof _syncPortraitBar === 'function') _syncPortraitBar();
  if (inFS) saveGameState();

  // Check scatter trigger from spin data (now uses RGS data in real mode!)
  const hasScatterTrigger = spinData && spinData.scatterTrigger;
  let scatterCount = hasScatterTrigger ? spinData.scatterTrigger.positions.length : 0;
  let fsTriggerCount = hasScatterTrigger ? spinData.scatterTrigger.totalFs : 0;

  // Fallback: if RGS says round is active but no scatterTrigger event, count scatters on board
  if (!IS_DEMO && !inFS && scatterCount < 3 && RGS._roundHasWin) {
    let boardScatters = 0;
    for (let r = 0; r < REELS; r++) {
      for (let row = 0; row < ROWS; row++) {
        if (lastBoard[r][row] === SCATTER) boardScatters++;
      }
    }
    if (boardScatters >= 3) {
      scatterCount = boardScatters;
      fsTriggerCount = 10; // default: 3 scatters = 10 FS
    }
  }

  const tier = (spinWin > 0 && !(inFS && fsLeft <= 0)) ? getWinTier(spinWin) : null;

  if (spinWin > 0) {
    const winMult = spinWin / bet;
    if (winMult >= 50) playSound('win_epic');
    else if (winMult >= 10) playSound('win_big');
    else if (winMult >= 3) playSound('win_medium');
    else playSound('win_small');
  }

  // Close base game round IMMEDIATELY before any celebration animation.
  // This prevents 400 "player has active bet" errors if user clicks spin
  // during a small win flash (which doesn't set _winCelebrationActive).
  // Skip for: FS trigger (round stays active for free spins), FS mode, demo.
  if (!IS_DEMO && !inFS && scatterCount < 3) {
    await RGS.endRound();
    if (txtBalance) txtBalance.text = formatMoney(balance);
    if (typeof _syncPortraitBar === 'function') _syncPortraitBar();
  }

  const continueAfterCelebration = async () => {
    // continueAfterCelebration
    if (!inFS && scatterCount >= 3) {
      autoSpins = 0; _updateAutoBtn();
      triggerFS(fsTriggerCount);
    } else if (inFS) {
      updateUI();
      // Check if there are more FS spins — pre-generated (Buy Bonus/RGS) vs on-the-fly (natural Demo trigger)
      const hasMoreSpins = _fsPreGenerated
        ? (_simSpinIdx + 1 < _simSpins.length)  // pre-gen: check array bounds
        : (fsLeft > 0);                          // on-the-fly: trust fsLeft counter
      const hitMaxWin = roundWin >= 15000 * bet;
      if (fsLeft <= 0 || hitMaxWin || !hasMoreSpins) {
        endFS();
      } else {
        const fsGen = _spinGen;
        setTimeout(() => { if (_spinGen === fsGen && !spinning) startSpin(); }, turboMode ? 100 : 1200);
      }
    } else {
      // Base game — round already closed above, just handle UI + auto-spins
      updateUI();
      clearGameState();
      // Replay mode: show outro after base game spin completes
      if (IS_REPLAY) {
        showReplayOutro(roundWin, () => {
          roundWin = 0; wildReels = []; resetOverlays();
          showReplayIntro(_replayData, () => startReplayPlayback());
        });
        return;
      }
      if (autoSpins !== 0) {
        if (autoSpins > 0) { autoSpins--; _updateAutoBtn(); }
        if (autoSpins === 0) {
          _updateAutoBtn();
        } else {
          const ag = _spinGen;
          setTimeout(() => { if (_spinGen === ag && !spinning) startSpin(); }, turboMode ? 80 : 600);
        }
      }
    }
  };

  // Show paylines first (individual wins in bottom bar), then total + celebration
  showWinLines(spinWin, () => {
    spinning = false;
    updateUI(); // Now shows total win in bottom bar

    if (tier) {
      // BIG/MEGA/EPIC/SENSATIONAL — fires in both base game and FS
      showWinCelebration(spinWin, continueAfterCelebration);
    } else if (inFS && spinWin > 0) {
      showFSWinFlash(spinWin, continueAfterCelebration);
    } else if (spinWin > 0 && !inFS) {
      showSmallWinFlash(spinWin, continueAfterCelebration);
    } else {
      continueAfterCelebration();
    }
  });
}

// Brief win amount flash for small base game wins (below big-win tier)
