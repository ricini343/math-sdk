<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SHOGUN</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { background:#000; }
body {
  background: transparent;
  overflow: hidden;
  width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
/* Video covers the full browser window — sits behind canvas via DOM order */
#bgVid {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  object-fit: cover;
  filter: brightness(0.6);  /* dim uniformly across full window — no visible canvas box */
}
/* Canvas comes after video in DOM so it stacks on top */
canvas { display: block; position: relative; background: transparent; z-index: 2; touch-action: manipulation; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
/* Portrait control bar — premium Shogun theme */
#portrait-bar {
  display:none; position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:linear-gradient(to bottom, transparent 0%, rgba(8,2,14,0.80) 10%, rgba(8,2,14,0.97) 22%);
  padding:6px 6px 0; padding-bottom:max(6px, env(safe-area-inset-bottom));
  touch-action:manipulation; -webkit-user-select:none; user-select:none;
}
/* Main controls row — buy, spin, +/- */
#portrait-bar .p-main { display:flex; justify-content:center; align-items:center; gap:6px; margin-bottom:4px; }
/* Spin button — uses game dragon medallion asset */
#portrait-bar .p-spin {
  width:72px; height:72px; border:none; padding:0; background:none;
  cursor:pointer; -webkit-tap-highlight-color:transparent; flex-shrink:0;
}
#portrait-bar .p-spin img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 0 10px rgba(212,160,23,0.6)); transition:transform 0.1s; }
#portrait-bar .p-spin:active img { transform:scale(0.92); }
/* Buy bonus — uses game ornate button asset */
#portrait-bar .p-buy-wrap {
  height:52px; border:none; padding:0; background:none;
  cursor:pointer; -webkit-tap-highlight-color:transparent; position:relative;
}
#portrait-bar .p-buy-wrap img { height:100%; width:auto; object-fit:contain; filter:drop-shadow(0 0 6px rgba(212,160,23,0.4)); }
#portrait-bar .p-buy-wrap span {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font:bold 10px/1 Georgia,serif; letter-spacing:2px; color:#ffd700;
  text-shadow:0 1px 3px rgba(0,0,0,0.9), 0 0 8px rgba(255,200,0,0.3);
  white-space:nowrap; pointer-events:none;
}
#portrait-bar .p-buy-wrap:active img { filter:brightness(1.3) drop-shadow(0 0 8px rgba(255,215,0,0.6)); }
/* +/- bet buttons — dark metallic circles */
#portrait-bar .p-bet-btn {
  width:38px; height:38px; border-radius:50%; border:none;
  background:radial-gradient(circle at 40% 35%, #1a0d2e, #080018);
  box-shadow:0 0 0 1.5px rgba(212,160,23,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
  color:#c49a50; font-size:20px; font-weight:bold; font-family:Georgia,serif;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; -webkit-tap-highlight-color:transparent;
}
#portrait-bar .p-bet-btn:active { background:radial-gradient(circle at 40% 35%, #2a1500, #0a0018); box-shadow:0 0 0 1.5px #d4a017; color:#ffd700; }
/* Values row */
#portrait-bar .p-vals { display:flex; justify-content:space-around; padding:2px 8px; }
#portrait-bar .p-stat { text-align:center; }
#portrait-bar .p-lbl { font:bold 8px/1 Arial,sans-serif; color:#8a7040; letter-spacing:2px; margin-bottom:1px; }
#portrait-bar .p-val { font:bold 13px/1 Georgia,serif; color:#d4c8a0; }
#portrait-bar .p-val.win { color:#ffd700; font-size:14px; }
/* Utility icons — inline in main row */
#portrait-bar .p-util {
  width:34px; height:34px; border-radius:50%; border:none;
  background:radial-gradient(circle at 40% 35%, #1a0d2e, #080018);
  box-shadow:0 0 0 1px rgba(212,160,23,0.3);
  color:rgba(212,160,23,0.55); font-size:14px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; -webkit-tap-highlight-color:transparent; flex-shrink:0;
}
#portrait-bar .p-util:active { color:#ffd700; background:rgba(255,255,255,0.08); }
</style>
</head>
<body>
<video id="bgVid" autoplay loop muted playsinline src="assets/bg.mp4"></video>
<div id="screenDim" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(8,2,14,0.65);z-index:1;pointer-events:none;"></div>
<script src="assets/pixi.min.js"></script>
<script>
(async () => {

// ─────────────────────────────────────────────────────────────
//  RGS INTEGRATION
// ─────────────────────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const SESSION_ID = urlParams.get('sessionID') || 'demo';
const LANG = urlParams.get('lang') || 'en';
const DEVICE = urlParams.get('device') || 'desktop';
let RGS_URL = urlParams.get('rgs_url') || '';
if (RGS_URL && !RGS_URL.startsWith('http')) RGS_URL = 'https://' + RGS_URL;
const MONEY_UNIT = 1000000;
let CURRENCY = urlParams.get('currency') || 'EUR';
let CURRENCY_SYMBOL = '€';
let IS_DEMO = !RGS_URL;

// ── Replay Mode ──
const REPLAY_PARAM = urlParams.get('replay') || '';
const IS_REPLAY = !!REPLAY_PARAM;
// Event ID: try dedicated param first, fall back to replay param if numeric
const REPLAY_EVENT_ID = urlParams.get('eventId') || urlParams.get('eventID') || urlParams.get('event_id') || urlParams.get('event') || (/^\d+$/.test(REPLAY_PARAM) ? REPLAY_PARAM : '');
const REPLAY_MODE = (urlParams.get('mode') || urlParams.get('replayMode') || 'base').toLowerCase();
const REPLAY_AMOUNT = urlParams.get('amount') || '';
let _replayData = null;   // processed replay round data
let _replayBet = 0;       // bet amount from replay
let _replayMode = 'base'; // mode from replay
let _replayTotalWin = 0;  // total win from replay
if (IS_REPLAY) { IS_DEMO = true; } // replay doesn't use live RGS wallet
console.log('[INIT] IS_DEMO:', IS_DEMO, 'RGS_URL:', RGS_URL, 'SESSION_ID:', SESSION_ID, IS_REPLAY ? 'REPLAY:' + REPLAY_PARAM : '');
if (IS_REPLAY) console.log('[REPLAY] eventId:', REPLAY_EVENT_ID, 'mode:', REPLAY_MODE, 'amount:', REPLAY_AMOUNT, 'allParams:', Object.fromEntries(urlParams.entries()));

const CURRENCY_MAP = {
  USD:'$', CAD:'CA$', EUR:'€', GBP:'£', JPY:'¥', CNY:'¥',
  KRW:'₩', BRL:'R$', MXN:'MX$', INR:'₹', RUB:'₽', TRY:'₺',
  PHP:'₱', IDR:'Rp', PLN:'zł', DKK:'kr', VND:'₫',
  CLP:'CLP$', ARS:'AR$', PEN:'S/', XGC:'GC', XSC:'SC'
};
const NO_DECIMAL_CURRENCIES = ['JPY','KRW','VND','CLP'];
CURRENCY_SYMBOL = CURRENCY_MAP[CURRENCY] || CURRENCY + ' ';

function formatMoney(v) {
  if (NO_DECIMAL_CURRENCIES.includes(CURRENCY)) return CURRENCY_SYMBOL + Math.round(v);
  return CURRENCY_SYMBOL + v.toFixed(2);
}
function toRGS(v) { return Math.round(v * MONEY_UNIT); }
function fromRGS(v) { return v / MONEY_UNIT; }

let disabledFullscreen = false;
let disabledTurbo = false;
let socialCasino = urlParams.get('social') === 'true';

// Social Mode — restricted terms replacement (single-pass to avoid cascading)
function socLabel(text) {
  if (!socialCasino) return text;
  const map = {
    'PAYTABLE': 'SYMBOL VALUES',
    'PAYLINES': 'WINLINES', 'PAYLINE': 'WINLINE',
    'PAID OUT': 'WIN', 'PAYS OUT': 'WON', 'PAY OUT': 'WIN',
    'PAYOUT MULTIPLIER': 'FINAL MULTIPLIER',
    'PAYOUT': 'PRIZE', 'PAY': 'PRIZE',
    'BUY BONUS': 'PLAY BONUS', 'BUY SUPER': 'PLAY SUPER', 'BUY FREE': 'PLAY FREE',
    'PURCHASE': 'PLAY', 'BUY': 'PLAY',
    'WIN FEATURE': 'PLAY FEATURE',
    'BASE BET': 'BASE PLAY',
    'COST MULTIPLIER': 'FEATURE MULTIPLIER',
    'STAKE': 'PLAY AMOUNT',
    'TOTAL BET COST': 'TOTAL PLAY WORTH',
    'BET COST': 'PLAY WORTH',
    'COST': 'WORTH', 'PRICE': 'WORTH',
    'BET': 'PLAY AMOUNT',
    'GAMBLING': 'GAMING',
  };
  // Build regex: longest phrases first to prevent partial matches
  const keys = Object.keys(map).sort((a, b) => b.length - a.length);
  const re = new RegExp('\\b(' + keys.join('|') + ')\\b', 'gi');
  return text.replace(re, m => map[m.toUpperCase()] || m);
}

async function _rgsPost(path, body) {
  if (!RGS_URL || !SESSION_ID) return null;
  try {
    const resp = await fetch(RGS_URL + path, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(Object.assign({ sessionID: SESSION_ID }, body))
    });
    if (!resp.ok) {
      let errBody = '';
      try { errBody = await resp.text(); } catch(e2){}
      console.error('[RGS]', path, 'HTTP', resp.status, errBody);
      // Return structured error so callers can distinguish error types
      return { _error: true, status: resp.status, body: errBody };
    }
    return await resp.json();
  } catch(e) { console.warn('[RGS]', path, 'failed:', e); return null; }
}

const RGS = {
  _roundActive: false,
  _playPromise: null,
  _endingRound: false,
  _rgsBoardApplied: false,
  async authenticate() {
    if (IS_DEMO) { const _cbd = CURRENCY_BET_DEFAULTS[CURRENCY] || CURRENCY_BET_DEFAULTS['USD']; return { balance:1000, minBet:_cbd.min, maxBet:_cbd.max, stepBet:_cbd.step, currency:CURRENCY, lang:'en' }; }
    const d = await _rgsPost('/wallet/authenticate', {});
    if (!d || d._error) throw new Error('Auth failed');
    const bal = (d.balance && d.balance.amount != null) ? fromRGS(d.balance.amount) : 1000;
    const cur = (d.balance && d.balance.currency) ? d.balance.currency : 'USD';
    const cfg = d.config || {};
    const jur = cfg.jurisdiction || {};
    const result = { balance: bal, currency: cur, lang: cfg.lang || LANG,
      disabledFullscreen: !!jur.disabledFullscreen, disabledTurbo: !!jur.disabledTurbo,
      socialCasino: !!jur.socialCasino };
    if (cfg.betLevels && cfg.betLevels.length) {
      result.betLevels = cfg.betLevels.map(fromRGS);
    } else if (cfg.minBet != null && cfg.maxBet != null && cfg.stepBet != null) {
      result.minBet = fromRGS(cfg.minBet);
      result.maxBet = fromRGS(cfg.maxBet);
      result.stepBet = fromRGS(cfg.stepBet);
    }
    if (cfg.defaultBetLevel != null) result.defaultBetLevel = fromRGS(cfg.defaultBetLevel);
    // Pass round data for active round detection on refresh
    if (d.round) result.round = d.round;
    return result;
  },
  _lastPlayRes: null, // store play response to check payoutMultiplier
  async play(betAmt, modeName) {
    if (IS_DEMO) { this._roundActive = true; return; }
    // Wait for any previous endRound to complete before starting a new round
    if (this._endRoundPromise) {
      try { await this._endRoundPromise; } catch(e) {}
    }
    this._payoutMultiplier = 0;
    this._roundHasWin = false;
    const body = { amount: toRGS(betAmt), mode: modeName.toUpperCase(), currency: CURRENCY };
    // _playPromise wraps the ENTIRE flow (including retry) as a single promise.
    // This prevents race conditions: onAllStopped awaiting _playPromise always
    // gets the FINAL result, never an intermediate failed attempt.
    this._playPromise = (async () => {
      let res = await _rgsPost('/wallet/play', body);
      if (res && res._error) {
        // Only retry on "active bet" — stale round from crash/reload
        if (res.status === 400 && res.body && res.body.includes('active')) {
          console.warn('[RGS] stale round detected, closing and retrying');
          const cleanup = await _rgsPost('/wallet/end-round', {});
          if (cleanup && !cleanup._error && cleanup.balance && cleanup.balance.amount != null) {
            balance = fromRGS(cleanup.balance.amount);
          }
          res = await _rgsPost('/wallet/play', body);
        } else {
          // Non-recoverable error — don't retry
          return null;
        }
      }
      if (!res) return null; // network failure
      if (res._error) return null; // retry also failed
      return res;
    })();
    this._roundActive = true;
    let res = await this._playPromise;
    this._lastPlayRes = res;
    if (!res) { this._roundActive = false; this._playPromise = null; _rgsDataReady = true; return; }
    if (res.balance && res.balance.amount != null) { balance = fromRGS(res.balance.amount); }
    const payout = res.round && res.round.payoutMultiplier;
    const roundActive = res.round && res.round.active;
    if (payout > 0) console.log('[RGS] win:', payout, 'x bet');
    this._roundHasWin = (roundActive === true);
    this._payoutMultiplier = payout || 0;
    // Process ALL RGS state events into spin data (boards, wins, scatters, wilds, FS)
    // This replaces local book data so scatter triggers, FS, etc. match the RGS outcome
    this._rgsBoard = null;
    this._rgsSpins = null;
    this._rgsMaxPayout = 0;
    if (res.round && res.round.state && res.round.state.length > 0) {
      try {
        const processed = processBookEntry({
          events: res.round.state,
          payoutMultiplier: (payout || 0) * 100 // match book format (cents)
        });
        this._rgsSpins = processed.spins;
        this._rgsMaxPayout = processed.totalPayout;
        console.log('[RGS] processed', this._rgsSpins.length, 'spins from state,',
          'scatter:', this._rgsSpins[0] && this._rgsSpins[0].scatterTrigger ? 'YES' : 'no',
          'wilds:', this._rgsSpins[0] && this._rgsSpins[0].wilds ? this._rgsSpins[0].wilds.length : 0);
        // Extract base game board and apply to reel targets during spin
        if (this._rgsSpins.length > 0 && this._rgsSpins[0].board) {
          this._rgsBoard = this._rgsSpins[0].board;
          // Create display board: strip expanding wilds down to the SINGLE landed wild
          // Base game reveal = PRE-expansion (1 wild at actual landed row)
          const displayBoard = this._rgsBoard.map(reel => [...reel]);
          const spin0 = this._rgsSpins[0];
          if (spin0.wilds && spin0.wilds.length > 0) {
            for (const w of spin0.wilds) {
              // Find the actual wild position on this reel
              let wildRow = -1;
              for (let row = 0; row < ROWS; row++) {
                if (displayBoard[w.reel][row] === WILD) { wildRow = row; break; }
              }
              w._landedRow = wildRow >= 0 ? wildRow : 2;
              // Strip all OTHER wilds (keep only the landed position)
              for (let row = 0; row < ROWS; row++) {
                if (row === w._landedRow) continue;
                if (displayBoard[w.reel][row] === WILD) {
                  displayBoard[w.reel][row] = weightedRandom(WEIGHTS);
                }
              }
            }
          }
          // Update reel targets — reels LAND on stripped board (wilds expand later)
          for (let r = 0; r < REELS; r++) {
            reelState[r].targetSyms = displayBoard[r];
          }
          lastBoard = displayBoard;
          // Scatter anticipation from RGS data — includes random teases
          if (!inFS && !turboMode && spinning && reelState[4] && !reelState[4].stopped) {
            const sc0 = displayBoard[0] && displayBoard[0].includes(SCATTER);
            const sc2 = displayBoard[2] && displayBoard[2].includes(SCATTER);
            const realAnticipation = sc0 && sc2;
            const teaseAnticipation = !realAnticipation && Math.random() < 0.10;
            if (realAnticipation || teaseAnticipation) {
              // Timing relative to NOW (when RGS data arrives), not old reel stopTimes
              // Reels 0-3 stop quickly (~300ms stagger), then reel 4 gets 3s of anticipation
              const now = Date.now();
              for (let ri = 0; ri < 4; ri++) {
                reelState[ri].stopTime = Math.min(reelState[ri].stopTime, now + ri * 300);
              }
              reelState[4].stopTime = now + 1200 + 3000; // 1.2s for reels 0-3, then 3s anticipation
              setTimeout(() => { if (spinning) startAnticipation(4); }, 1000);
            }
          }
        }
      } catch(e) { console.warn('[RGS] processBookEntry on state failed:', e); }
    }
    _rgsDataReady = true; // ungate reels — they can now stop on correct RGS data
  },
  _roundHasWin: false,
  _payoutMultiplier: 0,
  _endRoundPromise: null,
  async endRound() {
    // endRound — only call /wallet/end-round when the RGS round is active.
    // The Carrot RGS auto-closes rounds with no win. Only rounds with wins
    // or FS triggers remain active and need explicit end-round.
    if (IS_DEMO) { this._roundActive = false; return; }
    if (this._endingRound) return this._endRoundPromise;
    this._endingRound = true;
    this._endRoundPromise = (async () => {
      try {
        if (this._playPromise) await this._playPromise;
        // Only call end-round if the RGS indicated the round is active (has win/FS)
        if (this._roundHasWin) {
          const res = await _rgsPost('/wallet/end-round', {});
          if (res && !res._error && res.balance && res.balance.amount != null) {
            balance = fromRGS(res.balance.amount);
          }
        }
      } catch(e) { console.warn('end-round error:', e); }
      this._roundActive = false;
      this._playPromise = null;
      this._endingRound = false;
      this._roundHasWin = false;
      this._payoutMultiplier = 0;
      this._endRoundPromise = null;
    })();
    return this._endRoundPromise;
  },
  async betEvent(eventStr) {
    if (IS_DEMO) return;
    _rgsPost('/bet/event', { event: eventStr });
  }
};

// ─────────────────────────────────────────────────────────────
//  RGS URL VALIDATION (Issue #4)
// ─────────────────────────────────────────────────────────────
let _rgsBlocked = false;
function showRGSError(msg) {
  _rgsBlocked = true;
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;';
  const title = document.createElement('div');
  title.style.cssText = 'color:#ff4444;font-family:Georgia,serif;font-size:28px;font-weight:bold;margin-bottom:16px;';
  title.textContent = 'CONNECTION ERROR';
  const body = document.createElement('div');
  body.style.cssText = 'color:#cccccc;font-family:Georgia,serif;font-size:16px;text-align:center;max-width:500px;line-height:1.6;';
  body.textContent = msg;
  overlay.appendChild(title);
  overlay.appendChild(body);
  document.body.appendChild(overlay);
}
// Validate rgs_url: if invalid, fall back to demo mode
if (!IS_DEMO) {
  try {
    const testUrl = new URL(RGS_URL);
    if (!testUrl.protocol.startsWith('http')) throw new Error('bad protocol');
  } catch(e) {
    console.warn('Invalid RGS URL, falling back to demo mode');
    IS_DEMO = true;
  }
}

// ─────────────────────────────────────────────────────────────
//  BOOK SYSTEM — Pre-computed outcome loading (Issue #1)
// ─────────────────────────────────────────────────────────────
const _books = {};        // { base: [...], buy_bonus: [...], super_buy_bonus: [...] }
let _bookReady = false;   // true once at least the base book is loaded

async function loadBook(mode) {
  if (_books[mode]) return;
  try {
    const resp = await fetch('book_' + mode + '.json?v=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    _books[mode] = await resp.json();
    console.log('[BOOK] Loaded', mode, ':', _books[mode].length, 'entries');
  } catch(e) {
    console.error('[BOOK] Failed to load', mode, e);
    _books[mode] = [];
  }
}

function pickBookEntry(mode) {
  const book = _books[mode];
  if (!book || !book.length) return null;
  return book[Math.floor(Math.random() * book.length)];
}

// Parse a book entry's events into an array of spin data objects.
// Each spin = { board (5x5 visible), wilds [{reel, mult}], wins [{symbol, kind, win, positions, meta}],
//              winAmount, scatterTrigger {totalFs, positions}, stickyWilds [{reel, mult}],
//              fsUpdate {amount, total}, anticipation [] }
function processBookEntry(entry) {
  const spins = [];
  let currentSpin = null;
  let pendingWilds = []; // Buffer: expandingWild events come BEFORE the reveal they apply to in FS
  const totalPayout = (entry.payoutMultiplier || 0) / 100; // cents → bet multiplier

  function newSpin() {
    return { board: null, wilds: [], wins: [], winAmount: 0,
             scatterTrigger: null, stickyWilds: null, fsUpdate: null, anticipation: [] };
  }

  for (const ev of entry.events) {
    switch (ev.type) {
      case 'reveal': {
        // Each reveal = a new spin (base or freespin)
        if (currentSpin && currentSpin.board) spins.push(currentSpin);
        currentSpin = newSpin();
        // Attach any buffered expandingWild events to this new spin
        currentSpin.wilds = pendingWilds;
        pendingWilds = [];
        // Extract visible 5x5 from 7-row padded board
        // Map book symbol names to frontend texture names
        const _symMap = { 'W': 'wild_tile', 'SC': 'scatter' };
        const board = ev.board || [];
        currentSpin.board = board.map(reel =>
          reel.slice(1, 6).map(cell => {
            const name = (typeof cell === 'object' && cell.name) ? cell.name : String(cell);
            return _symMap[name] || name;
          })
        );
        currentSpin.anticipation = ev.anticipation || [];
        break;
      }
      case 'expandingWild': {
        // Buffer: in FS, expandingWild comes BEFORE the reveal it applies to.
        // In base game, it comes AFTER reveal and gets flushed at end of events.
        pendingWilds.push({ reel: ev.reel, mult: ev.multiplier || 1 });
        break;
      }
      case 'winInfo': {
        if (!currentSpin) currentSpin = newSpin();
        currentSpin.winAmount = (ev.totalWin || 0) / 100; // cents → bet multiplier
        currentSpin.wins = (ev.wins || []).map(w => ({
          symbol: w.symbol, kind: w.kind, win: (w.win || 0) / 100,
          positions: w.positions || [],
          meta: w.meta || {}
        }));
        break;
      }
      case 'scatterTrigger': {
        if (!currentSpin) currentSpin = newSpin();
        currentSpin.scatterTrigger = {
          totalFs: ev.totalFs,
          positions: (ev.scatterPositions || []).map(p => ({ reel: p.reel, row: p.row - 1 })) // convert 1-indexed to 0-indexed
        };
        break;
      }
      case 'updateStickyWilds': {
        if (!currentSpin) currentSpin = newSpin();
        currentSpin.stickyWilds = (ev.stickyWildReels || []).map(w => ({ reel: w.reel, mult: w.mult }));
        break;
      }
      case 'updateFreeSpin': {
        if (!currentSpin) currentSpin = newSpin();
        currentSpin.fsUpdate = { amount: ev.amount, total: ev.total };
        break;
      }
      // setWin, setTotalWin, finalWin, freeSpinEnd — consumed implicitly
    }
  }
  // Flush remaining buffered wilds to the last spin (base game: expandingWild after reveal)
  if (currentSpin) {
    currentSpin.wilds.push(...pendingWilds);
    if (currentSpin.board) spins.push(currentSpin);
  }

  // De-duplicate wilds per reel: keep only the LAST multiplier for each reel per spin
  for (const spin of spins) {
    if (spin.wilds.length > 1) {
      const reelMap = new Map();
      for (const w of spin.wilds) reelMap.set(w.reel, w);
      spin.wilds = Array.from(reelMap.values());
    }
  }

  return { spins, totalPayout };
}

function weightedRandom(w) {
  const keys = Object.keys(w);
  let total = 0; keys.forEach(k => total += w[k]);
  let r = Math.random() * total;
  for (const k of keys) { r -= w[k]; if (r <= 0) return k; }
  return keys[keys.length - 1];
}

function buildBetLevels(min, max, step) {
  minBet=min; maxBet=max; stepBet=step;
  let lvls=[]; for(let v=min; v<=max+0.001; v+=step) lvls.push(Math.round(v*100)/100);
  // Cap at 25 levels — evenly sample if step produces too many
  if (lvls.length > 25) {
    const sampled = [lvls[0]];
    const stride = (lvls.length - 1) / 23;
    for (let i = 1; i < 23; i++) sampled.push(lvls[Math.round(i * stride)]);
    sampled.push(lvls[lvls.length - 1]);
    lvls = [...new Set(sampled)].sort((a,b)=>a-b);
  }
  if(!lvls.length) lvls.push(min); betLevels=lvls;
  if(!betLevels.includes(bet)) bet=betLevels.reduce((p,c)=>Math.abs(c-bet)<Math.abs(p-bet)?c:p);
}

function showToast(msg) {
  const t = new PIXI.Text(msg, { fontFamily:'Georgia, serif', fontSize:20, fontWeight:'bold', fill:0xffffff,
    stroke:0x3A0A0A, strokeThickness:4, dropShadow:true, dropShadowColor:0x000000, dropShadowBlur:6, dropShadowDistance:2 });
  t.anchor.set(0.5); t.x=BASE_W/2; t.y=BASE_H/2; t.alpha=0; app.stage.addChild(t);
  let f=0; const fn=()=>{ f++; if(f<10) t.alpha=f/10; else if(f<70) t.alpha=1;
    else if(f<90){t.alpha=1-(f-70)/20; t.y-=0.5;} else{app.ticker.remove(fn); app.stage.removeChild(t); t.destroy();} };
  app.ticker.add(fn);
}

    // Frame geometry

    const FIH = GRID_H + PAD * 2;

    layerBG.addChild(fG);

    // Corner ornaments — Midjourney asset, ADD blend removes black bg
    const cornerTex = T('corner');
    const CSIZ = 130; // display size of each corner sprite
    const cornerDefs = [
      { x: FOX,       y: FOY,       sx:  1, sy:  1 },  // top-left
      { x: FOX + FOW, y: FOY,       sx: -1, sy:  1 },  // top-right
      { x: FOX,       y: FOY + FOH, sx:  1, sy: -1 },  // bottom-left
      { x: FOX + FOW, y: FOY + FOH, sx: -1, sy: -1 },  // bottom-right
    ];
    cornerDefs.forEach(({ x, y, sx, sy }) => {
      const s = new PIXI.Sprite(cornerTex);
      s.width  = CSIZ;
      s.height = CSIZ;
      s.anchor.set(0, 0);
      s.scale.x = sx * (CSIZ / cornerTex.width);
      s.scale.y = sy * (CSIZ / cornerTex.height);
      s.x = x; s.y = y;
      s.blendMode = PIXI.BLEND_MODES.ADD;  // black bg disappears
      layerBG.addChild(s);
    });

    // Reel dividers
    for (let i = 1; i < REELS; i++) {
      const div = new PIXI.Graphics();
      div.lineStyle(1, 0xd4a017, 0.12);
      div.moveTo(GRID_X + i * CELL - SYM_GAP / 2, GRID_Y);
      div.lineTo(GRID_X + i * CELL - SYM_GAP / 2, GRID_Y + GRID_H);
      layerBG.addChild(div);

  }

  // ── Falling cherry blossom petals (over video) ──
  const petals = [];
  for (let i = 0; i < 35; i++) {
    const e = new PIXI.Graphics();
    e.beginFill(0xff88aa, 0.22 + Math.random() * 0.28);
    const ps = 3 + Math.random() * 2.5;

// ─────────────────────────────────────────────────────────────
//  REEL SPRITES  (scrolling system)
// ─────────────────────────────────────────────────────────────
// SPRITE_COUNT = ROWS + 2  (1 buffer above + ROWS visible + 1 buffer below)
const SPRITE_COUNT = ROWS + 2;

const reelContainers = [];
const reelSprites    = []; // [reel][spriteIndex]
const reelBlur       = [];
const reelState      = [];

for (let r = 0; r < REELS; r++) {
  // Container positioned at top-left of this reel's visible area
  const rc = new PIXI.Container();
  rc.x = GRID_X + r * CELL;
  rc.y = GRID_Y;

  // Mask: clip to exactly 3 rows of visible area
  const mask = new PIXI.Graphics();
  mask.beginFill(0xffffff);
  mask.drawRect(GRID_X + r*CELL, GRID_Y, SYM_SIZE, ROWS*CELL - SYM_GAP);
  mask.endFill();
  layerReel.addChild(mask);
  rc.mask = mask;

  // Blur filter — only attached during spin, removed when stopped (filter on container degrades quality even at 0)
  const blur = new PIXI.filters.BlurFilter();
  blur.blurX   = 0; blur.blurY = 0;
  blur.quality = 4;   // explicit quality — default varies by device
  rc.filters = null;  // no filter at rest = full native texture quality
  reelBlur.push(blur);

  layerReel.addChild(rc);
  reelContainers.push(rc);

  // Create sprites (LOCAL coords, relative to container)
  // Index 0 = one row ABOVE visible, index 1-3 = visible, index 4 = one row BELOW
  const sprites = [];
  // WEIGHTS has no scatter — safe for all reels
  for (let i = 0; i < SPRITE_COUNT; i++) {
    const sp = new PIXI.Sprite(T(weightedRandom(WEIGHTS)));
    sp.x = 0;
    sp.y = (i - 1) * CELL;   // -1*CELL = above top, 0=row0, 1=row1, 2=row2, 3*CELL=below
    sp.width  = SYM_SIZE;
    sp.height = SYM_SIZE;
    rc.addChild(sp);
    sprites.push(sp);
  }
  reelSprites.push(sprites);

  // Per-reel state
  reelState.push({
    spinning:  false,
    velocity:  0,
    stopping:  false,
    stopped:   true,
    startTime: 0,
    stopTime:  0,
    targetSyms: null,
  });
}

// ─────────────────────────────────────────────────────────────
//  WILD OVERLAYS  (one per reel, initially hidden)

const wildOverlays = [];
for (let r = 0; r < REELS; r++) {
  const c = new PIXI.Container();
  c.visible = false;
  c.x = GRID_X + r * CELL;
  c.y = GRID_Y;

  // Clip mask — keeps everything inside the rounded reel column, no overflow
  const clipMask = new PIXI.Graphics();
  clipMask.beginFill(0xffffff);
  clipMask.drawRoundedRect(0, 0, SYM_SIZE, GRID_H, 5);
  clipMask.endFill();
  c.addChild(clipMask);
  c.mask = clipMask;

  // ── Video background — animated wild reel ──
  // Create a dedicated video element per reel for independent playback
  const vid = document.createElement('video');
  vid.src = 'assets/wild_reel_anim.mp4';
  vid.loop = false;
  vid.muted = true;
  vid.playsInline = true;
  vid.preload = 'auto';
  vid.style.display = 'none';
  document.body.appendChild(vid);

  const vidTex = PIXI.Texture.from(vid, { resourceOptions: { autoPlay: false, updateFPS: 30 } });
  const sh = new PIXI.Sprite(vidTex);
  // Cover-scale once video metadata loads
  vid.addEventListener('loadedmetadata', () => {
    const scaleW = SYM_SIZE / vid.videoWidth;
    const scaleH = GRID_H / vid.videoHeight;
    const coverScale = Math.max(scaleW, scaleH);
    sh.width = vid.videoWidth * coverScale;
    sh.height = vid.videoHeight * coverScale;
    sh.x = (SYM_SIZE - sh.width) / 2;
    sh.y = (GRID_H - sh.height) / 2;
  }, { once: true });
  // Fallback sizing
  sh.width = SYM_SIZE;
  sh.height = GRID_H;
  c._vid = vid;
  c._vidSprite = sh;
  c.addChild(sh);

  // Gold border drawn ON TOP of sprite, outside clip mask so it always shows
  // (add to layerWild directly so it renders above the masked container)
  const brd = new PIXI.Graphics();
  brd.lineStyle(3, 0xd4a017, 1);
  brd.drawRoundedRect(GRID_X + r * CELL + 1, GRID_Y + 1, SYM_SIZE - 2, GRID_H - 2, 5);
  brd.name = 'brd_' + r;
  brd.visible = false;
  layerWild.addChild(brd);

  // ── Badge — Zeus/Hades style, samurai-themed ─────────────────────────────

  badge.y = 64;
  badge.name = 'badge';

    fontFamily: 'Georgia, serif',
    fontSize: 15,
    fontWeight: 'bold',
    fill: 0xffd700,
    align: 'center',
    letterSpacing: 3,
    stroke: 0x1a0000,
    strokeThickness: 4,
    dropShadow: true,
    dropShadowColor: 0xff2200,
    dropShadowBlur: 10,
    dropShadowDistance: 0,
  });
  wtxt.anchor.set(0.5, 1);
  wtxt.y = -6;
  badge.addChild(wtxt);

  // Decorative katana slash line between label and number
  const slash = new PIXI.Graphics();
  slash.lineStyle(1.5, 0xd4a017, 0.65);
  slash.moveTo(-36, 0); slash.lineTo(36, 0);
  slash.lineStyle(0.8, 0xffffff, 0.25);
  slash.moveTo(-30, 2); slash.lineTo(30, 2);
  badge.addChild(slash);

  // Multiplier number — LARGE, bright white-to-gold gradient, strong red glow
  const btxt = new PIXI.Text('1×', {
    fontFamily: 'Georgia, serif',
    fontSize: 54,
    fontWeight: 'bold',
    fill: [0xffffff, 0xffd700],
    fillGradientType: 0,       // vertical gradient: white top → gold bottom
    align: 'center',
    stroke: 0x000000,
    strokeThickness: 6,
    dropShadow: true,
    dropShadowColor: 0xff2200,
    dropShadowBlur: 20,
    dropShadowDistance: 0,
  });
  btxt.anchor.set(0.5, 0);
  btxt.y = 5;
  btxt.name = 'btxt';
  badge.addChild(btxt);

  c.addChild(badge);

  layerWild.addChild(c);
  wildOverlays.push(c);
}

function showBuyBonusModal() {
  if (buyBonusOverlay) return;

  // Full-screen dim — oversized to guarantee full coverage
  const dim = new PIXI.Graphics();
  dim.beginFill(0x000000, 0.70);
  dim.drawRect(-500, -500, BASE_W + 1000, BASE_H + 1000);
  dim.endFill();
  dim.interactive = true;
  app.stage.addChild(dim);

  const modal = new PIXI.Container();
  buyBonusOverlay = modal;
  modal._dim = dim;
  modal._tickerFns = [];
  app.stage.addChild(modal);

  // ── Title banner ──
  const titleText = new PIXI.Text('CHOOSE YOUR BONUS', {
    fontFamily: 'Georgia, serif', fontSize: 36, fontWeight: 'bold',
    fill: [0xfff700, 0xffcc00, 0xffa500], fillGradientStops: [0, 0.5, 1],
    letterSpacing: 6, align: 'center',
    stroke: 0x1a0800, strokeThickness: 5,
    dropShadow: true, dropShadowColor: 0x000000, dropShadowBlur: 12, dropShadowDistance: 0,
  });
  titleText.anchor.set(0.5); titleText.x = BASE_W / 2; titleText.y = 55;
  modal.addChild(titleText);

  // Title underline ornament
  const ornament = new PIXI.Graphics();
  ornament.lineStyle(2, 0xffd700, 0.4);
  ornament.moveTo(BASE_W / 2 - 180, 80); ornament.lineTo(BASE_W / 2 + 180, 80);
  modal.addChild(ornament);

  // ── Card builder — clean, no extra glows ──
  const CW = 280, CH = 420;
  const cardY = (BASE_H - CH) / 2 - 30;
  const GAP = 50;

  function makeCard(x, title, subtitle, costMult, texName, titleColors, cb) {
    const card = new PIXI.Container();
    card.x = x; card.y = cardY;

    // Midjourney panel — natural colors, no tint
    const panelSprite = new PIXI.Sprite(T(texName));
    panelSprite.width = CW; panelSprite.height = CH;
    card.addChild(panelSprite);

    // Title text
    const lines = title.split('\n');
    lines.forEach((line, i) => {
      const t = new PIXI.Text(line, {
        fontFamily: 'Georgia, serif', fontSize: 26, fontWeight: 'bold',
        fill: titleColors, fillGradientStops: [0, 1],
        stroke: 0x0a0000, strokeThickness: 5, letterSpacing: 3,
        dropShadow: true, dropShadowColor: 0x000000, dropShadowBlur: 10, dropShadowDistance: 0,
      });
      t.anchor.set(0.5); t.x = CW / 2; t.y = 80 + i * 34;
      card.addChild(t);
    });

    // Subtitle
    if (subtitle) {
      const st = new PIXI.Text(subtitle, {
        fontFamily: 'Georgia, serif', fontSize: 13, fontWeight: 'bold',

    };
    app.ticker.add(scFn);

    // Price button — crimson lacquer + gold trim
    const cost = costMult * bet;

    priceBtn.x = CW / 2; priceBtn.y = CH - 65;
    priceBtn.interactive = true; priceBtn.cursor = 'pointer';

    pbg.endFill();

    const priceTxt = new PIXI.Text(formatMoney(cost), {

    const costLabel = new PIXI.Text(socLabel(`${costMult}× BET`), {
      fontFamily: 'Georgia, serif', fontSize: 11, fill: 0x888888, letterSpacing: 2,
    });

    priceBtn.on('pointerout',  () => { pbg.tint = 0xffffff; priceBtn.scale.set(1.0); });
    priceBtn.on('pointerdown', () => {
      if (balance >= cost) {
        playSound('button_click');
        showBuyConfirmation(title, cost, () => cb(cost));
      } else {
        showToast('INSUFFICIENT BALANCE');
      }
    });
    card.addChild(priceBtn);

    // Hover
    card.interactive = true;
    card.on('pointerover', () => { card.scale.set(1.02); });
    card.on('pointerout',  () => { card.scale.set(1.0); });

    modal.addChild(card);
    return { card, priceTxt };
  }

  // ── Left card: Free Spins (red scroll — natural asset color) ──
  const leftCard = makeCard(
    BASE_W / 2 - CW - GAP / 2, socLabel('BUY\nFREE SPINS'), `${BONUS_FS_NORMAL} FREE SPINS`,
    BONUS_COST_NORMAL, 'buy_card_red', [0xffffff, 0xffcccc],
    (cost) => {
      playSound('button_click');
      closeBuyBonus();
      // RGS: send base bet — RGS multiplies by cost (150×) from index.json
      _simMode = 'buy_bonus';
      balance = Math.round((balance - cost + bet) * 100) / 100; // pre-compensate: startSpin deducts bet
      RGS.play(bet, 'buy_bonus');
      _forceBonusSpin = true;
      updateUI();
      startSpin();
    }
  );

  // ── Right card: Super Free Spins (gold scroll — natural asset color) ──
  const rightCard = makeCard(
    BASE_W / 2 + GAP / 2, socLabel('BUY SUPER\nFREE SPINS'),
    `${BONUS_FS_SUPER} SPINS + GUARANTEED\nEXPANDING WILD`,
    BONUS_COST_SUPER, 'buy_card_gold', [0xfff700, 0xffcc00],
    (cost) => {
      playSound('button_click');
      closeBuyBonus();
      // RGS: send base bet — RGS multiplies by cost (300×) from index.json
      _simMode = 'super_buy_bonus';
      balance = Math.round((balance - cost + bet) * 100) / 100;
      RGS.play(bet, 'super_buy_bonus');
      _buyBonusSuper = true;
      _forceBonusSpin = true;
      updateUI();
      startSpin();
    }
  );

  // ── Close button — top right corner ──
  const closeBtn = new PIXI.Container();
  closeBtn.x = BASE_W / 2 + CW + GAP / 2 + 20;
  closeBtn.y = cardY - 5;

  xBg.lineStyle(1, 0x555555, 0.5);
  xBg.drawCircle(0, 0, 18);
  xBg.endFill();
  closeBtn.addChild(xBg);

  const xTxt = new PIXI.Text('✕', {
    fontFamily: 'Arial', fontSize: 18, fontWeight: 'bold', fill: 0x999999,
  });
  xTxt.anchor.set(0.5); xTxt.y = -1;

  closeBtn.on('pointerout',  () => { xBg.tint = 0xffffff; xTxt.style.fill = 0x999999; closeBtn.scale.set(1.0); });
  closeBtn.on('pointerdown', () => { playSound('button_click'); closeBuyBonus(); });
  modal.addChild(closeBtn);

  // Animate in — simple fade
  modal.alpha = 0;
  let inT = 0;
  const inFn = (dt) => {
    inT += dt;
    modal.alpha = Math.min(inT / 10, 1);
    if (inT >= 10) app.ticker.remove(inFn);
  };
  app.ticker.add(inFn);
  modal._tickerFns.push(inFn);  // ensure cleanup on early close
}

function showBuyConfirmation(cardTitle, cost, onConfirm) {

  overlay.endFill();
  overlay.interactive = true;
  overlay.cursor = 'default';

  // Close helper — removes this dialog only (buy bonus modal stays)
  function closeConfirm() {
    app.stage.removeChild(confirmRoot);
    confirmRoot.destroy({ children: true });
  }

  // Clicking the overlay cancels
  overlay.on('pointerdown', () => { playSound('button_click'); closeConfirm(); });

  // ── Panel (Midjourney sprite) ──

  panelSprite.height = PH;
  panelSprite.x = px;
  panelSprite.y = py;

  const panelBlock = new PIXI.Graphics();
  panelBlock.beginFill(0x000000, 0.001);
  panelBlock.drawRect(px, py, PW, PH);
  panelBlock.endFill();
  panelBlock.interactive = true;
  panelBlock.on('pointerdown', (e) => e.stopPropagation());
  confirmRoot.addChild(panelBlock);

  // ── Title ──
  const titleDisplay = cardTitle.replace(/[^\w\s\n]/g, '').trim();
  const titleTxt = new PIXI.Text(titleDisplay, {
    fontFamily: 'Georgia, serif', fontSize: 36, fontWeight: 'bold',
    fill: [0xfff4d0, 0xd4a017, 0xfff4d0], fillGradientStops: [0, 0.5, 1],
    letterSpacing: 5, align: 'center',

  });

  titleTxt.y = py + 85;
  confirmRoot.addChild(titleTxt);

  // ── "TOTAL COST" label ──
  const costMeta = new PIXI.Text(socLabel('TOTAL COST'), {

  });
  costMeta.anchor.set(0.5);
  costMeta.x = BASE_W / 2;
  costMeta.y = py + 140;
  confirmRoot.addChild(costMeta);

  // ── Cost amount ──
  const costTxt = new PIXI.Text(formatMoney(cost), {
    fontFamily: 'Georgia, serif', fontSize: 52, fontWeight: 'bold',
    fill: [0xffffff, 0xfff4d0], fillGradientStops: [0, 1],
    stroke: 0x1a0000, strokeThickness: 6,
    dropShadow: true, dropShadowColor: 0x000000, dropShadowBlur: 10, dropShadowDistance: 2,
  });
  costTxt.anchor.set(0.5);
  costTxt.x = BASE_W / 2;
  costTxt.y = py + 190;
  confirmRoot.addChild(costTxt);

  // ── Buttons ──
  const BW = 160, BH = 52;
  const BTN_Y = py + PH - 85;
  const GAP_BTN = 24;
  const cancelX  = BASE_W / 2 - BW - GAP_BTN / 2;
  const confirmX = BASE_W / 2 + GAP_BTN / 2;

  function makeDialogBtn(x, y, bgColor, label, onClick) {
    const btn = new PIXI.Container();
    btn.x = x; btn.y = y;
    btn.interactive = true; btn.cursor = 'pointer';

    const bg = new PIXI.Graphics();
    bg.beginFill(bgColor, 1);
    bg.lineStyle(2, 0xC9A84C, 0.8);
    bg.drawRoundedRect(0, 0, BW, BH, 10);

    // Subtle top sheen

    bg.drawRoundedRect(2, 2, BW - 4, BH / 2 - 2, 8);

    const lbl = new PIXI.Text(label, {
      fontFamily: 'Georgia, serif', fontSize: 18, fontWeight: 'bold',
      fill: 0xffffff,
      stroke: 0x000000, strokeThickness: 3,

function closeBuyBonus() {
  if (!buyBonusOverlay) return;
  if (buyBonusOverlay._tickerFns) buyBonusOverlay._tickerFns.forEach(fn => app.ticker.remove(fn));
  const dim = buyBonusOverlay._dim;
  if (dim) { app.stage.removeChild(dim); dim.destroy(); }
  app.stage.removeChild(buyBonusOverlay);
  buyBonusOverlay.destroy({ children: true });
  buyBonusOverlay = null;
}

function makeSpinBtn(x, y) {
  const c = new PIXI.Container();
  c.interactive = true; c.cursor = 'pointer';
  c.x = x; c.y = y;

  // — Dragon medallion image —
  const tex = PIXI.Texture.from('assets/spin_btn.png');
  const medallion = new PIXI.Sprite(tex);
  medallion.anchor.set(0.5);
  medallion.width = 110;
  medallion.height = 110;
  c.addChild(medallion);

  // — Outer pulse ring (alpha-animated, no blur) —
  const pulse = new PIXI.Graphics();
  pulse.lineStyle(3, 0xd4a017, 0.6);
  pulse.drawCircle(0, 0, 62);
  c.addChild(pulse);

  // — Stop icon overlay (shown while spinning) —
  const stopShape = new PIXI.Graphics();
  stopShape.beginFill(0xffffff, 0.9);
  stopShape.drawRoundedRect(-11, -11, 22, 22, 3);
  stopShape.endFill();
  stopShape.visible = false;
  c.addChild(stopShape);

  // — Interactions —
  c.on('pointerdown', () => {
    playSound('button_click');
    if (spinning) return;
    if (autoSpins !== 0) { autoSpins = 0; _updateAutoBtn(); _hideAutoPicker(); return; }
    startSpin(); c.scale.set(0.93);
  });
  c.on('pointerup',   () => c.scale.set(1.0));
  c.on('pointerupoutside', () => c.scale.set(1.0));
  c.on('pointerover', () => {
    if (!spinning) { medallion.tint = 0xffccaa; c.scale.set(1.06); }
  });
  c.on('pointerout',  () => { medallion.tint = 0xffffff; c.scale.set(spinning ? 1 : 1.0); });

  // — Animations —
  let bt = 0;
  app.ticker.add((dt) => {
    bt += dt;
    // Stop icon when spinning
    stopShape.visible = spinning;
    // Pulse ring breathes when idle
    pulse.alpha = spinning ? 0 : 0.3 + Math.sin(bt * 0.055) * 0.3;
    // Slow rotation when idle
    medallion.rotation = spinning ? medallion.rotation : bt * 0.003;
  });

  layerUI.addChild(c);
}

function _showAutoPicker() {
  if (_autoPicker) { _autoPicker.visible = true; return; }
  const counts = [10, 25, 50, 100, 0]; // 0 = ∞
  const BW = 52, BH = 28, GAP = 6;
  const totalW = counts.length * BW + (counts.length - 1) * GAP + 16;
  let px = _autoBtn.c.x - totalW / 2;

  if (px + totalW > BASE_W - 8) px = BASE_W - totalW - 8;
  if (px < 8) px = 8;
  const py = _autoBtn.c.y - 50;

  _autoPicker = new PIXI.Container();
  _autoPicker.x = px; _autoPicker.y = py;

  const bg = new PIXI.Graphics();
  bg.beginFill(0x0a0018, 0.95);
  bg.lineStyle(1, 0xd4a017, 0.6);
  bg.drawRoundedRect(0, 0, totalW, BH + 16, 6);
  bg.endFill();
  _autoPicker.addChild(bg);

  counts.forEach((n, i) => {
    const bx = 8 + i * (BW + GAP);
    const btn = new PIXI.Container();
    btn.x = bx; btn.y = 8;
    btn.interactive = true; btn.cursor = 'pointer';

    const bb = new PIXI.Graphics();

    btn.on('pointerover', () => { bb.tint = 0xffdd88; });
    btn.on('pointerout',  () => { bb.tint = 0xffffff; });
    btn.on('pointerdown', () => { _showAutoConfirm(n); });
    _autoPicker.addChild(btn);
  });

  layerUI.addChild(_autoPicker);
}

function _hideAutoPicker() {
  if (_autoPicker) _autoPicker.visible = false;
}
