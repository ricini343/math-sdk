// ─────────────────────────────────────────────────────────────
//  FREE SPIN BOARD GENERATOR — guaranteed Wilds on locked reels
// ─────────────────────────────────────────────────────────────
function _makeFSBoard(lockedWildReels) {
  const board = [];
  const WEIGHTS_FS = [
    ['watermelon',4],['grape',5],['orange',6],['cherry',7],['plum',8],['lemon',9],
    ['A',10],['K',10],['Q',10],['J',10],['10',10]
  ];
  function _wRand() {
    let total = 0; for (const [,w] of WEIGHTS_FS) total += w;
    let rnd = Math.random() * total, acc = 0;
    for (const [s,w] of WEIGHTS_FS) { acc += w; if (rnd < acc) return s; }
    return WEIGHTS_FS[0][0];
  }
  for (let r = 0; r < REELS; r++) {
    const col = [];
    for (let row = 0; row < ROWS; row++) col.push(_wRand());
    // Locked wild reels: guarantee exactly one Wild symbol in a random row
    if (lockedWildReels.includes(r)) {
      const wRow = Math.floor(Math.random() * ROWS);
      col[wRow] = WILD;
    }
    board.push(col);
  }
  // DEBUG: verify board has max 1 wild per reel
  const _dbgCounts = board.map((col, r) => col.filter(c => c === 'wild').length);
  if (_dbgCounts.some(c => c > 1)) {
    console.error('[_makeFSBoard BUG] Multiple wilds per reel!', _dbgCounts.join(','), 'locked:', JSON.stringify(lockedWildReels));
  }
  return board;
}

// ─────────────────────────────────────────────────────────────
//  BOARD GENERATOR
// ─────────────────────────────────────────────────────────────
function makeBoard() {
  const board = [];

  // ── Step 1: fill with regular symbols ──
  // Sticky reels: place ONE wild at a random row (expansion overlay fills the rest visually).
  // Do NOT fill all cells with WILD — that skips the land→expand animation.
  for (let r = 0; r < REELS; r++) {
    const col = [];
    const isSticky = wildReels.some(w => w.reel === r);
    if (isSticky) {
      const wildRow = Math.floor(Math.random() * ROWS);
      for (let row = 0; row < ROWS; row++) {
        col.push(row === wildRow ? WILD : weightedRandom(WEIGHTS_FS));
      }
    } else {
      for (let row = 0; row < ROWS; row++) {
        col.push(weightedRandom(inFS ? WEIGHTS_FS : WEIGHTS));
      }
    }
    board.push(col);
  }

  // ── Step 2: wild placement — exactly 1 wild per chosen reel, max 1 reel ──
  // Super bonus: guarantee a wild on the pending reel (first FS spin)
  if (_pendingSuperWild && inFS) {
    const sr = _pendingSuperWild.reel;
    const wildRow = Math.floor(Math.random() * ROWS);
    board[sr][wildRow] = WILD;
  }
  // Base game: ~30% chance, any reel (not already sticky)
  // FS:        ~45% chance, non-sticky reel only
  // This is the ONLY place WILD enters the board (besides sticky FS reels above).
  if (!inFS && Math.random() < 0.30) {
    const pick    = Math.floor(Math.random() * REELS);
    const wildRow = Math.floor(Math.random() * ROWS);
    board[pick][wildRow] = WILD;  // overwrites whatever was there — 1 wild, 1 reel
  } else if (inFS && Math.random() < 0.45) {
    const available = [0,1,2,3,4].filter(r => !wildReels.some(w => w.reel === r));
    if (available.length > 0) {
      const pick    = available[Math.floor(Math.random() * available.length)];
      const wildRow = Math.floor(Math.random() * ROWS);
      board[pick][wildRow] = WILD;
    }
  }

  // ── Step 3: scatter placement — base game only, reels 0/2/4, independent per reel ──
  // Each reel rolls independently so you can get 0, 1, 2, or 3 scatters.
  // ~18% chance per reel → ~0.6% for all 3 (bonus), ~8% for 1 scatter, ~3% for 2 (tease/bait)
  if (!inFS) {
    [0, 2, 4].forEach(r => {
      // Force scatter on all 3 reels when buying bonus
      if (_forceBonusSpin || Math.random() < getScatterProb()) {
        const candidates = [];
        for (let row = 0; row < ROWS; row++) {
          if (board[r][row] !== WILD) candidates.push(row);
        }
        if (candidates.length > 0) {
          board[r][candidates[Math.floor(Math.random() * candidates.length)]] = SCATTER;
        }
      }
    });
    if (_forceBonusSpin) _forceBonusSpin = false;
  }

  return board;
}

// ─────────────────────────────────────────────────────────────
//  WILD EXPANSION ANIMATION
// ─────────────────────────────────────────────────────────────
// ── Shared anticipation spinner for Wild multiplier reveal ──
// Hoisted to outer scope so both expandWilds and _revealStickyMults can use it.
function _runMultSpinner(badge, mult, gen, done) {
  badge.visible = true;
  badge.scale.set(0);
  // Intensify column glow during reveal
  if (badge._reel != null) intensifyWildGlow(badge._reel);
  const _origDone = done;
  done = () => { if (badge._reel != null) settleWildGlow(badge._reel); _origDone(); };
  const btxt = badge.getChildByName('btxt');
  const vals = [2, 3, 5, 10, 20, 50, 100];

  const isHigh = mult >= 50;
  const isMid  = mult >= 10 && mult < 50;
  const baseDur = isHigh ? 90 : isMid ? 55 : 30;
  const spinDur = turboMode === 2 ? Math.ceil(baseDur / 4) : turboMode === 1 ? Math.ceil(baseDur / 2) : baseDur;

  let bt = 0;
  const popFn = (d) => {
    bt += d;
    const bp = Math.min(bt / (14 / _tSpd()), 1);
    const ease = bp < 0.5 ? 1.5 * Math.pow(bp / 0.5, 2) : 1.5 - 0.5 * ((bp - 0.5) / 0.5);
    badge.scale.set(ease);
    if (isHigh) badge.alpha = 0.6 + 0.4 * bp;
    if (bp >= 1) {
      badge.scale.set(1); badge.alpha = 1;
      app.ticker.remove(popFn);
      if (mult >= 2 && btxt) startSpinner(); else done();
    }
  };
  app.ticker.add(popFn);

  function startSpinner() {
    btxt.visible = true;
    let st = 0, lastChange = 0, shakeT = 0;
    const sFn = (sd) => {
      if (_spinGen !== gen) { app.ticker.remove(sFn); return; }
      st += sd;
      const progress = Math.min(st / spinDur, 1);

      if (progress < 1) {
        const interval = 1 + Math.floor(6 * Math.pow(progress, 2.5));
        if (st - lastChange >= interval) {
          lastChange = st;
          const rv = vals[Math.floor(Math.random() * vals.length)];
          btxt.text = `${rv}×`;
          if (badge._applyTier) badge._applyTier(rv);
          const pulse = 1 + 0.08 * (1 - progress);
          badge.scale.set(pulse);
        }
        if (badge.scale.x > 1) badge.scale.set(Math.max(1, badge.scale.x - 0.005 * sd));
        if (isHigh && progress > 0.7) {
          shakeT += sd;
          const shakeAmt = 2 * (1 - progress) / 0.3;
          badge.x = badge._origX + (Math.random() - 0.5) * shakeAmt;
        }
      } else {
        app.ticker.remove(sFn);
        btxt.text = `${mult}×`;
        if (badge._applyTier) badge._applyTier(mult);
        if (badge._origX !== undefined) badge.x = badge._origX;

        const bx = badge.x, by = badge.y;
        const sparkCount = isHigh ? 18 : isMid ? 10 : 5;
        const sparkColors = [0xffd700, 0xff69b4, 0x00ffcc, 0xffffff, 0xff4444];
        for (let i = 0; i < sparkCount; i++) {
          const sp = new PIXI.Graphics();
          const sc = sparkColors[Math.floor(Math.random() * sparkColors.length)];
          sp.beginFill(sc, 0.9);
          const sz = 2 + Math.random() * 3;
          sp.drawCircle(0, 0, sz); sp.endFill();
          sp.x = bx; sp.y = by;
          const angle = (Math.PI * 2 / sparkCount) * i + (Math.random() - 0.5) * 0.5;
          const speed = 1.5 + Math.random() * 3;
          sp._vx = Math.cos(angle) * speed;
          sp._vy = Math.sin(angle) * speed;
          sp._life = 0;
          layerFX.addChild(sp);
          const pFn = (pd) => {
            sp._life += pd;
            sp.x += sp._vx * pd; sp.y += sp._vy * pd;
            sp.alpha = Math.max(0, 1 - sp._life / 20);
            sp.scale.set(Math.max(0.1, 1 - sp._life / 25));
            if (sp._life > 20) { app.ticker.remove(pFn); layerFX.removeChild(sp); sp.destroy(); }
          };
          app.ticker.add(pFn);
        }

        const flashAlpha = isHigh ? 0.5 : isMid ? 0.3 : 0.15;
        const flash = new PIXI.Graphics();
        flash.beginFill(0xffd700, flashAlpha);
        flash.drawCircle(bx, by, isHigh ? 80 : 50);
        flash.endFill();
        layerFX.addChild(flash);
        let flashT = 0;
        const flashFn = (fd) => {
          flashT += fd;
          flash.alpha = flashAlpha * Math.max(0, 1 - flashT / 12);
          if (flashT > 12) { app.ticker.remove(flashFn); layerFX.removeChild(flash); flash.destroy(); }
        };
        app.ticker.add(flashFn);

        let ft = 0;
        const bounceMag = isHigh ? 0.45 : isMid ? 0.3 : 0.2;
        const fFn = (fd) => {
          ft += fd;
          const fp = Math.min(ft / (10 / _tSpd()), 1);
          const fs = fp < 0.25
            ? 1 + bounceMag * (fp / 0.25)
            : (1 + bounceMag) - bounceMag * ((fp - 0.25) / 0.75);
          badge.scale.set(fs);
          if (fp >= 1) { badge.scale.set(1); app.ticker.remove(fFn); done(); }
        };
        app.ticker.add(fFn);
      }
    };
    badge._origX = badge.x;
    app.ticker.add(sFn);
  }
}

function expandWilds(list, done, gen) {
  // ALWAYS play wild expand at normal speed — even in turbo/fast mode
  // This is the highlight moment and should never be rushed
  const _tSpd = 1;
  let idx = 0;
  function next() {
    // Abort if a new spin started while we were waiting
    if (_spinGen !== gen) return;
    if (idx >= list.length) { done(); return; }
    const {reel, row, mult} = list[idx++];
    wildReels.push({reel, mult});
    playSound('wild_land');
    playSound('wild_expand');
    if (mult > 1) playSound('multiplier_hit');
    // Hide underlying reel sprites so nothing peeks through the wild overlay
    if (reelSprites[reel]) {
      reelSprites[reel].forEach(sp => { sp.visible = false; });
    }

    const ov = wildOverlays[reel];
    const badge = ov._badge;
    if (badge) {
      const btxt = badge.getChildByName('btxt');
      if (mult >= 2) {
        btxt.text = `${mult}×`;
        btxt.visible = true;
      } else {
        btxt.visible = false;
      }
      if (badge._applyTier) badge._applyTier(mult >= 2 ? mult : 2);
      badge._showBadge = true;
    }

    // Show the separate border graphic
    const brd = layerWild.getChildByName('brd_' + reel);
    if (brd) brd.visible = true;

    // Squash-stretch the landing wild tile for haptic impact feel
    {
      const sprites = reelSprites[reel];
      const landingSp = sprites.find(s => Math.abs(s.y - row * CELL) < 4);
      if (landingSp) {
        let sqt = 0, sqFn;
        sqFn = (dt) => {
          sqt += dt;
          const p = Math.min(sqt / (9 / _tSpd), 1);
          // Phase 0-0.4: squash to 80%  |  Phase 0.4-1.0: spring back to 100%
          const sy = p < 0.4
            ? 1 - 0.2 * (p / 0.4)
            : 0.8 + 0.2 * Math.pow((p - 0.4) / 0.6, 0.5);
          landingSp.height = SYM_SIZE * sy;
          landingSp.y     = row * CELL + (SYM_SIZE - landingSp.height) / 2;
          if (p >= 1) {
            landingSp.height = SYM_SIZE;
            landingSp.y     = row * CELL;
            app.ticker.remove(sqFn);
          }
        };
        app.ticker.add(sqFn);
      }
    }

    // Gold flash on the landing cell
    const cellX = GRID_X + reel * CELL;
    const cellY = GRID_Y + row * CELL;
    const flash = new PIXI.Graphics();
    flash.beginFill(0xffd700, 0.9);
    flash.drawRoundedRect(cellX - 2, cellY - 2, SYM_SIZE + 4, SYM_SIZE + 4, 6);
    flash.endFill();
    layerFX.addChild(flash);

    // Reset overlay to normal position (no pivot trick — mask handles reveal now)
    ov.pivot.set(0, 0);
    ov.x = GRID_X + reel * CELL;
    ov.y = GRID_Y;
    ov.scale.set(1, 1);

    // Reveal mask: starts at just the landing row, expands upward+downward
    // This keeps the image at correct proportions — no scale distortion.
    const revealMask = new PIXI.Graphics();
    ov.addChild(revealMask);
    ov.mask = revealMask;
    ov.visible = true;
    // Hide badge — will pop in after video first loop
    if (badge) { badge.visible = false; badge.scale.set(0); }
    // Start video playback
    if (ov._vid) {
      ov._vid.currentTime = 0;
      ov._vid.playbackRate = 1;  // always normal speed for wild expand
      ov._vid.play().catch(()=>{});
    }

    // Light rays from reel center
    spawnLightRays(cellX + SYM_SIZE / 2, GRID_Y + GRID_H / 2);

    // Gold sparks from the landing cell
    spawnWildParticles(cellX + SYM_SIZE / 2, cellY + CELL / 2);

    const originY = row * CELL + CELL / 2;   // center of landing row in local coords

    let t = 0;
    let tickFn;
    tickFn = (edt) => {
      // Abort: new spin started while animation was in progress
      if (_spinGen !== gen) {
        layerFX.removeChild(flash);
        // Restore clip mask and remove the temporary revealMask from the container
        // so the overlay is in a clean state for the next expansion on this reel.
        ov.mask = ov.getChildAt(0);  // clipMask is always index 0
        if (ov.children.indexOf(revealMask) !== -1) ov.removeChild(revealMask);
        ov.visible = false;
        app.ticker.remove(tickFn);
        return;
      }

      t += edt;

      // Flash fades over first 12 frames
      flash.alpha = Math.max(0, 1 - t / (12 / _tSpd));
      if (t >= 12 / _tSpd) { layerFX.removeChild(flash); }

      // Reveal grows from originY outward — cubic ease-out
      const progress = Math.min(t / (28 / _tSpd), 1);
      const ease     = 1 - Math.pow(1 - progress, 3);
      const halfH    = ease * (GRID_H / 2 + CELL);
      const top      = Math.max(0, originY - halfH);
      const bottom   = Math.min(GRID_H, originY + halfH);

      revealMask.clear();
      revealMask.beginFill(0xffffff);
      revealMask.drawRect(0, top, SYM_SIZE, bottom - top);
      revealMask.endFill();

      if (progress >= 1) {
        // Full reveal — remove animation mask, clip mask takes over
        ov.mask   = ov.getChildAt(0);   // clipMask is always index 0
        ov.removeChild(revealMask);

        // Screen shake on wild landing impact
        screenShake(6, 20);

        // Brief full-reel white flash
        const impactFlash = new PIXI.Graphics();
        impactFlash.beginFill(0xffffff, 0.55);
        impactFlash.drawRect(GRID_X + reel * CELL, GRID_Y, SYM_SIZE, GRID_H);
        impactFlash.endFill();
        layerFX.addChild(impactFlash);
        let ft = 0, fFn;
        fFn = (fdt) => {
          ft += fdt;
          impactFlash.alpha = Math.max(0, 0.55 - ft * 0.06);
          if (ft >= 10) { layerFX.removeChild(impactFlash); impactFlash.destroy(); app.ticker.remove(fFn); }
        };
        app.ticker.add(fFn);

        // Start pulsing animated glow on this wild reel border
        startWildGlow(reel);

        app.ticker.remove(tickFn);

        // Badge pop — wait for video first loop, then show badge, THEN proceed to next reel
        const proceedToNext = () => {
          setTimeout(() => { if (_spinGen === gen) next(); }, 400);  // normal pace even in turbo
        };

        if (badge && ov._vid) {
          const vidEl = ov._vid;
          let badgeShown = false;
          const onEnded = () => {
            if (badgeShown) return;
            badgeShown = true;
            vidEl.removeEventListener('ended', onEnded);
            _runMultSpinner(badge, mult, gen, proceedToNext);
          };
          vidEl.addEventListener('ended', onEnded);
          setTimeout(() => {
            if (!badgeShown) {
              badgeShown = true;
              vidEl.removeEventListener('ended', onEnded);
              _runMultSpinner(badge, mult, gen, proceedToNext);
            }
          }, 4000);  // full duration even in turbo — wild expand is the highlight
        } else if (badge) {
          _runMultSpinner(badge, mult, gen, proceedToNext);
        } else {
          proceedToNext();
        }
      }
    };
    app.ticker.add(tickFn);
  }
  next();
}

// God rays / light burst from wild reel center
function spawnLightRays(cx, cy) {
  const RAYS = 14;
  const rays = [];
  for (let i = 0; i < RAYS; i++) {
    const angle = (i / RAYS) * Math.PI * 2;
    rays.push({ angle, len: 0.0 });
  }
  const g = new PIXI.Graphics();
  layerFX.addChild(g);

  let t = 0, rFn;
  rFn = (dt) => {
    t += dt;
    const progress = Math.min(t / 35, 1);
    const ease = progress < 0.5
      ? 4 * Math.pow(progress, 2)
      : 1 - Math.pow(-2 * progress + 2, 2) / 2;

    g.clear();
    const maxLen = GRID_H * 0.85;
    const maxW   = 22;

    rays.forEach((ray, i) => {
      const phase = Math.sin(t * 0.12 + i * 0.8) * 0.2 + 0.8;
      const len   = ease * maxLen * (0.6 + (i % 3) * 0.2) * phase;
      const w     = ease * maxW * (0.4 + (i % 2) * 0.3) * phase;
      const alpha = ease * 0.18 * phase * (1 - progress * 0.7);
      if (alpha < 0.01) return;

      g.beginFill(0xd4a017, alpha);
      const nx = Math.cos(ray.angle + Math.PI / 2);
      const ny = Math.sin(ray.angle + Math.PI / 2);
      const dx = Math.cos(ray.angle);
      const dy = Math.sin(ray.angle);
      g.drawPolygon([
        cx + nx * w / 2, cy + ny * w / 2,
        cx + dx * len,   cy + dy * len,
        cx - nx * w / 2, cy - ny * w / 2,
      ]);
      g.endFill();
    });

    if (t >= 50) { layerFX.removeChild(g); g.destroy(); app.ticker.remove(rFn); }
  };
  app.ticker.add(rFn);
}

// Gold sparks + coin burst from wild landing position
function spawnWildParticles(cx, cy) {
  const COUNT = 48;
  const particles = [];

  for (let i = 0; i < COUNT; i++) {
    const p = new PIXI.Graphics();

    // Colour: gold, deep gold, orange-red
    const roll = Math.random();
    const color = roll > 0.6 ? 0xffd700 : roll > 0.3 ? 0xd4a017 : 0xff5500;
    const alpha = 0.85 + Math.random() * 0.15;
    const sz = 2.5 + Math.random() * 4;

    p.beginFill(color, alpha);
    const shape = Math.random();
    if (shape > 0.65) {
      // Circle spark
      p.drawCircle(0, 0, sz);
    } else if (shape > 0.30) {
      // Diamond
      p.drawPolygon([-sz, 0, 0, -sz * 1.8, sz, 0, 0, sz * 1.8]);
    } else {
      // Small star / irregular pentagon
      const pts = [];
      for (let s = 0; s < 5; s++) {
        const a1 = (s / 5) * Math.PI * 2 - Math.PI / 2;
        const a2 = ((s + 0.5) / 5) * Math.PI * 2 - Math.PI / 2;
        pts.push(Math.cos(a1) * sz, Math.sin(a1) * sz);
        pts.push(Math.cos(a2) * sz * 0.45, Math.sin(a2) * sz * 0.45);
      }
      p.drawPolygon(pts);
    }
    p.endFill();
    p.x = cx; p.y = cy;

    // Motion: first 16 particles fountain straight up, rest radial
    let angle, speed;
    if (i < 16) {
      // Fountain: shoot upward with spread
      angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.4;
      speed = 8 + Math.random() * 14;
    } else {
      // Radial burst
      angle = (i / COUNT) * Math.PI * 2 + Math.random() * 0.5;
      speed = 3 + Math.random() * 10;
    }

    p._vx = Math.cos(angle) * speed;
    p._vy = Math.sin(angle) * speed;
    p._life = 0;
    p._max  = 40 + Math.random() * 30;
    p._spin = (Math.random() - 0.5) * 0.25;
    layerFX.addChild(p);
    particles.push(p);
  }

  let pFn;
  pFn = (pdt) => {
    let anyAlive = false;
    for (const p of particles) {
      p._life += pdt;
      if (p._life >= p._max) { p.visible = false; continue; }
      anyAlive = true;
      p.x     += p._vx * pdt;
      p.y     += p._vy * pdt;
      p._vy   += 0.4 * pdt;          // gravity
      p._vx   *= Math.pow(0.98, pdt); // air resistance
      p.alpha  = Math.pow(1 - p._life / p._max, 0.6); // slower fade
      p.rotation += p._spin * pdt;
    }
    if (!anyAlive) {
      for (const p of particles) { layerFX.removeChild(p); p.destroy(); }
      app.ticker.remove(pFn);
    }
  };
  app.ticker.add(pFn);
}

// ─────────────────────────────────────────────────────────────
//  IDLE WILD SPARKLE  (periodic ambient particles from sticky reels)
// ─────────────────────────────────────────────────────────────
{
  // Fires a small puff of 6-8 sparks from a random edge of each active wild reel
  const IDLE_INTERVAL = 140; // frames between puffs
  let idleTick = 0;

  app.ticker.add((dt) => {
    idleTick += dt;
    if (idleTick < IDLE_INTERVAL) return;
    idleTick = 0;

    wildReels.forEach(({ reel }) => {
      if (!wildOverlays[reel].visible) return;
      const cx = GRID_X + reel * CELL + SYM_SIZE / 2;
      // Emit from top or bottom edge randomly
      const ey = Math.random() > 0.5 ? GRID_Y : GRID_Y + GRID_H;
      const ex = GRID_X + reel * CELL + Math.random() * SYM_SIZE;

      for (let i = 0; i < 7; i++) {
        const p = new PIXI.Graphics();
        const isGold = Math.random() > 0.35;
        p.beginFill(isGold ? 0xffd700 : 0xd4a017, 0.85);
        const sz = 1 + Math.random() * 2.5;
        p.drawCircle(0, 0, sz);
        p.endFill();
        p.x = ex + (Math.random() - 0.5) * 30;
        p.y = ey;
        const upward = ey <= GRID_Y;
        const baseVY = upward ? -(2 + Math.random() * 3) : (2 + Math.random() * 3);
        p._vx = (Math.random() - 0.5) * 3;
        p._vy = baseVY;
        p._life = 0; p._max = 30 + Math.random() * 20;
        layerFX.addChild(p);

        let iFn;
        iFn = (idt) => {
          p._life += idt;
          if (p._life >= p._max) { layerFX.removeChild(p); p.destroy(); app.ticker.remove(iFn); return; }
          p.x += p._vx * idt; p.y += p._vy * idt;
          p._vy += (upward ? 0.15 : -0.15) * idt;
          p.alpha = 1 - p._life / p._max;
        };
        app.ticker.add(iFn);
      }
    });
  });
}

// Number of permanent children added to each wildOverlay container at setup time.
// Any children beyond this count are stale revealMask objects left by aborted animations.
const WILD_OVERLAY_BASE_CHILDREN = 3; // clipMask, sh (video sprite), badge

function resetOverlays() {
  wildOverlays.forEach((o, r) => {
    o.visible = false;
    // Restore reel sprites that were hidden during wild expansion
    if (reelSprites[r]) {
      reelSprites[r].forEach(sp => { sp.visible = true; });
    }
    // Pause video and reset badge for next use
    if (o._vid) { o._vid.pause(); o._vid.currentTime = 0; }
    const bdg = o._badge;
    if (bdg) { bdg.visible = false; bdg.scale.set(1); }
    o.scale.set(1, 1);
    o.pivot.set(0, 0);
    o.x = GRID_X + r * CELL;
    o.y = GRID_Y;

    // Remove any stale revealMask children left by aborted expansion animations
    while (o.children.length > WILD_OVERLAY_BASE_CHILDREN) {
      o.removeChildAt(o.children.length - 1);
    }
    // Restore clip mask (index 0) in case it was replaced mid-animation
    o.mask = o.getChildAt(0);

    // Hide static border
    const brd = layerWild.getChildByName('brd_' + r);
    if (brd) { brd.visible = false; brd.alpha = 1; }

    // Cancel pulsing glow + hide bloom border + glow container
    if (wildGlowFns[r]) { app.ticker.remove(wildGlowFns[r]); wildGlowFns[r] = null; }
    const brd2 = layerWild.getChildByName('brd2_' + r);
    if (brd2) brd2.visible = false;
    const gc = wildGlowContainers[r];
    if (gc) { gc.removeChildren(); gc.visible = false; gc._intense = false; }
  });
}

async function endFS() {
  const totalWin = roundWin;
  inFS = false;
  _buyBonusSuper = false;
  _fsPreGenerated = false;
  const _bgImgEnd = document.getElementById('bgImg');
  if (_bgImgEnd) _bgImgEnd.src = 'assets/bg_base.png';
  _simMode = 'base'; // reset to base mode after FS
  // Keep wildReels and overlays visible until next spin starts.
  // startSpin() already clears them: wildReels=[]; resetOverlays();
  clearGameState();
  stopSound('free_spins_music');
  if (totalWin > 0) playSound('total_win');
  if (!IS_REPLAY) await RGS.endRound().catch(e=>console.warn('end-round failed',e));

  // Replay mode: show replay outro instead of normal FS outro
  if (IS_REPLAY) {
    const fsTier = totalWin > 0 ? getWinTier(totalWin) : null;
    const showOutro = () => {
      showReplayOutro(totalWin, () => {
        // "Replay Again" — restart the same replay
        roundWin = 0; wildReels = []; resetOverlays();
        showReplayIntro(_replayData, () => startReplayPlayback());
      });
    };
    if (fsTier) { showWinCelebration(totalWin, showOutro); } else { showOutro(); }
    return;
  }

  // Show win celebration for total FS win, then the outro screen
  const fsTier = totalWin > 0 ? getWinTier(totalWin) : null;
  if (fsTier) {
    showWinCelebration(totalWin, () => {
      showFSOutro(totalWin, () => { playSound('base_game_music'); updateUI(); _showSideUI(); });
    });
  } else {
    showFSOutro(totalWin, () => { playSound('base_game_music'); updateUI(); _showSideUI(); });
  }
}

let activeOverlay = null;


function _makeFSScreen(topText, scrollLines, bottomText, cb, panelType) {
  if (activeOverlay) {
    if (activeOverlay._dim) { app.stage.removeChild(activeOverlay._dim); activeOverlay._dim.destroy(); }
    if (activeOverlay._htmlDim && activeOverlay._htmlDim.parentNode) activeOverlay._htmlDim.remove();
    app.stage.removeChild(activeOverlay);
    activeOverlay.destroy({ children: true });
    app.view.style.zIndex = '2';
    activeOverlay = null;
  }

  // No dim overlay — candy world stays fully visible
  const c = new PIXI.Container();
  activeOverlay = c;
  c._dim = null;

  // ── Detect epic win (50x+ bet) for enhanced treatment ──
  let isEpic = false;
  scrollLines.forEach(({ countUp }) => {
    if (countUp != null && countUp > 0 && bet > 0 && countUp / bet >= 50) isEpic = true;
  });

  // ── Confetti / sugar sparkle burst (intro only, skip for outro) ──
  const confetti = [];
  if (panelType !== 'outro') {
    const CONFETTI = 80;
    const CONFETTI_COLORS = [0xffd700, 0xff69b4, 0x00ffcc, 0xff6600, 0xffffff, 0x9b59b6, 0xff1493, 0x44ff88];
    for (let i = 0; i < CONFETTI; i++) {
      const g = new PIXI.Graphics();
      const col = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      const sz = 2 + Math.random() * 4;
      g.beginFill(col, 0.8 + Math.random() * 0.2);
      if (Math.random() < 0.5) g.drawCircle(0, 0, sz);
      else g.drawRect(-sz, -sz * 0.4, sz * 2, sz * 0.8);
      g.endFill();
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 5;
      g.x = BASE_W / 2;
      g.y = BASE_H / 2;
      g._vx = Math.cos(angle) * speed;
      g._vy = Math.sin(angle) * speed - 1.5;
      g._gravity = 0.04 + Math.random() * 0.03;
      g._rotSpd = (Math.random() - 0.5) * 0.3;
      g._life = 1.0;
      confetti.push(g);
      c.addChild(g);
    }
  }

  // ── AI-generated candy panel sprite ──
  const PW = 720, PH = 400;
  const px = (BASE_W - PW) / 2, py = (BASE_H - PH) / 2 - 10;

  const panelAsset = panelType === 'outro' ? 'fs_outro_panel' : 'fs_intro_panel';
  const panelTex = PIXI.Texture.from(assetMap[panelAsset] || assetMap['fs_intro_panel']);
  const panel = new PIXI.Sprite(panelTex);
  panel.x = px; panel.y = py;
  panel.width = PW; panel.height = PH;

  // Epic win: golden tint + extra glow (intro only)
  if (isEpic && panelType !== 'outro') {
    panel.tint = 0xffeebb;
    const epicGlow = new PIXI.Graphics();
    epicGlow.beginFill(0xffd700, 0.1);
    epicGlow.drawRoundedRect(px - 15, py - 15, PW + 30, PH + 30, 25);
    epicGlow.endFill();
    c.addChild(epicGlow);
  }

  c.addChild(panel);

  // ── Only dynamic values are code-rendered — all static text is baked into the panel image ──
  const _countUpTexts = [];

  scrollLines.forEach(({ text, size, color, yo, spacing, countUp }) => {
    // Only render the BIG dynamic number (spin count or win amount) — skip baked text
    const isMainNum = size >= 60;
    if (!isMainNum) return; // "YOU HAVE WON", "FREE SPINS", "TOTAL WIN", "CONGRATULATIONS!" are baked in

    const actualSize = isMainNum ? size + 10 : size;
    const t = new PIXI.Text(text, {
      fontFamily: 'Cherry Bomb One, Fredoka, sans-serif', fontSize: actualSize, fontWeight: 'bold',
      fill: isEpic ? [0xffd700, 0xff8800, 0xffd700] : [0xffffff, 0xfff4d0],
      fillGradientStops: [0, 0.5, 1],
      letterSpacing: spacing || 0,
      stroke: 0x3a1500, strokeThickness: 4,
    });
    t.anchor.set(0.5); t.x = BASE_W / 2; t.y = BASE_H / 2 + 10 + yo;
    c.addChild(t);
    if (countUp != null && countUp > 0) _countUpTexts.push({ txt: t, target: countUp, current: 0 });
  });

  // ── "PRESS ANYWHERE TO CONTINUE" — still code-rendered as it's a prompt, subtle ──
  const tBot = new PIXI.Text(bottomText, {
    fontFamily: 'Fredoka, Arial', fontSize: 13, fontWeight: 'bold',
    fill: 0xfff0dd, letterSpacing: 4,
    dropShadow: true, dropShadowColor: 0x000000, dropShadowBlur: 6, dropShadowDistance: 1,
  });
  tBot.anchor.set(0.5); tBot.x = BASE_W / 2; tBot.y = py + PH - 40;
  c.addChild(tBot);

  // ── Animations ──
  let pt = 0;
  const pulseFn = (dt) => {
    pt += dt;
    // Pulse bottom text
    tBot.alpha = 0.5 + Math.sin(pt * 0.1) * 0.5;
    // Epic: panel glow pulses (intro only)
    if (isEpic && panelType !== 'outro') {
      panel.alpha = 0.92 + Math.sin(pt * 0.1) * 0.08;
    }
    // Count-up animation for win amounts
    _countUpTexts.forEach(cu => {
      if (cu.current < cu.target) {
        const speed = Math.max(0.01, cu.target * 0.02);
        cu.current = Math.min(cu.target, cu.current + speed * dt);
        cu.txt.text = formatMoney(Math.round(cu.current * 100) / 100);
        cu.txt.scale.set(1 + 0.03 * Math.sin(pt * 0.2));
      }
    });
    // Confetti physics
    confetti.forEach(p => {
      p.x += p._vx;
      p.y += p._vy;
      p._vy += p._gravity;
      p._vx *= 0.995;
      p.rotation += p._rotSpd;
      p._life -= 0.006;
      p.alpha = Math.max(0, p._life);
    });
  };
  app.ticker.add(pulseFn);

  // ── Animate in ──
  let _fsPS = 1.0;
  if (window.innerHeight > window.innerWidth * 1.2) _fsPS = 0.65;
  app.stage.addChild(c);
  c.alpha = 0; c.scale.set(0.85 * _fsPS);
  if (_fsPS < 1) { c.pivot.set(BASE_W / 2, BASE_H / 2); c.x = BASE_W / 2; c.y = BASE_H / 2; }
  let ticks = 0, inFn;
  inFn = (dt) => {
    ticks += dt;
    const p = Math.min(ticks / 14, 1);
    c.alpha = p;
    // Elastic ease out for pop effect
    const elastic = p < 1 ? 1 - Math.pow(1 - p, 3) * Math.cos(p * Math.PI * 1.5) : 1;
    c.scale.set(Math.min(elastic, 1.02) * _fsPS);
    if (ticks >= 14) { c.scale.set(1.0 * _fsPS); app.ticker.remove(inFn); }
  };
  app.ticker.add(inFn);

  // Click anywhere to dismiss
  c.interactive = true;
  c.hitArea = new PIXI.Rectangle(0, 0, BASE_W, BASE_H);
  _lockGameUI();
  c.on('pointerdown', () => {
    app.ticker.remove(inFn);
    app.ticker.remove(pulseFn);
    app.stage.removeChild(c);
    c.destroy({ children: true });
    activeOverlay = null;
    _unlockGameUI();
    if (cb) cb();
  });
}

// ─────────────────────────────────────────────────────────────
//  REPLAY MODE — Playback of historical rounds
// ─────────────────────────────────────────────────────────────
async function fetchReplayData() {
  const mode = (REPLAY_MODE || 'base').toUpperCase();
  const betAmt = REPLAY_AMOUNT ? fromRGS(parseInt(REPLAY_AMOUNT, 10)) : bet;
  const eventId = REPLAY_EVENT_ID || '0';

  // Fetch round data from /bet/replay/{game}/{version}/{mode}/{event}
  const replayUrl = RGS_URL + '/bet/replay/' + REPLAY_GAME + '/' + REPLAY_VERSION + '/' + mode + '/' + eventId;

  try {
    const resp = await fetch(replayUrl);
    if (!resp.ok) {
      const errText = await resp.text();
      console.error('[REPLAY] /bet/replay failed:', resp.status, errText);
      return null;
    }
    const data = await resp.json();

    const payout = data.payoutMultiplier || 0;
    const processed = processBookEntry({
      events: data.state || [],
      payoutMultiplier: Math.round(payout * 100)
    });
    const finalPayout = payout || processed.totalPayout;

    return { spins: processed.spins, totalPayout: finalPayout,
             mode: REPLAY_MODE || 'base', bet: betAmt,
             totalWin: finalPayout * betAmt,
             payoutMultiplier: finalPayout };
  } catch(e) {
    console.error('[REPLAY] Failed to fetch replay:', e);
    return null;
  }
}

// ─────────────────────────────────────────────────────────────
//  SCATTER ANTICIPATION  (pulsing glow on reel while it baits)
// ─────────────────────────────────────────────────────────────
function startAnticipation(reel) {
  playSound('anticipation_build');
  // Duck music volume for tension
  const musicKey = inFS ? 'free_spins_music' : 'base_game_music';
  const origVol = SFX[musicKey] ? SFX[musicKey].volume : 0.3;
  if (SFX[musicKey]) SFX[musicKey].volume = origVol * 0.3;

  const x = GRID_X + reel * CELL;
  const reelCX = x + SYM_SIZE / 2;
  const reelCY = GRID_Y + GRID_H / 2;

  // Dim other reels — full CELL width per reel, full GRID_H height, no gaps
  const dim = new PIXI.Graphics();
  dim.beginFill(0x000000, 0.55);
  for (let r = 0; r < REELS; r++) {
    if (r !== reel) dim.drawRect(GRID_X + r * CELL, GRID_Y, CELL, GRID_H);
  }
  dim.endFill();
  layerFX.addChild(dim);

  // Soft gold glow behind anticipation reel
  const glow = new PIXI.Sprite(PIXI.Texture.from('assets/glow_soft.png'));
  glow.anchor.set(0.5);
  glow.x = x + SYM_SIZE / 2;
  glow.y = GRID_Y + GRID_H / 2;
  glow.width = SYM_SIZE + 40;
  glow.height = GRID_H + 40;
  glow.tint = 0xffd700;
  glow.blendMode = PIXI.BLEND_MODES.ADD;
  glow.alpha = 0.2;
  layerFX.addChild(glow);

  // Energy particles flowing from landed scatter positions toward reel 4
  const energyParticles = [];
  // Find landed scatters on reels 0 and 2 to spawn energy from their positions
  const scatterSources = [];
  for (let sr = 0; sr < REELS; sr++) {
    if (sr === reel) continue;
    for (let row = 0; row < ROWS; row++) {
      if (lastBoard[sr] && lastBoard[sr][row] === SCATTER) {
        scatterSources.push({
          x: GRID_X + sr * CELL + SYM_SIZE / 2,
          y: GRID_Y + row * CELL + SYM_SIZE / 2
        });
      }
    }
  }

  for (let i = 0; i < 20; i++) {
    const ep = new PIXI.Graphics();
    const sz = 1.5 + Math.random() * 2.5;
    ep.beginFill(Math.random() < 0.5 ? 0xffd700 : 0xff69b4, 0.9);
    ep.drawCircle(0, 0, sz);
    ep.endFill();
    // Start from a random scatter source or random grid position
    const src = scatterSources.length > 0
      ? scatterSources[Math.floor(Math.random() * scatterSources.length)]
      : { x: GRID_X + Math.random() * GRID_W, y: GRID_Y + Math.random() * GRID_H };
    ep.x = src.x + (Math.random() - 0.5) * 30;
    ep.y = src.y + (Math.random() - 0.5) * 30;
    ep._srcX = ep.x; ep._srcY = ep.y;
    ep._targetX = reelCX + (Math.random() - 0.5) * SYM_SIZE * 0.6;
    ep._targetY = GRID_Y + Math.random() * GRID_H;
    ep._speed = 0.005 + Math.random() * 0.01;
    ep._progress = Math.random() * 0.3; // stagger
    ep._phase = Math.random() * Math.PI * 2;
    layerFX.addChild(ep);
    energyParticles.push(ep);
  }

  // Floating sparks on the reel (upward drift)
  const sparks = [];
  for (let i = 0; i < 16; i++) {
    const s = new PIXI.Graphics();
    const sz = 1 + Math.random() * 2;
    s.beginFill(Math.random() < 0.5 ? 0xffd700 : 0xffcc00, 0.8);
    s.drawCircle(0, 0, sz);
    s.endFill();
    s.x = x + Math.random() * SYM_SIZE;
    s.y = GRID_Y + Math.random() * GRID_H;
    s._baseX = s.x;
    s._speed = 0.4 + Math.random() * 0.8;
    s._phase = Math.random() * Math.PI * 2;
    layerFX.addChild(s);
    sparks.push(s);
  }

  let t = 0;
  let phase = 1; // 1=build, 2=peak, 3=resolve (on reel stop)
  const PEAK_TIME = 60; // frames before transitioning to peak intensity

  const antFn = (adt) => {
    t += adt;

    // Reel stopped — resolve phase
    if (!reelState[reel].spinning) {
      // Check if scatter actually landed
      const hasScatter = lastBoard[reel] && lastBoard[reel].includes(SCATTER);
      if (hasScatter) {
        playSound('anticipation_hit');
        screenShake(5, 12);
      } else {
        playSound('anticipation_miss');
      }

      // Restore music volume
      if (SFX[musicKey]) SFX[musicKey].volume = origVol;

      // Quick fade out
      let fadeT = 0;
      const fadeFn = (fdt) => {
        fadeT += fdt;
        const fp = Math.min(fadeT / 10, 1);
        dim.alpha = 1 - fp;
        glow.alpha = 1 - fp;
        sparks.forEach(s => { s.alpha = (1 - fp) * 0.5; });
        energyParticles.forEach(ep => { ep.alpha = (1 - fp) * 0.5; });

        if (fadeT >= 10) {
          app.ticker.remove(fadeFn);
          [dim, glow, ...sparks, ...energyParticles].forEach(o => {
            if (o.parent) o.parent.removeChild(o);
            if (!o.destroyed) o.destroy();
          });
        }
      };
      app.ticker.remove(antFn);
      app.ticker.add(fadeFn);
      return;
    }

    // Phase transition: build → peak
    if (phase === 1 && t > PEAK_TIME) phase = 2;

    // Gentle pulse — frequency increases in peak phase
    const hbFreq = phase === 1 ? 0.08 : 0.14;
    const heartbeat = 0.5 + 0.5 * Math.pow(Math.sin(t * hbFreq), 2);
    const intensity = phase === 1 ? 0.5 + (t / PEAK_TIME) * 0.3 : 0.8 + Math.sin(t * 0.05) * 0.15;

    // Soft glow pulse behind reel
    glow.alpha = (0.15 + heartbeat * 0.2) * intensity;
    glow.width = SYM_SIZE + 30 + heartbeat * 20;
    glow.height = GRID_H + 30 + heartbeat * 20;

    // Energy particles flow toward the reel
    energyParticles.forEach(ep => {
      ep._progress += ep._speed * (phase === 2 ? 1.5 : 1);
      if (ep._progress > 1) {
        // Reset: pick new source
        const src = scatterSources.length > 0
          ? scatterSources[Math.floor(Math.random() * scatterSources.length)]
          : { x: GRID_X + Math.random() * GRID_W, y: GRID_Y + Math.random() * GRID_H };
        ep._srcX = src.x + (Math.random() - 0.5) * 40;
        ep._srcY = src.y + (Math.random() - 0.5) * 40;
        ep._targetX = reelCX + (Math.random() - 0.5) * SYM_SIZE * 0.6;
        ep._targetY = GRID_Y + Math.random() * GRID_H;
        ep._progress = 0;
      }
      const pp = ep._progress;
      // Curved path with sine wave wobble
      ep.x = ep._srcX + (ep._targetX - ep._srcX) * pp + Math.sin(pp * Math.PI * 2 + ep._phase) * 15;
      ep.y = ep._srcY + (ep._targetY - ep._srcY) * pp;
      ep.alpha = Math.sin(pp * Math.PI) * 0.8;
    });

    // Floating sparks drift upward with shimmer
    sparks.forEach(s => {
      s.y -= s._speed * (phase === 2 ? 1.3 : 1);
      s.x = s._baseX + Math.sin(t * 0.1 + s._phase) * 8;
      s.alpha = (0.3 + Math.sin(t * 0.15 + s._phase) * 0.4) * intensity;
      if (s.y < GRID_Y - 10) {
        s.y = GRID_Y + GRID_H + 5;
        s._baseX = x + Math.random() * SYM_SIZE;
      }
    });

  };
  app.ticker.add(antFn);
}

// ─────────────────────────────────────────────────────────────
//  SCREEN SHAKE  (stage-level camera effect)
// ─────────────────────────────────────────────────────────────
let _activeShakeFn = null;
function screenShake(intensity, duration) {
  // Cancel any existing shake before starting a new one
  if (_activeShakeFn) { app.ticker.remove(_activeShakeFn); app.stage.x = 0; app.stage.y = 0; }
  const dur = turboMode ? Math.max(duration * 0.4, 4) : duration;
  let t = 0;
  _activeShakeFn = (dt) => {
    t += dt;
    if (t >= dur) {
      app.stage.x = 0;
      app.stage.y = 0;
      app.ticker.remove(_activeShakeFn);
      _activeShakeFn = null;
      return;
    }
    const decay = Math.pow(1 - t / dur, 2);
    app.stage.x = (Math.random() * 2 - 1) * intensity * decay;
    app.stage.y = (Math.random() * 2 - 1) * intensity * decay * 0.5;
  };
  app.ticker.add(_activeShakeFn);
}

// ─────────────────────────────────────────────────────────────
//  ANIMATED WILD BORDER GLOW  (running light around perimeter)
// ─────────────────────────────────────────────────────────────
// Track per-reel glow animations so resetOverlays can cancel them
const wildGlowFns = new Array(5).fill(null);
const wildGlowContainers = new Array(5).fill(null);

// Intensify/settle the column glow during multiplier reveals
function intensifyWildGlow(r) {
  const gc = wildGlowContainers[r];
  if (gc) gc._intense = true;
}
function settleWildGlow(r) {
  const gc = wildGlowContainers[r];
  if (gc) gc._intense = false;
}

function startWildGlow(r) {
  if (wildGlowFns[r]) { app.ticker.remove(wildGlowFns[r]); wildGlowFns[r] = null; }

  const brd = layerWild.getChildByName('brd_' + r);
  if (!brd) return;

  // Reuse or create glow container
  let gc = wildGlowContainers[r];
  if (!gc) {
    gc = new PIXI.Container();
    gc.name = 'glow_' + r;
    layerWild.addChild(gc);
    wildGlowContainers[r] = gc;
  }
  gc.removeChildren();
  gc.visible = true;
  gc._intense = false;

  const rx = GRID_X + r * CELL;
  const ry = GRID_Y;
  const RW = SYM_SIZE;
  const RH = GRID_H;
  const phaseOff = r * 1.7; // independent phase offset per reel

  // — 5. Cell tint overlay (warm gold) —
  const tintGfx = new PIXI.Graphics();
  tintGfx.beginFill(0xffa500, 0.12);
  tintGfx.drawRoundedRect(rx, ry, RW, RH, 4);
  tintGfx.endFill();
  gc.addChild(tintGfx);

  // — 1. Flowing energy column (drawn each frame) —
  const energyGfx = new PIXI.Graphics();
  gc.addChild(energyGfx);

  // — 2. Side borders (drawn each frame) —
  const borderGfx = new PIXI.Graphics();
  gc.addChild(borderGfx);

  // — 4. Top/bottom caps (drawn each frame) —
  const capGfx = new PIXI.Graphics();
  gc.addChild(capGfx);

  // — 3. Particles —
  const particles = [];
  const MAX_P = 18;
  const ENERGY_COLORS = [0xff6600, 0xff1493, 0x9b59b6, 0x00bcd4];
  const SPARK_COLORS  = [0xffd700, 0xff69b4, 0x00ffcc, 0xffffff, 0xffaa44];

  // Also update brd2 bloom
  let brd2 = layerWild.getChildByName('brd2_' + r);
  if (!brd2) {
    brd2 = new PIXI.Graphics();
    brd2.name = 'brd2_' + r;
    layerWild.addChild(brd2);
  }
  brd2.visible = true;

  let gt = 0;

  const fn = (dt) => {
    if (!brd.visible) {
      gc.visible = false;
      brd2.visible = false;
      app.ticker.remove(fn);
      wildGlowFns[r] = null;
      return;
    }
    gt += dt;
    const t  = gt * 0.016 + phaseOff; // ~seconds with phase offset
    const im = gc._intense ? 1.6 : 1.0; // intensity multiplier
    const imSpeed = gc._intense ? 2.5 : 1.0;

    // ── Energy column: flowing candy gradient bands ──
    energyGfx.clear();
    const bandCount = 10;
    const bandH = RH / bandCount;
    const flowSpeed = 1.2 * imSpeed; // px per frame
    for (let i = 0; i < bandCount + 3; i++) {
      const rawY = (i * bandH - (gt * flowSpeed) % bandH);
      const yPos = ((rawY % RH) + RH) % RH;
      const ci   = Math.floor((i + gt * 0.025) % ENERGY_COLORS.length);
      // Fade edges: softer at top and bottom of column
      const edgeFade = Math.min(yPos / (bandH * 2), (RH - yPos) / (bandH * 2), 1);
      const alpha = (0.05 + 0.04 * Math.sin(t * 2.5 + i * 0.9)) * im * edgeFade;
      if (alpha < 0.01) continue;
      energyGfx.beginFill(ENERGY_COLORS[ci], alpha);
      energyGfx.drawRect(rx + 3, ry + yPos, RW - 6, bandH * 0.65);
      energyGfx.endFill();
      // Secondary shifted band for richness
      const ci2 = (ci + 2) % ENERGY_COLORS.length;
      const alpha2 = alpha * 0.4;
      energyGfx.beginFill(ENERGY_COLORS[ci2], alpha2);
      energyGfx.drawRect(rx + 8, ry + yPos + bandH * 0.3, RW - 16, bandH * 0.35);
      energyGfx.endFill();
    }

    // ── Side borders: gold gradient with soft outer glow + pulse ──
    borderGfx.clear();
    const bPulse = 0.5 + 0.5 * Math.sin(t * 1.3);
    const bAlpha = (0.35 + 0.3 * bPulse) * im;
    const bWidth = 1.5 + bPulse * 1.0;
    const gWidth = 5 + 4 * bPulse * im;

    // Outer glow (wide, faint)
    borderGfx.lineStyle(gWidth, 0xffd700, bAlpha * 0.2);
    borderGfx.moveTo(rx - 1, ry); borderGfx.lineTo(rx - 1, ry + RH);
    borderGfx.moveTo(rx + RW + 1, ry); borderGfx.lineTo(rx + RW + 1, ry + RH);
    // Mid glow
    borderGfx.lineStyle(gWidth * 0.5, 0xffaa00, bAlpha * 0.4);
    borderGfx.moveTo(rx, ry); borderGfx.lineTo(rx, ry + RH);
    borderGfx.moveTo(rx + RW, ry); borderGfx.lineTo(rx + RW, ry + RH);
    // Core border (sharp gold)
    borderGfx.lineStyle(bWidth, 0xffd700, bAlpha * 1.2);
    borderGfx.moveTo(rx, ry); borderGfx.lineTo(rx, ry + RH);
    borderGfx.moveTo(rx + RW, ry); borderGfx.lineTo(rx + RW, ry + RH);

    // ── Outer bloom (pulsing candy glow around the entire column) ──
    const bloomPulse = 0.5 + 0.5 * Math.sin(t * 0.8);
    brd2.clear();
    brd2.lineStyle(4 + bloomPulse * 5, 0xff6600, (0.06 + bloomPulse * 0.08) * im);
    brd2.drawRoundedRect(rx - 6, ry - 6, RW + 12, RH + 12, 8);
    brd2.lineStyle(2 + bloomPulse * 3, 0xff1493, (0.04 + bloomPulse * 0.06) * im);
    brd2.drawRoundedRect(rx - 3, ry - 3, RW + 6, RH + 6, 6);

    // ── Top and bottom caps: contained energy burst ──
    capGfx.clear();
    const capPulse = 0.5 + 0.5 * Math.sin(t * 2.2);
    const capA = (0.25 + 0.2 * capPulse) * im;
    const capHW = (RW * 0.35 + RW * 0.15 * capPulse); // half-width
    const capEH = 3 + 2.5 * capPulse * im; // ellipse height

    // Top cap
    capGfx.beginFill(0xffd700, capA * 0.7);
    capGfx.drawEllipse(rx + RW / 2, ry - 1, capHW, capEH);
    capGfx.endFill();
    capGfx.beginFill(0xffffff, capA * 0.35);
    capGfx.drawEllipse(rx + RW / 2, ry - 1, capHW * 0.5, capEH * 0.5);
    capGfx.endFill();
    // Bottom cap
    capGfx.beginFill(0xffd700, capA * 0.7);
    capGfx.drawEllipse(rx + RW / 2, ry + RH + 1, capHW, capEH);
    capGfx.endFill();
    capGfx.beginFill(0xffffff, capA * 0.35);
    capGfx.drawEllipse(rx + RW / 2, ry + RH + 1, capHW * 0.5, capEH * 0.5);
    capGfx.endFill();

    // ── Particles: sugar sparkles rising ──
    const spawnRate = gc._intense ? 0.45 : 0.18;
    if (Math.random() < spawnRate * dt && particles.length < MAX_P) {
      const isBig = Math.random() < 0.1;
      const p = new PIXI.Graphics();
      const pc = SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)];
      const sz = isBig ? 2 + Math.random() * 2.5 : 0.8 + Math.random() * 1.5;
      p.beginFill(pc, 0.5 + Math.random() * 0.5);
      p.drawCircle(0, 0, sz);
      p.endFill();
      p.x = rx + 5 + Math.random() * (RW - 10);
      p.y = ry + RH - 2;
      p._vy = -(0.4 + Math.random() * 1.2) * imSpeed;
      p._vx = (Math.random() - 0.5) * 0.4;
      p._life = 0;
      p._maxLife = 30 + Math.random() * 50;
      p._big = isBig;
      gc.addChild(p);
      particles.push(p);
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p._life += dt;
      p.x += p._vx * dt;
      p.y += p._vy * dt;
      p._vx += (Math.random() - 0.5) * 0.04 * dt; // horizontal drift
      const prog = p._life / p._maxLife;
      p.alpha = Math.max(0, (1 - prog * prog)) * (p._big ? 0.9 : 0.55);
      if (p._big && prog > 0.6) p.scale.set(1 + (prog - 0.6) * 4); // pop effect
      if (p._life >= p._maxLife || p.y < ry - 15) {
        gc.removeChild(p);
        p.destroy();
        particles.splice(i, 1);
      }
    }

    // ── Cell tint responds to intensity ──
    tintGfx.alpha = gc._intense ? 0.22 : 0.12;

    // Also keep brd visible with pulsing gold border
    brd.clear();
    brd.lineStyle(2 + bPulse, 0xd4a017, 0.6 + 0.3 * bPulse);
    brd.drawRoundedRect(rx + 1, ry + 1, RW - 2, RH - 2, 5);
  };

  app.ticker.add(fn);
  wildGlowFns[r] = fn;
}

let _winScaleFn = null;
function updateUI() {
  if (txtBalance) txtBalance.text = formatMoney(balance);
  if (txtBet)     txtBet.text     = formatMoney(getEffectiveBet());
  if (txtBet && doubleChanceEnabled) txtBet.style.fill = 0x44dd88;
  else if (txtBet) txtBet.style.fill = 0xffffff;
  if (txtFS)      txtFS.text      = inFS ? `FREE SPINS: ${fsLeft} LEFT` : '';
  if (typeof _updateDCCard === 'function') _updateDCCard();

  if (txtWin) {
    // Cancel any previous win-scale animation
    if (_winScaleFn) { app.ticker.remove(_winScaleFn); _winScaleFn = null; }
    if (roundWin > 0) {
      txtWin.text  = formatMoney(roundWin);
      txtWin.style.fill = 0xffd700;
      // Pulse scale animation on win
      txtWin.scale.set(1.15);
      let pt = 0;
      _winScaleFn = (pdt) => {
        pt += pdt;
        txtWin.scale.set(Math.max(1, 1.15 - pt * 0.01));
        if (pt >= 15) { txtWin.scale.set(1); app.ticker.remove(_winScaleFn); _winScaleFn = null; }
      };
      app.ticker.add(_winScaleFn);
    } else {
      txtWin.text  = formatMoney(0);
      txtWin.style.fill = 0xd4a017;
      txtWin.scale.set(1);
    }
  }
  if (typeof _syncPortraitBar === 'function') _syncPortraitBar();
}

const _origResizeFn = resize;
const _enhancedResize = () => {
  const w = window.innerWidth, h = window.innerHeight;
  const isPortrait = h > w * 1.2;
  // Reset styles
  app.view.style.position = '';
  app.view.style.left = '';
  app.view.style.top = '';
  if (isPortrait) {
    // Scale canvas so grid fills ~85% of viewport width
    const targetGridW = w * 0.85;
    const s = targetGridW / GRID_W;
    const cw = Math.round(BASE_W * s);
    const ch = Math.round(BASE_H * s);
    app.view.style.width  = cw + 'px';
    app.view.style.height = ch + 'px';
    app.view.style.position = 'absolute';
    const gridCenterCSS = (GRID_X + GRID_W / 2) * s;
    app.view.style.left = Math.round(w / 2 - gridCenterCSS) + 'px';
    // Logo — bigger and slightly lower
    const logoH = Math.round(w * 0.14);
    _portraitLogo.style.display = 'block';
    _portraitLogo.style.width = Math.round(w * 0.48) + 'px';
    _portraitLogo.style.top = '14px';
    // Position canvas below logo
    const barH = _portraitBar.offsetHeight || 80;
    const spinAreaH = 90; // floating spin controls height
    const topOffset = logoH + 14;
    const availH = h - barH - spinAreaH - topOffset;
    const canvasTop = Math.round(topOffset + Math.max(0, (availH - ch) / 3));
    app.view.style.top = canvasTop + 'px';
    // Position floating spin area — closer to the grid, above bottom bar
    const gridBottomCSS = canvasTop + ch;
    _portraitSpinArea.style.display = 'flex';
    _portraitSpinArea.style.justifyContent = 'center';
    _portraitSpinArea.style.bottom = (barH + 50) + 'px';
    // Show bottom bar & sync values
    _portraitBar.style.display = 'block';
    _syncPortraitBar();
    if (txtBalance) txtBalance.visible = false;
    if (txtWin) txtWin.visible = false;
    if (lblWin) lblWin.visible = false;
    if (txtBet) txtBet.visible = false;
    if (barBg) barBg.visible = false;
  } else {
    const s = Math.min(w / BASE_W, h / BASE_H);
    app.view.style.width  = (BASE_W * s) + 'px';
    app.view.style.height = (BASE_H * s) + 'px';
    _portraitBar.style.display = 'none';
    _portraitSpinArea.style.display = 'none';
    _portraitLogo.style.display = 'none';
    if (txtBalance) txtBalance.visible = true;
    if (txtWin) txtWin.visible = true;
    if (lblWin) lblWin.visible = true;
    if (txtBet) txtBet.visible = true;
    if (barBg) barBg.visible = true;
  }
  portraitWarning.visible = false;
};
window.removeEventListener('resize', resize);
window.addEventListener('resize', _enhancedResize);
_enhancedResize();

// ─────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────
// RGS Auth
if (_rgsBlocked) {
  // rgs_url was invalid — don't even try to authenticate
} else {
  try {
    const auth = await RGS.authenticate();
    balance = auth.balance;
    CURRENCY = auth.currency;
    CURRENCY_SYMBOL = CURRENCY_MAP[CURRENCY] || CURRENCY + ' ';
    // Issue #3: Bet levels from RGS, then currency defaults, then generic fallback
    if (auth.betLevels && auth.betLevels.length) {
      betLevels = auth.betLevels;
      bet = auth.defaultBetLevel && betLevels.includes(auth.defaultBetLevel) ? auth.defaultBetLevel : betLevels[0];
    } else if (auth.minBet != null && auth.maxBet != null && auth.stepBet != null) {
      buildBetLevels(auth.minBet, auth.maxBet, auth.stepBet);
      bet = auth.defaultBetLevel && betLevels.includes(auth.defaultBetLevel) ? auth.defaultBetLevel : betLevels[0];
    } else {
      // Apply currency-specific bet defaults
      const cbd = CURRENCY_BET_DEFAULTS[CURRENCY] || CURRENCY_BET_DEFAULTS['USD'];
      buildBetLevels(cbd.min, cbd.max, cbd.step);
      bet = auth.defaultBetLevel && betLevels.includes(auth.defaultBetLevel) ? auth.defaultBetLevel : cbd.default;
      if (!betLevels.includes(bet)) bet = betLevels.reduce((p,c) => Math.abs(c-bet) < Math.abs(p-bet) ? c : p);
    }
    // Handle active round on refresh: use the round's bet, not default
    if (auth.round && auth.round.active) {
      RGS._roundActive = true;
      if (auth.round.bet != null) bet = fromRGS(auth.round.bet);
    }
    if (auth.disabledFullscreen) { disabledFullscreen = true; if (_fsBtn) _fsBtn.c.visible = false; }
    if (auth.disabledTurbo) { disabledTurbo = true; turboMode = false; if (_turboBtn) _turboBtn.c.visible = false; }
    if (auth.socialCasino) {
      socialCasino = true;
      if (_betLabel) _betLabel.text = socLabel('BET');
      if (_buyBtnTxt) _buyBtnTxt.text = socLabel('BUY BONUS');
    }
  } catch(e) {
    console.error('RGS auth failed:', e);
    // Show error page — do NOT fall back to demo mode in production
    if (!IS_DEMO) {
      showRGSError('Unable to connect to the game server. Please check your connection and try again.');
    } else {
      // Demo mode fallback only when explicitly in demo
      const _cbd = CURRENCY_BET_DEFAULTS[CURRENCY] || CURRENCY_BET_DEFAULTS['USD'];
      buildBetLevels(_cbd.min, _cbd.max, _cbd.step);
      bet = _cbd.default;
      if (!betLevels.includes(bet)) bet = betLevels.reduce((p,c) => Math.abs(c-bet) < Math.abs(p-bet) ? c : p);
    }
  }
}

// Load book files for all modes
try {
  await loadBook('base');
  _bookReady = true;
} catch(e) {
  console.error('[BOOK] Failed to load base book:', e);
}
// Load bonus books in background (non-blocking)
loadBook('buy_bonus');
loadBook('super_buy_bonus');

// ── Session Recovery — handle interrupted round on reload ──
// Only restore FS state if the RGS ACTUALLY has an active round.
// Stale localStorage from old sessions must NOT corrupt a fresh game.
const _savedState = loadGameState();
if (_savedState && _savedState.inFS && _savedState.simSpins && _savedState.simSpins.length > 0 && RGS._roundActive) {
  // Restore full FS state
  bet = _savedState.bet || bet;
  inFS = true;
  const _bgImgRecover = document.getElementById('bgImg');
  if (_bgImgRecover) _bgImgRecover.src = 'assets/bg_bonus.png';
  fsLeft = _savedState.fsLeft;
  roundWin = _savedState.roundWin || 0;
  wildReels = _savedState.wildReels || [];
  _simSpins = _savedState.simSpins;
  _fsPreGenerated = _savedState.simSpins && _savedState.simSpins.length > 1;
  _simSpinIdx = _savedState.simSpinIdx || 0;
  _simMaxPayout = _savedState.simMaxPayout || 0;
  _simMode = _savedState.simMode || 'base';
  RGS._roundHasWin = true;
  // Restore wild overlays from saved state
  for (const wr of wildReels) {
    if (wildOverlays[wr.reel]) {
      wildOverlays[wr.reel].visible = true;
      const bdg = wildOverlays[wr.reel]._badge;
      if (bdg) {
        const btx = bdg.getChildByName('btxt');
        if (btx) {
          if (wr.mult >= 2) { btx.text = `${wr.mult}×`; btx.visible = true; }
          else { btx.visible = false; }
        }
        bdg.visible = true;
      }
    }
  }
  // Restore the board from the last completed spin
  if (_simSpinIdx > 0 && _simSpins[_simSpinIdx - 1] && _simSpins[_simSpinIdx - 1].board) {
    lastBoard = _simSpins[_simSpinIdx - 1].board.map(reel => [...reel]);
    // Apply sticky wilds to the displayed board
    for (const wr of wildReels) {
      for (let row = 0; row < ROWS; row++) lastBoard[wr.reel][row] = WILD;
    }
    for (let r = 0; r < REELS; r++) {
      reelState[r].targetSyms = lastBoard[r];
      snapReel(r);
    }
  }
  // startSpin() FS branch does fsLeft-- and _simSpinIdx++, so pre-decrement
  // to replay the spin we were on (not skip it)
  _simSpinIdx = Math.max(0, _simSpinIdx - 1);
  fsLeft++;
  updateUI();
  stopAllMusic();
  playSound('free_spins_music');
  // Auto-start next FS spin after a brief pause
  setTimeout(() => { if (inFS && !spinning) startSpin(); }, 1500);
} else if (_savedState && _savedState.inFS && !RGS._roundActive) {
  // Stale FS state from old session — RGS has no active round. Just clear it.
  clearGameState();
} else if (_savedState && _savedState.inFS) {
  // Had FS state but no spin data — can't resume, end round cleanly
  if (_savedState.bet) bet = _savedState.bet;
  clearGameState();
  if (RGS._roundActive) {
    RGS.endRound().then(() => {
      updateUI();
    }).catch(e => console.warn('[RECOVERY] endRound failed:', e));
  }
} else {
  clearGameState();
  // If RGS has an active round but no saved FS state, close it too (Issue #3)
  if (RGS._roundActive && !inFS) {
    RGS.endRound().then(() => {
      updateUI();
    }).catch(e => console.warn('[RECOVERY] endRound failed:', e));
  }
}

// ── Replay Mode Init ──
if (IS_REPLAY) {
  // Hide betting controls — replay is read-only playback
  // Disable all interactive children in the UI layer (spin, +/-, auto, turbo, etc.)
  layerUI.children.forEach(child => { child.interactive = false; child.cursor = 'default'; });
  if (_autoBtn) _autoBtn.c.interactive = false;

  // Process replay data from authenticate response
  _replayData = await fetchReplayData();
  if (_replayData) {
    bet = _replayData.bet;
    balance = 0; // replay doesn't show balance
    updateUI();
    showReplayIntro(_replayData, () => {
      // Re-enable spin for replay playback
      startReplayPlayback();
    });
  } else {
    showRGSError('Unable to load replay data. The event ID may be invalid or expired.');
  }
}

updateUI();
window.addEventListener('keydown', e => {
  if (e.code === 'Escape') {
    if (_gameInfoOverlay && _gameInfoOverlay._close) { _gameInfoOverlay._close(); return; }
    var htmlInfo = document.getElementById('html-game-info');
    if (htmlInfo) { htmlInfo.remove(); return; }
    if (autoSpins !== 0) { autoSpins = 0; _updateAutoBtn(); if (typeof _syncPortraitAuto === 'function') _syncPortraitAuto(); return; }
    if (buyBonusOverlay) { closeBuyBonus(); return; }
    return;
  }
  if (e.code !== 'Space') return;
  if (buyBonusOverlay) { closeBuyBonus(); return; }
  if (activeOverlay) {
    activeOverlay.emit('pointerdown');
    return;
  }
  // Block spinning while any menu/overlay is open (game info, buy bonus confirm, etc.)
  if (_gameInfoOverlay) return;
  if (_skipWinLines) { _skipWinLines(); return; }
  if (autoSpins !== 0) { autoSpins = 0; _updateAutoBtn(); return; }
  if (!spinning) startSpin();
});

if (IS_DEMO) {
  window.__test = {
    buySuper() {
      const cost = BONUS_COST_SUPER * bet;
      if (buyBonusOverlay) closeBuyBonus();
      _simMode = 'super_buy_bonus';
      balance = Math.round((balance - cost + bet) * 100) / 100;
      _buyBonusSuper = true; _forceBonusSpin = true;
      updateUI(); startSpin();
    },
    get spinning() { return spinning; },
    get inFS() { return inFS; },
    get fsLeft() { return fsLeft; },
  };
}

})();
</script>
</body>
</html>
