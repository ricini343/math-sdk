name: Run Sugar Stack Simulation

on:
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pip install numpy zstandard xlsxwriter matplotlib toml

      - name: Run Sugar Stack simulation
        working-directory: games/1_2_sugar_stack
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python3 run.py

      - name: Upload math artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sugar-stack-math
          path: games/1_2_sugar_stack/library/publish_files/
          retention-days: 30
